  (function () {

    window.__cursorY = -100;

      dot.style.opacity = "0";
    });
    document.addEventListener("mouseenter", () => {
      alive = true;
      dot.style.opacity = "1";
    });

    (function loop() {
      requestAnimationFrame(loop);
      dot.style.left = mx + "px";
      dot.style.top = my + "px";
    })();

    let __actx = null;
    function getCtx() {
      if (!__actx) {

        if (!C) return null;

    function warmAudio() { getCtx(); window.removeEventListener("pointerdown", warmAudio, true); window.removeEventListener("keydown", warmAudio, true); }
    window.addEventListener("pointerdown", warmAudio, true);

        // Skip on right-click and middle-click

  // ── FLOATING DUST ──
  (function () {
    const canvas = document.createElement("canvas");

    resize();
    window.addEventListener("resize", resize, { passive: true });

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    let lastScroll = window.scrollY;

    let pageVisible = true;
    document.addEventListener("visibilitychange", () => {

    const pts = Array.from({ length: 80 }, (_, i) => {
