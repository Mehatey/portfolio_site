name: Check for broken links on site

on:
  workflow_run:
    workflows: [Deploy site]
    types: [completed]

jobs:
  check-links-on-site:
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#running-a-workflow-based-on-the-conclusion-of-another-workflow
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler-cache: true
      - name: Update _config.yml ⚙️
        uses: fjogeleit/yaml-update-action@main
        with:
          commitChange: false
          valueFile: "_config.yml"
          changes: |
            {
              "giscus.repo": "${{ github.repository }}",
              "baseurl": ""
            }
      - name: Install and Build 🔧
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade jupyter
          export JEKYLL_ENV=production
          bundle exec jekyll build
      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          # Bumped from v2.0.2 — newer lychee supports --root-dir, which makes
          # absolute hrefs (/assets/...) resolve against _site/ instead of the
          # runner's filesystem root. Older config tried a regex --remap that
          # never matched nested page refs (e.g. /works/ asking for /assets/...).
          fail: true
          # --root-dir does what --base used to do for resolving root-relative
          # paths in local file mode. Lychee 0.20+ requires --base to be a URL
          # or absolute filesystem path, so dropping the relative _site --base
          # entirely (--root-dir below covers the case).
          args: --offline --root-dir "$PWD/_site" --verbose --no-progress --exclude-path _site/assets/json --exclude-path _site/assets/jupyter '_site/**/*.html'
