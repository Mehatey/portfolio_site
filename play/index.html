 <div class="wall-hint" id="wall-hint">Play with your cursor</div> </div> <div class="lb" id="lb"> <div class="lb-bg"></div> <img id="lb-img" src="" alt=""> <video id="lb-video" controls playsinline style="display:none;"></video> <button class="lb-x" aria-label="Close">✕</button> </div> <svg style="position:absolute;width:0;height:0;" aria-hidden="true"> <filter id="play-liquify"> <feturbulence type="fractalNoise" basefrequency="0.025 0.018" numoctaves="2" seed="3"></feturbulence> <fedisplacementmap in="SourceGraphic" scale="22"></fedisplacementmap> </filter> <filter id="play-glitch"> <feturbulence type="fractalNoise" basefrequency="0.9 0.05" numoctaves="1" seed="7"></feturbulence> <fedisplacementmap in="SourceGraphic" scale="6"></fedisplacementmap> </filter> <filter id="play-ripple"> <feturbulence type="turbulence" basefrequency="0.05 0.08" numoctaves="1" seed="5"></feturbulence> <fedisplacementmap in="SourceGraphic" scale="14"></fedisplacementmap> </filter> </svg> <footer class="play-footer"> <span class="pf-text">© 2026 · Siddharth Mehta</span> <div class="pf-social"> <a href="mailto:sidmehtadesign@gmail.com">Email</a> <a href="https://www.linkedin.com/in/siddharth-mehta-35560916b/" target="_blank" rel="noopener">LinkedIn</a> <a href="https://www.instagram.com/cubeofcreation/" target="_blank" rel="noopener">Instagram</a> </div> <a href="/contact/" class="pf-cta">Get in Touch →</a> </footer> <style>@media(hover:hover) and (pointer:fine){*{cursor:none!important}}#cur-dot{position:fixed;width:12px;height:12px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:99999;background:radial-gradient(circle,rgba(255,255,255,0.9) 0%,rgba(160,210,255,0.5) 40%,rgba(80,150,240,0.15) 70%,transparent 100%);box-shadow:0 0 8px 2px rgba(120,180,255,0.3),0 0 20px 4px rgba(80,140,240,0.12);will-change:left,top;opacity:0;transition:opacity .2s}@media(hover:none),(pointer:coarse){*,*::before,*::after{cursor:auto!important}#cur-dot{display:none!important}}.click-ripple{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);border:1px solid rgba(180,220,255,0.55);background:radial-gradient(circle,rgba(255,255,255,0.18) 0%,transparent 65%);animation:click-ripple .55s cubic-bezier(0.2,0.8,0.2,1) forwards;will-change:transform,opacity}@keyframes click-ripple{0%{width:8px;height:8px;opacity:.85;border-width:1.5px}100%{width:70px;height:70px;opacity:0;border-width:.5px}}</style> <div id="cur-dot"></div> <script>
  (function () {
    const dot = document.getElementById("cur-dot");
    if (!dot) return;

    let mx = -100,
      my = -100,
      alive = false;
    window.__cursorX = -100;
    window.__cursorY = -100;

    document.addEventListener(
      "mousemove",
      (e) => {
        mx = e.clientX;
        my = e.clientY;
        window.__cursorX = mx;
        window.__cursorY = my;
        if (!alive) {
          alive = true;
          dot.style.opacity = "1";
        }
      },
      { passive: true }
    );

    document.addEventListener("mouseleave", () => {
      alive = false;
      dot.style.opacity = "0";
    });
    document.addEventListener("mouseenter", () => {
      alive = true;
      dot.style.opacity = "1";
    });

    (function loop() {
      requestAnimationFrame(loop);
      dot.style.left = mx + "px";
      dot.style.top = my + "px";
    })();

    // ── CLICK HAPTICS ── tiny synthesized click + cursor ripple
    let __actx = null;
    function getCtx() {
      if (!__actx) {
        const C = window.AudioContext || window.webkitAudioContext;
        if (!C) return null;
        __actx = new C();
      }
      // Resume on first interaction (browsers suspend AC until gesture)
      if (__actx.state === "suspended") __actx.resume().catch(() => {});
      return __actx;
    }
    function playClick() {
      const ctx = getCtx();
      if (!ctx) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(1600, t);
      osc.frequency.exponentialRampToValueAtTime(420, t + 0.05);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.04, t + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.07);
    }
    document.addEventListener(
      "mousedown",
      (e) => {
        // Skip on right-click and middle-click
        if (e.button !== 0) return;
        // Skip on form inputs
        const tag = e.target && e.target.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
        playClick();
        const r = document.createElement("div");
        r.className = "click-ripple";
        r.style.left = e.clientX + "px";
        r.style.top = e.clientY + "px";
        document.body.appendChild(r);
        setTimeout(() => r.remove(), 600);
      },
      { passive: true }
    );
  })();

  // ── FLOATING DUST ──
  (function () {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;";
    document.body.appendChild(canvas);
    const ctx = canvas.getContext("2d");
    let dpr = 1;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }
    resize();
    window.addEventListener("resize", resize, { passive: true });

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    let lastScroll = window.scrollY;

    let pageVisible = true;
    document.addEventListener("visibilitychange", () => {
      pageVisible = !document.hidden;
    });

    const pts = Array.from({ length: 80 }, (_, i) => {
      const isMote = i < 12;
      return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.1,
        vy: -Math.random() * 0.06 - 0.01,
        r: isMote ? Math.random() * 1.1 + 0.6 : Math.random() * 0.5 + 0.2,
        a: isMote ? Math.random() * 0.12 + 0.06 : Math.random() * 0.08 + 0.02,
        ph: Math.random() * Math.PI * 2,
        spd: Math.random() * 0.006 + 0.003,
        depth: 0.3 + Math.random() * 0.7,
      };
    });

    (function draw() {
      requestAnimationFrame(draw);
      if (!pageVisible) return;
      ctx.clearRect(0, 0, W(), H());

      const curScroll = window.scrollY;
      const scrollDelta = curScroll - lastScroll;
      lastScroll = curScroll;

      const cmx = window.__cursorX || -200;
      const cmy = window.__cursorY || -200;

      for (const p of pts) {
        p.x += p.vx;
        p.y += p.vy;
        p.ph += p.spd;
        p.y -= scrollDelta * p.depth * 0.15;

        const cdx = p.x - cmx,
          cdy = p.y - cmy;
        const cDist = Math.sqrt(cdx * cdx + cdy * cdy);
        if (cDist < 120 && cDist > 0) {
          const push = ((120 - cDist) / 120) * 0.18;
          p.x += (cdx / cDist) * push;
          p.y += (cdy / cDist) * push;
        }

        if (p.y < -4) {
          p.y = H() + 4;
          p.x = Math.random() * W();
        }
        if (p.y > H() + 4) {
          p.y = -4;
          p.x = Math.random() * W();
        }
        if (p.x < -4) p.x = W() + 4;
        if (p.x > W() + 4) p.x = -4;

        const alpha = p.a * (0.45 + 0.55 * Math.sin(p.ph));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(180,190,210,0.7)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    })();
  })();

      (function () {

        }
        // Spread videos evenly
        for (var v = 0; v < vids.length; v++) {

          { transform: "skew(-3deg, 1deg) scale(1.02)" },

        function pickEffect() { return hoverEffects[Math.floor(Math.random() * hoverEffects.length)]; }
        function applyEffect(media, effect) {

          if (effect.filter) media.style.filter = effect.filter;
          if (effect.transform) media.style.transform = effect.transform;
        }
        function clearEffect(media) {
          if (!media) return;

          media.style.transform = "";
        }
        items.forEach(function (item, idx) {

          card.addEventListener("mouseleave", function () {
            clearEffect(card.querySelector("img, video"));

        // Reveal masonry once first-fold media has loaded — kills the 1-2s shuffle
