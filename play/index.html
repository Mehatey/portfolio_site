      const isMote = i < 12;

        y: Math.random() * window.innerHeight,

        vy: -Math.random() * 0.06 - 0.01,
        r: isMote ? Math.random() * 1.1 + 0.6 : Math.random() * 0.5 + 0.2,
        a: isMote ? Math.random() * 0.12 + 0.06 : Math.random() * 0.08 + 0.02,

        spd: Math.random() * 0.006 + 0.003,
        depth: 0.3 + Math.random() * 0.7,

      requestAnimationFrame(draw);
      if (!pageVisible) return;

      const scrollDelta = curScroll - lastScroll;
      lastScroll = curScroll;

      const cmy = window.__cursorY || -200;
