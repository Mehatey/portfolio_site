<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play — Sid Mehta</title>
    <meta name="description" content="Playground — experimental works, sketches, and creative explorations by Sid Mehta." />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="preload"
      as="style"
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --font-head: "Satoshi", sans-serif;
        --font-mono: "DM Mono", monospace;
        --nav-h: 52px;
      }
      html,
      body {
        background: #0a0a0a;
        color: #fff;
        font-family: var(--font-head);
        overflow: hidden;
        width: 100%;
        height: 100%;
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── NAV ── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: transparent;
        overflow: hidden;
      }
      .nav::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: rgba(10, 10, 10, 0.6);
        backdrop-filter: blur(16px) saturate(1.5);
        -webkit-backdrop-filter: blur(16px) saturate(1.5);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      /* cube logo */
      .cube-scene {
        width: 20px;
        height: 20px;
        perspective: 350px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cube {
        width: 16px;
        height: 16px;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateX(-20deg) rotateY(25deg);
        transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .cube-face {
        position: absolute;
        width: 16px;
        height: 16px;
        border: 1px solid rgba(255, 255, 255, 0.65);
        background: #000;
        animation: cube-hue 8s ease-in-out infinite;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        will-change: transform;
        transform-style: preserve-3d;
        -webkit-transform-style: preserve-3d;
      }
      @keyframes cube-hue {
        0%,
        100% {
          border-color: rgba(255, 255, 255, 0.65);
        }
        25% {
          border-color: rgba(180, 200, 255, 0.6);
        }
        50% {
          border-color: rgba(200, 180, 255, 0.55);
        }
        75% {
          border-color: rgba(180, 255, 220, 0.6);
        }
      }
      .cube-front {
        transform: translateZ(8px);
        animation:
          cube-hue 8s ease-in-out infinite,
          cube-blink-glow 4s ease-in-out infinite;
      }
      .cube-back {
        transform: rotateY(180deg) translateZ(8px);
      }
      .cube-left {
        transform: rotateY(-90deg) translateZ(8px);
      }
      .cube-right {
        transform: rotateY(90deg) translateZ(8px);
      }
      .cube-top {
        transform: rotateX(90deg) translateZ(8px);
      }
      .cube-bottom {
        transform: rotateX(-90deg) translateZ(8px);
      }
      @keyframes cube-blink-glow {
        0%,
        89%,
        100% {
          background: #000;
        }
        93% {
          background: rgba(50, 100, 255, 0.22);
        }
        97% {
          background: #000;
        }
      }
      .cube-front::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 1px;
        height: 5px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 6px 0 0 rgba(255, 255, 255, 0.7);
        animation: cube-blink 4s ease-in-out infinite;
      }
      @keyframes cube-blink {
        0%,
        90%,
        100% {
          opacity: 1;
        }
        95% {
          opacity: 0;
        }
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .nav-primary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
        transition: color 0.2s;
      }
      .nav-primary:hover {
        color: #fff;
      }
      .nav-secondary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        transition: color 0.2s;
      }
      .nav-secondary:hover {
        color: rgba(255, 255, 255, 0.8);
      }

      /* ── VIEWPORT ── */
      .viewport {
        position: fixed;
        top: var(--nav-h);
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
        cursor: grab;
      }
      .viewport:active {
        cursor: grabbing;
      }

      /* ── CANVAS (pannable) ── */
      .canvas {
        position: absolute;
        top: 0;
        left: 0;
        will-change: transform;
        background-image: radial-gradient(circle, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 32px 32px;
      }

      /* ── GALLERY ITEMS ── */
      .gallery-item {
        position: absolute;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        transition:
          transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
          box-shadow 0.35s ease;
        will-change: transform;
      }
      .gallery-item img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        -webkit-user-drag: none;
      }
      .gallery-item:hover {
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
        z-index: 10;
      }

      /* ── BREATHING ANIMATION ── */
      @keyframes breathe {
        0%,
        100% {
          transform: var(--base-transform) translateY(0);
        }
        50% {
          transform: var(--base-transform) translateY(-2.5px);
        }
      }

      /* ── EXPANDED OVERLAY ── */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .overlay.active {
        opacity: 1;
        pointer-events: all;
      }
      .overlay-img {
        max-width: 85vw;
        max-height: 85vh;
        border-radius: 10px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        transform: scale(0.85);
        opacity: 0;
        transition:
          transform 0.45s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 0.35s ease;
      }
      .overlay.active .overlay-img {
        transform: scale(1);
        opacity: 1;
      }

      /* ── HINT ── */
      .hint {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.3);
        transition: opacity 0.6s ease;
        pointer-events: none;
      }
      .hint.hidden {
        opacity: 0;
      }

      /* ── FILM GRAIN ── */
      .film-grain {
        position: fixed;
        inset: 0;
        z-index: 999;
        pointer-events: none;
        opacity: 0.035;
        animation: grainShift 0.5s steps(6) infinite;
      }
      @keyframes grainShift {
        0%,
        100% {
          transform: translate(0, 0);
        }
        10% {
          transform: translate(-2%, -2%);
        }
        30% {
          transform: translate(3%, -1%);
        }
        50% {
          transform: translate(-1%, 3%);
        }
        70% {
          transform: translate(2%, 1%);
        }
        90% {
          transform: translate(-3%, 2%);
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">
      <a href="{{ site.baseurl }}/">
        <div class="cube-scene">
          <div class="cube">
            <div class="cube-face cube-front"></div>
            <div class="cube-face cube-back"></div>
            <div class="cube-face cube-left"></div>
            <div class="cube-face cube-right"></div>
            <div class="cube-face cube-top"></div>
            <div class="cube-face cube-bottom"></div>
          </div>
        </div>
      </a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/works/" class="nav-secondary">Works</a>
        <a href="{{ site.baseurl }}/play/" class="nav-primary">Play</a>
        <a href="{{ site.baseurl }}/contact/" class="nav-secondary">Contact</a>
        <a href="{{ site.baseurl }}/about/" class="nav-secondary">About</a>
      </div>
    </nav>

    <!-- VIEWPORT -->
    <div class="viewport" id="viewport">
      <div class="canvas" id="canvas"></div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay">
      <img class="overlay-img" id="overlay-img" src="" alt="" />
    </div>

    <!-- HINT -->
    <div class="hint" id="hint">drag to explore</div>

    <!-- FILM GRAIN -->
    <svg class="film-grain" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      </filter>
      <rect width="100%" height="100%" filter="url(#grain)" />
    </svg>

    <script>
      (function () {
        "use strict";

        var TOTAL = 77;
        var CANVAS_W = 4000;
        var CANVAS_H = 3000;
        var canvasEl = document.getElementById("canvas");
        var viewportEl = document.getElementById("viewport");
        var overlayEl = document.getElementById("overlay");
        var overlayImg = document.getElementById("overlay-img");
        var hintEl = document.getElementById("hint");

        canvasEl.style.width = CANVAS_W + "px";
        canvasEl.style.height = CANVAS_H + "px";

        /* ── GENERATE ITEMS (overlap-aware placement) ── */
        var sizes = [
          [280, 280],
          [380, 260],
          [500, 340],
          [300, 420],
          [400, 280],
          [460, 320],
        ];

        function placeItems(total) {
          var placed = [];
          for (var i = 1; i <= total; i++) {
            var sz = sizes[Math.floor(Math.random() * sizes.length)];
            var attempts = 0;
            var x, y, overlaps;
            do {
              x = 40 + Math.random() * (CANVAS_W - sz[0] - 80);
              y = 40 + Math.random() * (CANVAS_H - sz[1] - 80);
              overlaps = false;
              for (var j = 0; j < placed.length; j++) {
                var p = placed[j];
                if (x < p.x + p.w + 20 && x + sz[0] + 20 > p.x && y < p.y + p.h + 20 && y + sz[1] + 20 > p.y) {
                  overlaps = true;
                  break;
                }
              }
              attempts++;
            } while (overlaps && attempts < 50);

            var item = {
              src: "{{ site.baseurl }}/play/assets/p" + i + ".jpg",
              x: x,
              y: y,
              w: sz[0],
              h: sz[1],
              rot: (Math.random() - 0.5) * 5,
            };
            placed.push(item);
          }
          return placed;
        }

        var items = placeItems(TOTAL);
        var itemEls = [];

        for (var i = 0; i < items.length; i++) {
          var it = items[i];
          var breathDur = 8 + Math.random() * 4;
          var breathDelay = Math.random() * -breathDur;

          var el = document.createElement("div");
          el.className = "gallery-item";
          el.style.width = it.w + "px";
          el.style.height = it.h + "px";
          el.style.left = Math.floor(it.x) + "px";
          el.style.top = Math.floor(it.y) + "px";
          el.style.setProperty("--base-transform", "rotate(" + it.rot.toFixed(2) + "deg)");
          el.style.transform = "rotate(" + it.rot.toFixed(2) + "deg)";
          el.style.animation = "breathe " + breathDur.toFixed(1) + "s ease-in-out " + breathDelay.toFixed(1) + "s infinite";
          el.setAttribute("data-rot", it.rot.toFixed(2));

          var img = document.createElement("img");
          img.src = it.src;
          img.alt = "Play " + (i + 1);
          img.loading = "lazy";
          img.draggable = false;
          el.appendChild(img);

          canvasEl.appendChild(el);
          itemEls.push({ el: el, src: it.src, rot: it.rot });
        }

        /* ── HOVER: scale up, zero rotation ── */
        canvasEl.addEventListener("mouseover", function (e) {
          var item = e.target.closest(".gallery-item");
          if (!item) return;
          item.style.animation = "none";
          item.style.transform = "rotate(0deg) scale(1.03)";
          item.style.boxShadow = "0 12px 48px rgba(0,0,0,0.7)";
        });
        canvasEl.addEventListener("mouseout", function (e) {
          var item = e.target.closest(".gallery-item");
          if (!item) return;
          var r = item.getAttribute("data-rot");
          var breathDur = (8 + Math.random() * 4).toFixed(1);
          item.style.setProperty("--base-transform", "rotate(" + r + "deg)");
          item.style.transform = "rotate(" + r + "deg)";
          item.style.boxShadow = "";
          item.style.animation = "breathe " + breathDur + "s ease-in-out 0s infinite";
        });

        /* ── PAN STATE ── */
        var panX = -(CANVAS_W / 2 - window.innerWidth / 2);
        var panY = -(CANVAS_H / 2 - window.innerHeight / 2);
        var isDragging = false;
        var dragStartX = 0;
        var dragStartY = 0;
        var panStartX = 0;
        var panStartY = 0;
        var hintDismissed = false;
        var velX = 0;
        var velY = 0;
        var lastMoveX = 0;
        var lastMoveY = 0;

        function clampPan() {
          var vw = window.innerWidth;
          var vh = window.innerHeight - 52; /* nav height */
          panX = Math.min(0, Math.max(-(CANVAS_W - vw), panX));
          panY = Math.min(0, Math.max(-(CANVAS_H - vh), panY));
        }

        function applyPan() {
          canvasEl.style.transform = "translate(" + panX + "px, " + panY + "px)";
        }

        function dismissHint() {
          if (!hintDismissed) {
            hintDismissed = true;
            hintEl.classList.add("hidden");
          }
        }

        clampPan();
        applyPan();

        /* ── MOMENTUM LOOP ── */
        function applyMomentum() {
          if (!isDragging && (Math.abs(velX) > 0.1 || Math.abs(velY) > 0.1)) {
            panX += velX;
            panY += velY;
            velX *= 0.95;
            velY *= 0.95;
            clampPan();
            applyPan();
          }
          requestAnimationFrame(applyMomentum);
        }
        applyMomentum();

        /* ── DRAG TO PAN ── */
        viewportEl.addEventListener("mousedown", function (e) {
          if (e.target.closest(".gallery-item")) {
            /* let click bubble; only start drag if moved */
          }
          isDragging = true;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          lastMoveX = e.clientX;
          lastMoveY = e.clientY;
          panStartX = panX;
          panStartY = panY;
          velX = 0;
          velY = 0;
          dismissHint();
        });

        window.addEventListener("mousemove", function (e) {
          if (!isDragging) return;
          velX = e.clientX - lastMoveX;
          velY = e.clientY - lastMoveY;
          lastMoveX = e.clientX;
          lastMoveY = e.clientY;
          panX = panStartX + (e.clientX - dragStartX);
          panY = panStartY + (e.clientY - dragStartY);
          clampPan();
          applyPan();
        });

        window.addEventListener("mouseup", function () {
          isDragging = false;
          /* velocity carries via momentum loop */
        });

        /* ── SCROLL / TRACKPAD TO PAN ── */
        viewportEl.addEventListener(
          "wheel",
          function (e) {
            e.preventDefault();
            panX -= e.deltaX;
            panY -= e.deltaY;
            clampPan();
            applyPan();
            dismissHint();
          },
          { passive: false }
        );

        /* ── TOUCH SUPPORT ── */
        var touchStartX = 0;
        var touchStartY = 0;
        var touchPanStartX = 0;
        var touchPanStartY = 0;
        var lastTouchX = 0;
        var lastTouchY = 0;

        viewportEl.addEventListener(
          "touchstart",
          function (e) {
            if (e.touches.length === 1) {
              touchStartX = e.touches[0].clientX;
              touchStartY = e.touches[0].clientY;
              lastTouchX = e.touches[0].clientX;
              lastTouchY = e.touches[0].clientY;
              touchPanStartX = panX;
              touchPanStartY = panY;
              velX = 0;
              velY = 0;
              isDragging = true;
              dismissHint();
            }
          },
          { passive: true }
        );

        viewportEl.addEventListener(
          "touchmove",
          function (e) {
            if (e.touches.length === 1) {
              e.preventDefault();
              velX = e.touches[0].clientX - lastTouchX;
              velY = e.touches[0].clientY - lastTouchY;
              lastTouchX = e.touches[0].clientX;
              lastTouchY = e.touches[0].clientY;
              panX = touchPanStartX + (e.touches[0].clientX - touchStartX);
              panY = touchPanStartY + (e.touches[0].clientY - touchStartY);
              clampPan();
              applyPan();
            }
          },
          { passive: false }
        );

        viewportEl.addEventListener(
          "touchend",
          function () {
            isDragging = false;
          },
          { passive: true }
        );

        /* ── CLICK TO EXPAND ── */
        var dragThreshold = 5;

        viewportEl.addEventListener("click", function (e) {
          /* ignore if user was dragging */
          var dx = Math.abs(e.clientX - dragStartX);
          var dy = Math.abs(e.clientY - dragStartY);
          if (dx > dragThreshold || dy > dragThreshold) return;

          var item = e.target.closest(".gallery-item");
          if (!item) return;

          var img = item.querySelector("img");
          if (!img) return;

          overlayImg.src = img.src;
          overlayImg.alt = img.alt;
          overlayEl.classList.add("active");
        });

        /* ── CLOSE OVERLAY ── */
        overlayEl.addEventListener("click", function (e) {
          if (e.target === overlayEl || e.target === overlayImg) {
            overlayEl.classList.remove("active");
          }
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            overlayEl.classList.remove("active");
          }
        });

        /* ── RESIZE ── */
        window.addEventListener("resize", function () {
          clampPan();
          applyPan();
        });
      })();
    </script>
  </body>
</html>
