<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play — Sid Mehta</title>
    <meta name="description" content="Playground — experimental works, sketches, and creative explorations by Sid Mehta." />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="preload"
      as="style"
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap"
      onload="

        this.rel = 'stylesheet';

    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap"

    <noscript>
      <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --font-head: "Satoshi", sans-serif;
        --font-mono: "DM Mono", monospace;
        --font-title: "Inter", sans-serif;
      }
      html,
      body {
        background: #050507;
        color: #fff;
        font-family: var(--font-head);
        overflow: hidden;
        width: 100%;
        height: 100%;
        -webkit-font-smoothing: antialiased;
        cursor: default;
      }

      /* ── ANIMATED BACKGROUND ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(ellipse 80% 60% at 20% 30%, rgba(90, 40, 140, 0.08) 0%, transparent 60%),
          radial-gradient(ellipse 60% 80% at 80% 70%, rgba(30, 80, 140, 0.06) 0%, transparent 50%),
          radial-gradient(ellipse 50% 50% at 50% 50%, rgba(140, 40, 80, 0.04) 0%, transparent 60%);
        animation: bgShift 20s ease-in-out infinite alternate;
        pointer-events: none;
      }
      @keyframes bgShift {
        0% {
          filter: hue-rotate(0deg);
        }
        100% {
          filter: hue-rotate(30deg);
        }
      }

      /* ── DOT GRID ── */
      .dot-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image: radial-gradient(circle, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
      }

      /* ── FILM GRAIN ── */
      .film-grain {
        position: fixed;
        inset: 0;
        z-index: 999;
        pointer-events: none;
        opacity: 0.04;
        animation: grainShift 0.5s steps(6) infinite;
      }
      @keyframes grainShift {
        0%,
        100% {
          transform: translate(0, 0);
        }
        10% {
          transform: translate(-2%, -2%);
        }
        30% {
          transform: translate(3%, -1%);
        }
        50% {
          transform: translate(-1%, 3%);
        }
        70% {
          transform: translate(2%, 1%);
        }
        90% {
          transform: translate(-3%, 2%);
        }
      }

      /* ── NAV ── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: rgba(5, 5, 7, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .nav-logo {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
      }
      .nav-links {
        display: flex;
        gap: 24px;
      }
      .nav-links a {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #fff;
      }
      .nav-links a.active {
        color: rgba(255, 255, 255, 0.85);
      }

      /* ── PARTICLE CANVAS ── */
      #particle-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      /* ── FLOATING ITEMS ── */
      .play-item {
        position: fixed;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        z-index: 1;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.5),
          0 1px 0 rgba(255, 255, 255, 0.06) inset;
        transition:
          box-shadow 0.4s ease,
          border-color 0.4s ease,
          transform 0.3s ease;
        will-change: transform;
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
        opacity: 0;
        animation: fadeIn 0.8s ease forwards;
      }
      .play-item .item-label {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        padding: 10px 14px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.5) 0%, transparent 100%);
        width: 100%;
      }
      .play-item:hover {
        border-color: rgba(255, 255, 255, 0.2);
        box-shadow:
          0 8px 40px rgba(0, 0, 0, 0.6),
          0 0 30px rgba(150, 120, 255, 0.08),
          0 1px 0 rgba(255, 255, 255, 0.1) inset;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.85);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* ── EXPANDED OVERLAY ── */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 300;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
      }
      .overlay.active {
        opacity: 1;
        pointer-events: all;
      }
      .overlay-card {
        max-width: 600px;
        width: 90%;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
        transform: scale(0.9) translateY(20px);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .overlay.active .overlay-card {
        transform: scale(1) translateY(0);
      }
      .overlay-card .card-visual {
        width: 100%;
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .overlay-card .card-body {
        padding: 28px 32px;
        background: rgba(10, 10, 14, 0.95);
      }
      .overlay-card .card-body h2 {
        font-family: var(--font-head);
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #fff;
      }
      .overlay-card .card-body p {
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.5);
      }

      /* ── CURSOR GLOW ── */
      .cursor-glow {
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        background: radial-gradient(circle, rgba(150, 120, 255, 0.06) 0%, transparent 70%);
        transform: translate(-50%, -50%);
        transition:
          left 0.15s ease-out,
          top 0.15s ease-out;
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">
      <a href="/" class="nav-logo">Sid Mehta</a>
      <div class="nav-links">
        <a href="/">Work</a>
        <a href="/about">About</a>
        <a href="/play" class="active">Play</a>
      </div>
    </nav>

    <!-- LAYERS -->
    <div class="dot-grid"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay">
      <div class="overlay-card" id="overlay-card">
        <div class="card-visual" id="overlay-visual"></div>
        <div class="card-body">
          <h2 id="overlay-title"></h2>
          <p id="overlay-desc"></p>
        </div>
      </div>
    </div>

    <!-- FILM GRAIN (SVG noise) -->
    <svg class="film-grain" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      </filter>
      <rect width="100%" height="100%" filter="url(#grain)" />
    </svg>

    <script>
      (function () {
        "use strict";

        /* ── DATA ── */
        var LABELS = [
          "AR Prototype",
          "VR Narrative",
          "Brand Identity",
          "Spatial UI",
          "Motion Study",
          "3D Render",
          "Typography",
          "Illustration",
          "Interactive Install",
          "Web Experiment",
          "Texture Study",
          "Color System",
          "Animation Loop",
          "Sound Visual",
          "Generative Art",
          "UI Concept",
          "Mixed Reality",
          "Data Viz",
          "Projection Map",
          "Material Study",
        ];

        var COLORS = [
          ["#1a1a2e", "#16213e", "#0f3460"],
          ["#2d132c", "#801336", "#c72c41"],
          ["#1b262c", "#0f4c75", "#3282b8"],
          ["#222831", "#393e46", "#00adb5"],
          ["#2c3333", "#395b64", "#a5c9ca"],
          ["#1a1a40", "#270082", "#7a0bc0"],
        ];

        var DESCRIPTIONS = [
          "Exploring spatial interfaces through augmented layers.",
          "A narrative experiment in immersive storytelling.",
          "Visual identity system built from geometric primitives.",
          "Rethinking UI for three-dimensional environments.",
          "Kinetic studies in timing, easing, and flow.",
          "Photorealistic rendering with procedural materials.",
          "Letterform explorations across weights and scales.",
          "Digital illustration blending organic and geometric forms.",
          "Site-specific interactive projection installation.",
          "Browser-based creative coding experiments.",
          "Surface and material studies in digital media.",
          "Systematic color palette generation and testing.",
          "Seamless looping motion graphics.",
          "Translating audio frequencies into visual form.",
          "Algorithm-driven visual compositions.",
          "Interface design concepts for future platforms.",
          "Blending physical and digital interaction layers.",
          "Information design turning data into narrative.",
          "Large-scale projection mapping on architecture.",
          "Physical material properties in digital rendering.",
        ];

        var SIZES = [
          { w: 150, h: 100 },
          { w: 150, h: 100 },
          { w: 150, h: 100 },
          { w: 150, h: 100 },
          { w: 250, h: 170 },
          { w: 250, h: 170 },
          { w: 250, h: 170 },
          { w: 250, h: 170 },
          { w: 250, h: 170 },
          { w: 250, h: 170 },
          { w: 250, h: 170 },
          { w: 250, h: 170 },
          { w: 350, h: 230 },
          { w: 350, h: 230 },
          { w: 350, h: 230 },
          { w: 350, h: 230 },
          { w: 150, h: 100 },
          { w: 250, h: 170 },
          { w: 350, h: 230 },
          { w: 250, h: 170 },
        ];

        /* ── ITEMS STATE ── */
        var items = [];
        var mouseX = window.innerWidth / 2;
        var mouseY = window.innerHeight / 2;
        var vw = window.innerWidth;
        var vh = window.innerHeight;

        function randomBetween(a, b) {
          return a + Math.random() * (b - a);
        }

        function createItems() {
          var container = document.body;
          for (var i = 0; i < LABELS.length; i++) {
            var palette = COLORS[i % COLORS.length];
            var size = SIZES[i];
            var el = document.createElement("div");
            el.className = "play-item";
            el.style.width = size.w + "px";
            el.style.height = size.h + "px";
            el.style.background = "linear-gradient(135deg, " + palette[0] + " 0%, " + palette[1] + " 50%, " + palette[2] + " 100%)";
            el.style.animationDelay = i * 0.05 + "s";
            el.innerHTML = '<span class="item-label">' + LABELS[i] + "</span>";
            el.setAttribute("data-index", i);
            container.appendChild(el);

            var speed = randomBetween(0.2, 0.5);
            var angle = Math.random() * Math.PI * 2;

            items.push({
              el: el,
              x: randomBetween(40, vw - size.w - 40),
              y: randomBetween(70, vh - size.h - 40),
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              w: size.w,
              h: size.h,
              rotation: randomBetween(-8, 8),
              rotationSpeed: randomBetween(-0.02, 0.02),
              breathPhase: Math.random() * Math.PI * 2,
              palette: palette,
              label: LABELS[i],
              desc: DESCRIPTIONS[i],
              index: i,
            });
          }
        }

        /* ── ANIMATION LOOP ── */
        function tick() {
          var cursorInfluence = 200;
          for (var i = 0; i < items.length; i++) {
            var it = items[i];

            /* distance to cursor */
            var cx = it.x + it.w / 2;
            var cy = it.y + it.h / 2;
            var dx = mouseX - cx;
            var dy = mouseY - cy;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var proximity = Math.max(0, 1 - dist / cursorInfluence);

            /* slow down near cursor */
            var speedMul = 1 - proximity * 0.8;
            it.x += it.vx * speedMul;
            it.y += it.vy * speedMul;

            /* bounce off edges */
            if (it.x < 0) {
              it.x = 0;
              it.vx *= -1;
            }
            if (it.x + it.w > vw) {
              it.x = vw - it.w;
              it.vx *= -1;
            }
            if (it.y < 52) {
              it.y = 52;
              it.vy *= -1;
            }
            if (it.y + it.h > vh) {
              it.y = vh - it.h;
              it.vy *= -1;
            }

            /* rotation drift */
            it.rotation += it.rotationSpeed * speedMul;

            /* breathing */
            it.breathPhase += 0.01;
            var breathScale = 1 + Math.sin(it.breathPhase) * 0.02;

            /* tilt toward cursor */
            var tiltX = 0;
            var tiltY = 0;
            if (proximity > 0) {
              tiltX = (dy / cursorInfluence) * 12 * proximity;
              tiltY = -(dx / cursorInfluence) * 12 * proximity;
            }

            /* glow on proximity */
            var glowOpacity = proximity * 0.15;
            var borderOpacity = 0.08 + proximity * 0.14;

            it.el.style.left = it.x + "px";
            it.el.style.top = it.y + "px";
            it.el.style.transform =
              "rotate(" + it.rotation + "deg) scale(" + breathScale + ") perspective(600px) rotateX(" + tiltX + "deg) rotateY(" + tiltY + "deg)";
            it.el.style.borderColor = "rgba(255,255,255," + borderOpacity + ")";
            if (proximity > 0.05) {
              it.el.style.boxShadow = "0 4px 24px rgba(0,0,0,0.5), 0 0 " + Math.round(40 * proximity) + "px rgba(150,120,255," + glowOpacity + ")";
            } else {
              it.el.style.boxShadow = "0 4px 24px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.06) inset";
            }
          }

          requestAnimationFrame(tick);
        }

        /* ── CURSOR TRACKING ── */
        var cursorGlow = document.getElementById("cursor-glow");
        document.addEventListener("mousemove", function (e) {
          mouseX = e.clientX;
          mouseY = e.clientY;
          cursorGlow.style.left = mouseX + "px";
          cursorGlow.style.top = mouseY + "px";
        });

        /* ── CLICK → EXPAND ── */
        var overlay = document.getElementById("overlay");
        var overlayVisual = document.getElementById("overlay-visual");
        var overlayTitle = document.getElementById("overlay-title");
        var overlayDesc = document.getElementById("overlay-desc");

        document.addEventListener("click", function (e) {
          var target = e.target.closest(".play-item");
          if (target) {
            var idx = parseInt(target.getAttribute("data-index"), 10);
            var it = items[idx];
            overlayVisual.style.background =
              "linear-gradient(135deg, " + it.palette[0] + " 0%, " + it.palette[1] + " 50%, " + it.palette[2] + " 100%)";
            overlayTitle.textContent = it.label;
            overlayDesc.textContent = it.desc;
            overlay.classList.add("active");
          }
        });

        overlay.addEventListener("click", function (e) {
          if (e.target === overlay || !document.getElementById("overlay-card").contains(e.target)) {
            overlay.classList.remove("active");
          }
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            overlay.classList.remove("active");
          }
        });

        /* ── PARTICLE SYSTEM ── */
        var pCanvas = document.getElementById("particle-canvas");
        var pCtx = pCanvas.getContext("2d");
        var particles = [];
        var PARTICLE_COUNT = 60;

        function resizeParticleCanvas() {
          pCanvas.width = window.innerWidth;
          pCanvas.height = window.innerHeight;
        }
        resizeParticleCanvas();

        function initParticles() {
          particles = [];
          for (var i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
              x: Math.random() * pCanvas.width,
              y: Math.random() * pCanvas.height,
              vx: randomBetween(-0.15, 0.15),
              vy: randomBetween(-0.15, 0.15),
              r: randomBetween(0.5, 1.5),
              alpha: randomBetween(0.1, 0.3),
            });
          }
        }
        initParticles();

        function tickParticles() {
          pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = pCanvas.width;
            if (p.x > pCanvas.width) p.x = 0;
            if (p.y < 0) p.y = pCanvas.height;
            if (p.y > pCanvas.height) p.y = 0;
            pCtx.beginPath();
            pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            pCtx.fillStyle = "rgba(255,255,255," + p.alpha + ")";
            pCtx.fill();
          }
          requestAnimationFrame(tickParticles);
        }

        /* ── RESIZE ── */
        window.addEventListener("resize", function () {
          vw = window.innerWidth;
          vh = window.innerHeight;
          resizeParticleCanvas();
          /* clamp items into new viewport */
          for (var i = 0; i < items.length; i++) {
            if (items[i].x + items[i].w > vw) items[i].x = vw - items[i].w - 10;
            if (items[i].y + items[i].h > vh) items[i].y = vh - items[i].h - 10;
          }
        });

        /* ── INIT ── */
        createItems();
        requestAnimationFrame(tick);
        requestAnimationFrame(tickParticles);
      })();
    </script>
  </body>
</html>
