a(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.12),0 0 0 1px rgba(255,255,255,0.1);z-index:10;border-color:transparent}.play-item::before{content:"";position:absolute;inset:-2px;border-radius:12px;background:conic-gradient(from var(--hue-offset,0),#ff6b9d,#c44dff,#4d9fff,#4dffc3,#fff44d,#ff6b9d);z-index:-1;opacity:0;transition:opacity .4s ease;animation:prismaticSpin 4s linear infinite}.play-item:hover::before{opacity:1}@keyframes prismaticSpin{to{--hue-offset:360deg}}@property --hue-offset{syntax:"<angle>";initial-value:0;inherits:false}.play-item.expanded{position:fixed!important;top:50%!important;left:50%!important;transform:translate(-50%,-50%) scale(1)!important;z-index:1000!important;max-width:80vw;max-height:80vh;box-shadow:0 20px 80px rgba(0,0,0,0.8),0 0 60px rgba(120,80,220,0.15);border-radius:12px;border-color:rgba(255,255,255,0.15);animation:none!important}.play-item.expanded::before{opacity:.6}.play-item img,.play-item video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}.play-label{position:absolute;bottom:0;left:0;right:0;padding:12px 14px;background:linear-gradient(transparent,rgba(0,0,0,0.7));font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.6);opacity:0;transition:opacity .3s ease}.play-item:hover .play-label{opacity:1}.play-item.expanded .play-label{opacity:1;font-size:11px;padding:16px 20px}.expanded-label{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(10vh - 20px);z-index:1001;font-family:var(--font-head);font-size:18px;font-weight:500;color:rgba(255,255,255,0.7);letter-spacing:.04em;text-align:center;opacity:0;transition:opacity .4s ease .2s;pointer-events:none}.expanded-label.visible{opacity:1}#overlay{display:none;position:fixed;inset:0;background:rgba(5,5,7,0.8);z-index:999;cursor:pointer;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:opacity .3s ease}

gba(255,255,255,0.15)}.minimap-dot{position:absolute;border-radius:2px;background:rgba(255,255,255,0.25)}.minimap-viewport{position:absolute;border:1px solid rgba(255,255,255,0.5);border-radius:2px;background:rgba(255,255,255,0.05);transition:left .15s ease,top .15s ease}.grain{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:.04;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px 256px;animation:grainShift .3s steps(4) infinite}@keyframes grainShift{0%{transform:translate(0,0)}25%{transform:translate(-2px,3px)}50%{transform:translate(3px,-1px)}75%{transform:translate(-1px,-3px)}}</style> </head> <body> <nav class="nav"> <a href="/" class="nav-logo">Sid Mehta</a> <div class="nav-links"> <a href="/works/">Works</a> <a href="/play/" class="active">Play</a> <a href="/contact/">Contact</a> <a href="/about/">About</a> </div> </nav> <div id="overlay"></div> <div class="expanded-label" id="expandedLabel"></div> <div id="world"></div> <div class="minimap" id="minimap"> <div class="minimap-viewport" id="minimapViewport"></div> </div> <div class="play-hint" id="hint">Drag to explore · Click to expand · Double-click for surprises</div> <div class="play-coords" id="coords">0, 0</div> <div class="grain" aria-hidden="true"></div> <script>
      (function () {
        var world = document.getElementById("world");
        var overlay = document.getElementById("overlay");
        var hint = document.getElementById("hint");
        var coords = document.getElementById("coords");
        var minimap = document.getElementById("minimap");
        var minimapViewport = document.getElementById("minimapViewport");
        var expandedLabel = document.getElementById("expandedLabel");

        var WORLD_W = 6000;
        var WORLD_H = 6000;
        var MINIMAP_W = 120;
        var MINIMAP_H = 120;

        // === PALETTE ===
        var palette = ["#ff6b9d", "#4d9fff", "#4dffc3", "#c44dff", "#ff9f43", "#ffeb3b"];
        var depthColors = {
          1: "#ff6b9d",
          2: "#4d9fff",

        // === ITEM DATA ===
        var items = [

          {

            y: 150,
            w: 320,
            h: 240,
            src: "https://picsum.photos/seed/play2/640/480",

            depth: 1,

          {
            x: 1050,
            y: 400,
            w: 250,
            h: 350,

            label: "Texture Study",
            depth: 3,
          },
          {
            x: 350,
            y: 650,
            w: 360,
            h: 220,
            src: "https://picsum.photos/seed/play4/720/440",
            label: "Motion Test",
            depth: 2,
            type: "video",
          },
          {
            x: 800,
            y: 700,
            w: 300,
            h: 300,
            src: "https://picsum.photos/seed/play5/600/600",
            label: "Pattern",
            depth: 1,
          },
          {
            x: 1400,
            y: 200,
            w: 280,
            h: 180,
            src: "https://picsum.photos/seed/play6/560/360",
            label: "Interface",
            depth: 3,
          },
          {
            x: 1500,
            y: 550,
            w: 220,
            h: 320,
            src: "https://picsum.photos/seed/play7/440/640",
            label: "Portrait",
            depth: 2,
          },
          {
            x: 150,
            y: 1050,
            w: 340,
            h: 230,
            src: "https://picsum.photos/seed/play8/680/460",
            label: "Branding",
            depth: 1,
          },
          {
            x: 700,
            y: 1100,
            w: 270,
            h: 270,
            src: "https://picsum.photos/seed/play9/540/540",
            label: "3D Render",
            depth: 2,
          },
          {
            x: 1200,
            y: 900,
            w: 310,
            h: 200,
            src: "https://picsum.photos/seed/play10/620/400",
            label: "Spatial UI",
            depth: 3,
          },
          {
            x: 1800,
            y: 350,
            w: 260,
            h: 380,
            src: "https://picsum.photos/seed/play11/520/760",
            label: "AR Proto",
            depth: 1,
          },
          {
            x: 1700,
            y: 800,
            w: 330,
            h: 210,
            src: "https://picsum.photos/seed/play12/660/420",
            label: "VR Scene",
            depth: 2,
            type: "video",
          },
          {
            x: 450,
            y: 1400,
            w: 290,
            h: 290,
            src: "https://picsum.photos/seed/play13/580/580",
            label: "Illustration",
            depth: 3,
          },
          {
            x: 1100,
            y: 1300,
            w: 350,
            h: 240,
            src: "https://picsum.photos/seed/play14/700/480",
            label: "Collage",
            depth: 1,
          },
          {
            x: 2100,
            y: 200,
            w: 240,
            h: 340,
            src: "https://picsum.photos/seed/play15/480/680",
            label: "Experiment",
            depth: 2,
          },
          {
            x: 2000,
            y: 650,
            w: 300,
            h: 200,
            src: "https://picsum.photos/seed/play16/600/400",
            label: "Typography",
            depth: 3,
          },
          {
            x: 200,
            y: 1800,
            w: 320,
            h: 220,
            src: "https://picsum.photos/seed/play17/640/440",
            label: "Mood Board",
            depth: 1,
          },
          {
            x: 800,
            y: 1700,
            w: 280,
            h: 280,
            src: "https://picsum.photos/seed/play18/560/560",
            label: "Color Study",
            depth: 2,
          },
          {
            x: 1500,
            y: 1500,
            w: 350,
            h: 250,
            src: "https://picsum.photos/seed/play19/700/500",
            label: "Wireframe",
            depth: 1,
            type: "video",
          },
          {
            x: 2200,
            y: 1000,
            w: 270,
            h: 370,
            src: "https://picsum.photos/seed/play20/540/740",
            label: "Concept",
            depth: 3,
          },
        ];

        // === SCATTERED TEXT LABELS ===
        var scatterWords = ["PLAY", "CREATE", "EXPLORE", "IMAGINE", "BUILD", "DREAM"];
        scatterWords.forEach(function (word, i) {
          var el = document.createElement("div");
          el.className = "scatter-text";
          el.textContent = word;
          var sizes = [60, 80, 100, 120, 90, 70];
          el.style.fontSize = sizes[i] + "px";
          el.style.left = 300 + Math.random() * 2200 + "px";
          el.style.top = 200 + Math.random() * 1800 + "px";
          el.style.transform = "rotate(" + (Math.random() * 30 - 15) + "deg)";
          el.style.opacity = 0.03 + Math.random() * 0.05;
          var floatDur = 10 + Math.random() * 8;
          el.style.animation = "itemFloat " + floatDur + "s ease-in-out " + Math.random() * 5 + "s infinite";
          world.appendChild(el);
        });

        // === BUILD ITEMS ===
        var itemEls = [];
        var itemData = [];

        items.forEach(function (item, i) {
          var el = document.createElement("div");
          el.className = "play-item";
          el.setAttribute("data-depth", item.depth);

          // Depth-based sizing
          var scale = item.depth === 1 ? 1.1 : item.depth === 3 ? 0.8 : 1;
          var w = Math.round(item.w * scale);
          var h = Math.round(item.h * scale);

          el.style.left = item.x + "px";
          el.style.top = item.y + "px";
          el.style.width = w + "px";
          el.style.height = h + "px";

          // Random rotation
          var baseRotation = Math.random() * 10 - 5;
          el.dataset.baseRotation = baseRotation;

          // Float animation with random duration and delay
          var floatDur = 4 + Math.random() * 4;
          var floatDelay = Math.random() * 4;
          el.style.animation = "itemFloat " + floatDur + "s ease-in-out " + floatDelay + "s infinite";
          el.style.animationPlayState = "paused"; // start paused, enable on visible

          // Media element
          if (item.type === "video") {
            // Use image as poster, video behavior on hover
            var img = document.createElement("img");
            img.src = item.src;
            img.alt = item.label;
            img.loading = "lazy";
            el.appendChild(img);
            el.dataset.isVideo = "true";
          } else {
            var img = document.createElement("img");
            img.src = item.src;
            img.alt = item.label;
            img.loading = "lazy";
            el.appendChild(img);
          }

          var label = document.createElement("div");
          label.className = "play-label";
          label.textContent = item.label;
          el.appendChild(label);

          // Store data for physics
          itemEls.push(el);
          itemData.push({
            el: el,
            x: item.x,
            y: item.y,
            w: w,
            h: h,
            depth: item.depth,
            baseRotation: baseRotation,
            offsetX: 0,
            offsetY: 0,
            targetOffsetX: 0,
            targetOffsetY: 0,
            label: item.label,
            visible: false,
          });

          // Hover: remove rotation
          el.addEventListener("mouseenter", function () {
            el.dataset.hovered = "true";
          });
          el.addEventListener("mouseleave", function () {
            el.dataset.hovered = "false";
          });

          // Click to expand
          el.addEventListener("click", function (e) {
            if (moved) return; // dont expand after drag
            e.stopPropagation();
            if (el.classList.contains("expanded")) {
              closeExpanded();
            } else {
              closeExpanded();
              el.classList.add("expanded");
              overlay.classList.add("visible");
              expandedLabel.textContent = item.label;
              expandedLabel.classList.add("visible");
              // Ripple effect
              spawnRipple(e.clientX, e.clientY, depthColors[item.depth]);
            }
          });

          world.appendChild(el);
        });

        // === MINIMAP DOTS ===
        items.forEach(function (item) {
          var dot = document.createElement("div");
          dot.className = "minimap-dot";
          var scale = item.depth === 1 ? 1.1 : item.depth === 3 ? 0.8 : 1;
          dot.style.left = (item.x / WORLD_W) * MINIMAP_W + "px";
          dot.style.top = (item.y / WORLD_H) * MINIMAP_H + "px";
          dot.style.width = Math.max(2, ((item.w * scale) / WORLD_W) * MINIMAP_W) + "px";
          dot.style.height = Math.max(2, ((item.h * scale) / WORLD_H) * MINIMAP_H) + "px";
          minimap.appendChild(dot);
        });

        // === CLOSE EXPANDED ===
        function closeExpanded() {
          document.querySelectorAll(".play-item.expanded").forEach(function (el) {
            el.classList.remove("expanded");
          });
          overlay.classList.remove("visible");
          expandedLabel.textContent = "";
          expandedLabel.classList.remove("visible");
        }

        overlay.addEventListener("click", closeExpanded);

        // === PAN / DRAG ===
        var panX = -600;
        var panY = -400;
        var dragging = false;
        var startX, startY, startPanX, startPanY;
        var moved = false;

        function applyPan() {
          world.style.transform = "translate(" + panX + "px," + panY + "px)";
          coords.textContent = Math.round(-panX) + ", " + Math.round(-panY);
          updateMinimap();
        }
        applyPan();

        function updateMinimap() {
          var vw = window.innerWidth;
          var vh = window.innerHeight;
          var left = (-panX / WORLD_W) * MINIMAP_W;
          var top = (-panY / WORLD_H) * MINIMAP_H;
          var w = (vw / WORLD_W) * MINIMAP_W;
          var h = (vh / WORLD_H) * MINIMAP_H;
          minimapViewport.style.left = left + "px";
          minimapViewport.style.top = top + "px";
          minimapViewport.style.width = w + "px";
          minimapViewport.style.height = h + "px";
        }

        // Minimap click to jump
        minimap.addEventListener("click", function (e) {
          var rect = minimap.getBoundingClientRect();
          var mx = e.clientX - rect.left;
          var my = e.clientY - rect.top;
          var targetX = (mx / MINIMAP_W) * WORLD_W;
          var targetY = (my / MINIMAP_H) * WORLD_H;
          panX = -(targetX - window.innerWidth / 2);
          panY = -(targetY - window.innerHeight / 2);
          applyPan();
        });

        // Mouse panning
        document.addEventListener("mousedown", function (e) {
          if (e.target.closest(".nav") || e.target.closest(".play-item.expanded") || e.target.closest(".minimap")) return;
          dragging = true;
          moved = false;
          startX = e.clientX;
          startY = e.clientY;
          startPanX = panX;
          startPanY = panY;
        });

        var mouseX = 0;
        var mouseY = 0;

        document.addEventListener("mousemove", function (e) {
          mouseX = e.clientX;
          mouseY = e.clientY;

          if (!dragging) return;
          var dx = e.clientX - startX;
          var dy = e.clientY - startY;
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
          panX = startPanX + dx;
          panY = startPanY + dy;
          applyPan();

          // Glow trail during drag
          if (moved && Math.random() > 0.6) {
            spawnGlowDot(e.clientX - panX, e.clientY - panY);
          }
        });

        document.addEventListener("mouseup", function () {
          dragging = false;
        });

        // Scroll to pan
        document.addEventListener(
          "wheel",
          function (e) {
            e.preventDefault();
            panX -= e.deltaX;
            panY -= e.deltaY;
            applyPan();
          },
          { passive: false }
        );

        // === TOUCH SUPPORT ===
        var touchStartX, touchStartY, touchPanX, touchPanY, touchMoved;

        document.addEventListener(
          "touchstart",
          function (e) {
            if (e.target.closest(".nav") || e.target.closest(".play-item.expanded") || e.target.closest(".minimap")) return;
            var t = e.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
            touchPanX = panX;
            touchPanY = panY;
            touchMoved = false;
          },
          { passive: true }
        );

        document.addEventListener(
          "touchmove",
          function (e) {
            if (e.target.closest(".nav") || e.target.closest(".play-item.expanded")) return;
            e.preventDefault();
            var t = e.touches[0];
            var dx = t.clientX - touchStartX;
            var dy = t.clientY - touchStartY;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) touchMoved = true;
            panX = touchPanX + dx;
            panY = touchPanY + dy;
            applyPan();
          },
          { passive: false }
        );

        document.addEventListener("touchend", function (e) {
          if (!touchMoved && e.target.closest(".play-item")) {
            // Tap to expand — handled by click
          }
        });

        // === CURSOR MAGNETIC REPEL ===
        function updateRepel() {
          var vw = window.innerWidth;
          var vh = window.innerHeight;

          itemData.forEach(function (d) {
            if (d.el.classList.contains("expanded")) return;

            // Item center in screen coords
            var ix = d.x + d.w / 2 + panX;
            var iy = d.y + d.h / 2 + panY;

            var dx = ix - mouseX;
            var dy = iy - mouseY;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var repelRadius = 200;

            if (dist < repelRadius && dist > 0) {
              var force = (1 - dist / repelRadius) * 30;
              d.targetOffsetX = (dx / dist) * force;
              d.targetOffsetY = (dy / dist) * force;
            } else {
              d.targetOffsetX = 0;
              d.targetOffsetY = 0;
            }

            // Lerp
            d.offsetX += (d.targetOffsetX - d.offsetX) * 0.08;
            d.offsetY += (d.targetOffsetY - d.offsetY) * 0.08;

            // Apply combined transform
            var rot = d.baseRotation;
            if (d.el.dataset.hovered === "true") rot = 0;

            d.el.style.transform = "translate(" + d.offsetX.toFixed(1) + "px, " + d.offsetY.toFixed(1) + "px) rotate(" + rot.toFixed(1) + "deg)";
          });

          requestAnimationFrame(updateRepel);
        }
        requestAnimationFrame(updateRepel);

        // === VIEWPORT VISIBILITY CHECK ===
        function checkVisibility() {
          var vw = window.innerWidth;
          var vh = window.innerHeight;
          var margin = 100;

          itemData.forEach(function (d) {
            var sx = d.x + panX;
            var sy = d.y + panY;

            var inView = sx + d.w > -margin && sx < vw + margin && sy + d.h > -margin && sy < vh + margin;

            if (inView && !d.visible) {
              d.visible = true;
              d.el.classList.add("visible");
              d.el.style.animationPlayState = "running";
            }
          });

          requestAnimationFrame(checkVisibility);
        }
        requestAnimationFrame(checkVisibility);

        // === GLOW TRAIL ===
        function spawnGlowDot(wx, wy) {
          var dot = document.createElement("div");
          dot.className = "glow-dot";
          var color = palette[Math.floor(Math.random() * palette.length)];
          var size = 20 + Math.random() * 30;
          dot.style.width = size + "px";
          dot.style.height = size + "px";
          dot.style.background = color;
          dot.style.left = wx - size / 2 + "px";
          dot.style.top = wy - size / 2 + "px";
          world.appendChild(dot);
          setTimeout(function () {
            dot.remove();
          }, 2200);
        }

        // === RIPPLE PULSE ===
        function spawnRipple(cx, cy, color) {
          var r = document.createElement("div");
          r.className = "ripple";
          r.style.borderColor = color || "#fff";
          r.style.left = cx - 100 + "px";
          r.style.top = cy - 100 + "px";
          document.body.appendChild(r);
          setTimeout(function () {
            r.remove();
          }, 900);
        }

        // === EASTER EGG: DOUBLE-CLICK EMOJI ===
        var emojis = ["\uD83C\uDFA8", "\uD83C\uDFAE", "\uD83C\uDFB5", "\u2728", "\uD83D\uDD2E", "\uD83D\uDCAB", "\uD83C\uDF08", "\uD83C\uDFAA"];
        document.addEventListener("dblclick", function (e) {
          if (e.target.closest(".play-item") || e.target.closest(".nav")) return;
          var em = document.createElement("div");
          em.className = "float-emoji";
          em.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          em.style.left = e.clientX - 16 + "px";
          em.style.top = e.clientY - 16 + "px";
          document.body.appendChild(em);
          setTimeout(function () {
            em.remove();
          }, 2100);
        });

        // === EASTER EGG: RIGHT-CLICK CONFETTI ===
        document.addEventListener("contextmenu", function (e) {
          if (e.target.closest(".nav")) return;
          e.preventDefault();
          for (var i = 0; i < 20; i++) {
            var c = document.createElement("div");
            c.className = "confetti";
            c.style.background = palette[Math.floor(Math.random() * palette.length)];
            c.style.left = e.clientX + "px";
            c.style.top = e.clientY + "px";
            var angle = Math.random() * Math.PI * 2;
            var dist = 40 + Math.random() * 120;
            c.style.setProperty("--cx", Math.cos(angle) * dist + "px");
            c.style.setProperty("--cy", Math.sin(angle) * dist - 40 + "px");
            c.style.width = 4 + Math.random() * 6 + "px";
            c.style.height = 4 + Math.random() * 6 + "px";
            c.style.borderRadius = Math.random() > 0.5 ? "50%" : "1px";
            document.body.appendChild(c);
            setTimeout(
              (function (el) {
                return function () {
                  el.remove();
                };
              })(c),
              1600
            );
          }
        });

        // Hide hint after first interaction
        var hintHidden = false;
        document.addEventListener("mousemove", function () {
          if (!hintHidden && moved) {
            hint.style.opacity = "0";
            hintHidden = true;
          }
        });

        // ESC to close expanded
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            closeExpanded();
          }
        });
      })();
    </script> </body> </html>
