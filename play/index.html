    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --nav-h: 72px;
        --gutter: max(24px, 4vw);
        --font-head: "Inter", sans-serif;
        --font-mono: "DM Mono", monospace;
        --font-title: "Inter", sans-serif;
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        --cols: 4;
        --gap: 12px;
      }
      html {
        background: #0a0a0a;
        color: #fff;
        font-size: 16px;
      }
      body {
        font-family: var(--font-head);
        -webkit-font-smoothing: antialiased;
        cursor: none;
        min-height: 100vh;
      }
      a,
      button {
        cursor: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* NAV */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        overflow: hidden;
      }
      .nav::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: rgba(0, 0, 0, 0.16);
        backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        -webkit-backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }
      .nav > a { display: inline-flex; align-items: center; }
      .logo-cube { width: 24px; height: 24px; display: block; overflow: visible; color: rgba(180, 200, 230, 0.78); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); animation: logo-hue 14s ease-in-out infinite; }
      .nav > a:hover .logo-cube { transform: scale(1.08); }
      @keyframes logo-hue {
        0%, 100% { color: rgba(170, 200, 235, 0.78); }
        20% { color: rgba(160, 230, 220, 0.78); }
        40% { color: rgba(170, 235, 195, 0.78); }
        60% { color: rgba(180, 215, 240, 0.78); }
        80% { color: rgba(190, 230, 215, 0.78); }
      }
      .logo-eye { animation: logo-blink 9s ease-in-out infinite; transform-origin: center; opacity: 0.78; }
      @keyframes logo-blink { 0%, 95%, 100% { opacity: 0.78; } 97% { opacity: 0; } }
      
      
      
      
      
      
      
      
      
      
      
      
      .nav-links {
        display: flex;
        align-items: center;
        gap: 40px;
      }
      .nav-primary {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
      }
      .nav-secondary {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        transition: color 0.2s;
      }
      .nav-secondary:hover {
        color: rgba(255, 255, 255, 0.8);
      }
      .nav-icon + .nav-icon::before { content: ""; position: absolute; left: -20px; top: 50%; width: 2px; height: 2px; background: rgba(255, 255, 255, 0.18); border-radius: 50%; transform: translateY(-50%); pointer-events: none; }
      .nav-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px; height: 36px;
        position: relative; opacity: 0.45; transition: opacity 0.25s ease;
      }
      .nav-icon:hover, .nav-icon.is-active { opacity: 1; }
      .nav-icon img {
        width: 36px; height: 36px;
        display: block;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
      }

      /* HEADER */
      .play-header {
        padding: calc(var(--nav-h) + 100px) var(--gutter) 24px; /* extra top space — was getting cropped under nav */
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      @keyframes playFadeUp {
        from { opacity: 0; transform: translateY(16px); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      .play-title {
        font-family: var(--font-title);
        font-size: clamp(48px, 7vw, 88px); /* normalized to the site-wide page-title scale (works/now/about) */
        font-weight: 300;
        letter-spacing: -0.025em;
        line-height: 1;
        opacity: 0;
        animation: playFadeUp 0.7s var(--ease-out) 0.1s forwards;
      }
      .play-count {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.32);
        opacity: 0;
        animation: playFadeUp 0.7s var(--ease-out) 0.25s forwards;
      }

      /* PLAY FILTER PILLS — sits naturally below header (was sticky; was following the user awkwardly) */
      .play-filter {
        padding: 12px var(--gutter);
        margin-bottom: 28px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        opacity: 0;
        animation: playFadeUp 0.7s var(--ease-out) 0.4s forwards;
        border-radius: 14px;
        border: 1px solid transparent;
      }
      .pf-btn {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 6px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: transparent;
        color: rgba(255, 255, 255, 0.5);
        border-radius: 999px;
        cursor: none;
        transition: all 0.3s var(--ease-out);
      }
      .pf-btn:hover {
        border-color: rgba(160, 200, 255, 0.4);
        color: rgba(220, 240, 255, 0.95);
        transform: translateY(-1px);
      }
      .pf-btn.active {
        border-color: rgba(180, 220, 255, 0.5);
        color: #fff;
        background: rgba(160, 200, 255, 0.08);
      }
      .pf-btn-count {
        margin-left: 6px;
        opacity: 0.55;
      }

      /* LIGHTBOX ARROWS + COUNTER */
      .lb-prev,
      .lb-next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: rgba(255, 255, 255, 0.85);
        font-size: 22px;
        line-height: 1;
        cursor: none;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .lb-prev {
        left: 24px;
      }
      .lb-next {
        right: 24px;
      }
      .lb-prev:hover {
        transform: translateY(-50%) scale(1.06);
        background: rgba(255, 255, 255, 0.14);
      }
      .lb-next:hover {
        transform: translateY(-50%) scale(1.06);
        background: rgba(255, 255, 255, 0.14);
      }
      .lb-counter {
        position: absolute;
        top: 24px;
        left: 24px;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.16em;
        color: rgba(255, 255, 255, 0.5);
        z-index: 5;
      }
      @media (max-width: 600px) {
        /* Keep prev/next visible on phones — was display:none which left users
           with no way to navigate the lightbox. Smaller + closer to edges. */
        .lb-prev,
        .lb-next {
          display: flex;
          width: 38px;
          height: 38px;
          font-size: 18px;
          background: rgba(0, 0, 0, 0.5);
          border-color: rgba(255, 255, 255, 0.22);
        }
        .lb-prev {
          left: 12px;
        }
        .lb-next {
          right: 12px;
        }
        .lb-counter {
          top: 16px;
          left: 16px;
          font-size: 10px;
        }
      }

      /* WALL REVEAL — cursor spotlight (bottom of page) */
      .wall-reveal {
        position: relative;
        width: 100%;
        height: 90vh;
        overflow: hidden;
        margin: 80px 0 60px;
        cursor: none;
        background: transparent;
      }
      #wall-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .wall-hint {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: var(--font-mono);
        font-size: clamp(13px, 1.1vw, 15px);
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
        pointer-events: none;
        transition: opacity 0.6s ease;
        z-index: 2;
        white-space: nowrap;
      }
      .wall-hint.fade {
        opacity: 0;
      }

      /* MASONRY — CSS Grid w/ JS-computed row spans (allows featured items to span 2 cols in flow) */
      .masonry {
        padding: 0 var(--gutter);
        display: grid;
        grid-template-columns: repeat(var(--cols), 1fr);
        grid-auto-rows: 8px;
        grid-auto-flow: dense;
        gap: var(--gap);
      }
      .card {
        border-radius: 10px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03);
        cursor: none;
        /* Larger default placeholder span so masonry doesn't reflow as dramatically when
           images load (was span 14 → forced massive layout shift on every load) */
        grid-row-end: span 20;
        align-self: start;
        /* Light entry — opacity + tiny lift only. The previous combo (blur 14px + scale 0.94 +
           clip-path inset 50%) forced 200+ cards to composite separate filter/transform/clip
           layers simultaneously, which dad's machine couldn't keep up with. */
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.5s var(--ease-out),
          transform 0.5s var(--ease-out);
        position: relative;
        /* Tell the browser it can skip rendering work for cards that aren't on screen.
           contain-intrinsic-size gives a placeholder size so layout still computes correctly
           without painting. Massive perf win on a page with 200+ tiles. */
        content-visibility: auto;
        contain-intrinsic-size: auto 240px;
      }
      /* Skeleton — quiet warm-grey while img/video haven't fired .loaded yet.
         Was an animated shimmer running on every loading card simultaneously; with 200+ cards
         that's 200+ rAF-driven background-position transitions. Replaced with a static fill —
         user reads "loading" instantly without the perf tax. */
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.025);
        z-index: 1;
        pointer-events: none;
        opacity: 1;
        transition: opacity 0.4s var(--ease-out);
        border-radius: inherit;
      }
      .card:has(img.loaded)::before,
      .card:has(video.loaded)::before {
        opacity: 0;
      }
      @media (prefers-reduced-motion: reduce) {
        .card::before { animation: none; }
      }
      .card.reveal-in {
        opacity: 1;
        transform: translateY(0);
      }
      .card img,
      .card video {
        opacity: 0;
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        border-radius: 10px;
        transition: opacity 0.4s var(--ease-out);
        /* will-change: mix-blend-mode was promoting all 200+ images to their own composite
           layers permanently — major memory pressure. Removed; the hover-effect transition
           still works fine without it. */
      }
      .card img.loaded,
      .card video.loaded {
        opacity: 1;
      }

      /* ── SCROLL EDGE FADE ── content fades at top + bottom of viewport.
         Used to use backdrop-filter: blur(14px) which re-blurred the whole page on every
         scroll frame — single biggest cause of jank on this page. Replaced with a solid-color
         gradient overlay that achieves the same fade without the GPU cost. */
      .scroll-edge {
        position: fixed;
        left: 0;
        right: 0;
        height: 110px;
        pointer-events: none;
        z-index: 50;
      }
      .scroll-edge--top {
        top: var(--nav-h);
        background: linear-gradient(180deg, #0a0a0a 0%, rgba(10, 10, 10, 0.7) 50%, transparent 100%);
      }
      .scroll-edge--bottom {
        bottom: 0;
        background: linear-gradient(0deg, #0a0a0a 0%, rgba(10, 10, 10, 0.7) 50%, transparent 100%);
      }
      @media (max-width: 600px) {
        .scroll-edge { height: 70px; }
      }
      @media (prefers-reduced-motion: reduce) {
        .scroll-edge { display: none; }
        .card { opacity: 1; transform: none; transition: none; }
      }

      /* Featured cards — 2 columns wide, stay in grid flow as landscape highlights */
      .card--featured {
        grid-column: span 2;
        grid-row-end: span 22;
      }

      /* Breathing — applied after entrance. Now with gentle left-right sway too. */
      @keyframes float1 {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(2px, -2px); }
        50% { transform: translate(0, -4px); }
        75% { transform: translate(-2px, -2px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        33% { transform: translate(-3px, -2px) rotate(-0.15deg); }
        66% { transform: translate(3px, -3px) rotate(0.15deg); }
      }
      @keyframes float3 {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(2px, -5px); }
      }
      @keyframes float4 {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-3px, -3px); }
      }
      .card.f1 { animation: float1 7s ease-in-out infinite; }
      .card.f2 { animation: float2 8.5s ease-in-out infinite; }
      .card.f3 { animation: float3 9s ease-in-out infinite; }
      .card.f4 { animation: float4 7.8s ease-in-out infinite; }

      /* LIGHTBOX */
      .lb {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 500;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .lb.open {
        opacity: 1;
      }
      .lb-bg {
        position: absolute;
        inset: 0;
        background: rgba(10, 10, 10, 0.88);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
      }
      .lb img {
        position: relative;
        z-index: 1;
        max-width: 92vw;
        max-height: 90vh;
        object-fit: contain;
        border-radius: 10px;
        transform: scale(0.96);
        transition: transform 0.4s var(--ease-out);
      }
      .lb.open img {
        transform: scale(1);
      }
      .lb-x {
        position: absolute;
        top: 18px;
        right: 22px;
        z-index: 2;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.45);
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        cursor: none;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .lb-x:hover {
        border-color: rgba(255, 255, 255, 0.4);
        color: #fff;
      }

      /* FOOTER */
      .play-footer {
        padding: 40px var(--gutter) 32px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        margin-top: 32px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 24px;
      }
      .pf-text {
        font-family: var(--font-mono);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.32);
        letter-spacing: 0.08em;
      }
      .pf-social { display: flex; gap: 18px; justify-content: center; }
      .pf-social a { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255, 255, 255, 0.4); transition: color 0.25s ease; position: relative; }
      .pf-social a::after { content: ""; position: absolute; left: 0; right: 0; bottom: -3px; height: 1px; background: currentColor; opacity: 0; transform: scaleX(0.3); transform-origin: center; transition: opacity 0.25s ease, transform 0.3s var(--ease-out); }
      .pf-social a:hover { color: rgba(255, 255, 255, 0.85); }
      .pf-social a:hover::after { opacity: 0.6; transform: scaleX(1); }
      .pf-cta { justify-self: end; }
      .pf-cta {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 10px 24px;
        color: rgba(255, 255, 255, 0.42);
        transition:
          border-color 0.3s,
          color 0.3s;
        position: relative;
      }
      .pf-cta::before,
      .pf-cta::after {
        content: "";
        position: absolute;
        width: 5px;
        height: 5px;
        border-color: rgba(255, 255, 255, 0.3);
        border-style: solid;
      }
      .pf-cta::before {
        top: -1px;
        left: -1px;
        border-width: 1px 0 0 1px;
      }
      .pf-cta::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 1px 1px 0;
      }
      .pf-cta:hover {
        border-color: rgba(255, 255, 255, 0.5);
        color: #fff;
      }

      @media (max-width: 1100px) {
        :root {
          --cols: 3;
        }
      }
      @media (max-width: 720px) {
        :root {
          --cols: 2;
          --gap: 10px;
        }
        .nav-links {
          gap: 12px;
        }
      }
      @media (max-width: 600px) {
        :root { --nav-h: 56px; }
        .nav { padding: 0 16px; }
        .nav-links { gap: 14px; }
        .nav-icon, .nav-icon img { width: 26px; height: 26px; }
        
      }
      @media (max-width: 480px) {
        :root {
          --cols: 2;
          --gap: 8px;
        }
        .play-header {
          flex-direction: column;
          gap: 6px;
        }
        .play-footer {
          flex-direction: column;
          gap: 16px;
          text-align: center;
        }
      }
      a:focus-visible,
      button:focus-visible {
        outline: 2px solid rgba(100, 160, 255, 0.6);
        outline-offset: 3px;
        border-radius: 2px;
      }
      :focus:not(:focus-visible) {
        outline: none;
      }
      a:focus-visible,
      button:focus-visible {
        outline: 2px solid rgba(100, 160, 255, 0.6);
        outline-offset: 3px;
        border-radius: 2px;
      }
      :focus:not(:focus-visible) {
        outline: none;
      }

      /* ── LIGHT MODE ── cream backdrop + dark text. Tile media stays vivid; chrome flips. */
      html[data-theme="light"] {
        background: #f5f3ee;
        color: #07090f;
      }
      html[data-theme="light"] body {
        background: #f5f3ee;
        color: #07090f;
      }
      html[data-theme="light"] .play-count {
        color: rgba(7, 9, 15, 0.5);
      }
      html[data-theme="light"] .pf-btn {
        border-color: rgba(7, 9, 15, 0.18);
        color: rgba(7, 9, 15, 0.62);
      }
      html[data-theme="light"] .pf-btn:hover {
        border-color: rgba(40, 90, 180, 0.6);
        color: rgba(7, 9, 15, 0.92);
      }
      html[data-theme="light"] .pf-btn.active {
        border-color: rgba(40, 90, 180, 0.7);
        background: rgba(40, 90, 180, 0.08);
        color: #07090f;
      }
      html[data-theme="light"] .play-filter {
        border-color: transparent;
      }
      /* Tile chrome — borders/backgrounds get a soft warm-paper tint instead of dark */
      html[data-theme="light"] .card {
        background: rgba(7, 9, 15, 0.04);
      }
      html[data-theme="light"] .scroll-edge--top {
        background: linear-gradient(to bottom, #f5f3ee, transparent);
      }
      html[data-theme="light"] .scroll-edge--bottom {
        background: linear-gradient(to top, #f5f3ee, transparent);
      }
      /* Wall reveal hint — dark text on cream */
      html[data-theme="light"] .wall-hint {
        color: rgba(7, 9, 15, 0.5);
      }
      /* Lightbox stays dark in both modes (full-screen media viewer reads better on black) */
    </style>
  </head>
  <body>
    <nav class="nav">
      <a href="{{ site.baseurl }}/">
        <svg class="logo-cube" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" aria-hidden="true">
            <path d="M5 9 L9 5 L23 5 L19 9 Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M19 9 L23 5 L23 19 L19 23 Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <rect x="5" y="9" width="14" height="14" fill="#000" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <rect class="logo-eye" x="8.7" y="13" width="1" height="5" fill="currentColor" rx="0.2"/>
            <rect class="logo-eye" x="14.3" y="13" width="1" height="5" fill="currentColor" rx="0.2"/>
          </svg>

        // doesn't fight the user's wheel and stutter. setTimeout pattern removed (was racing rAF).
        (function () {
          var lastInteraction = Date.now();
          var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          var isTouch = window.matchMedia && window.matchMedia("(hover: none), (pointer: coarse)").matches;
          if (prefersReduced || isTouch) return;
          ["mousemove", "touchstart", "wheel", "keydown", "click", "pointerdown"].forEach(function (ev) {
            window.addEventListener(ev, function () {
              lastInteraction = Date.now();
            }, { passive: true });
          });
          var indicator = document.createElement("div");
          indicator.id = "play-autoscroll-indicator";
          indicator.textContent = "AUTO · MOVE TO PAUSE";
          document.body.appendChild(indicator);
          var indicatorVisible = false;
          var subPx = 0; // accumulate fractional pixels so we scroll smoothly even at <1px/frame
          var lastT = performance.now();
          function tick(now) {
            requestAnimationFrame(tick);
            var dt = (now - lastT) / 1000; // seconds since last frame
            lastT = now;
            var idle = Date.now() - lastInteraction > 2200;
            var atBottom = window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 8;
            if (idle && !atBottom) {
              // Target ~50px/sec — slow but visibly continuous (was 36px/sec)
              subPx += 50 * dt;
              if (subPx >= 1) {
                var px = Math.floor(subPx);
                subPx -= px;
                window.scrollBy(0, px);
              }
              if (!indicatorVisible) {
                indicator.classList.add("is-visible");
                indicatorVisible = true;
              }
            } else {
              subPx = 0;
              if (indicatorVisible) {
                indicator.classList.remove("is-visible");
                indicatorVisible = false;
              }
            }
          }
          requestAnimationFrame(tick);
        })();

        // Lightbox
        var lb = document.getElementById("lb");
        var lbImg = document.getElementById("lb-img");

        var lbVid = document.getElementById("lb-video");
        // Lightbox — index-aware so ←/→ traverse the currently-visible (filtered) items
        var lbCounter = document.getElementById("lb-counter");
        var lbCurrent = -1;
        function visibleItemIdxs() {
          // Returns array of original-list indices for cards currently displayed (respecting filter)
          var out = [];
          masonry.querySelectorAll(".card").forEach(function (c) {
            if (c.style.display !== "none") out.push(parseInt(c.dataset.idx, 10));
          });
          return out;
        }
        function openLbByIdx(idx) {
          var visible = visibleItemIdxs();
          var pos = visible.indexOf(idx);
          if (pos < 0) return;
          lbCurrent = idx;
          var item = items[idx];
          if (item.type === "vid" && lbVid) {
            lbImg.style.display = "none";
            lbVid.style.display = "block";
            lbVid.src = item.src;
            lbVid.play().catch(function () {});
          } else {
            if (lbVid) {
              lbVid.style.display = "none";
              lbVid.pause();
              lbVid.src = "";
            }
            lbImg.style.display = "";
            lbImg.src = item.src;
          }
          if (lbCounter) lbCounter.textContent = pos + 1 + " / " + visible.length;
          lb.style.display = "flex";
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              lb.classList.add("open");
            });
          });
        }
        function lbStep(dir) {
          var visible = visibleItemIdxs();
          if (!visible.length) return;
          var pos = visible.indexOf(lbCurrent);
          if (pos < 0) return;
          var nextPos = (pos + dir + visible.length) % visible.length;
          openLbByIdx(visible[nextPos]);
        }
        function closeLb() {
          lb.classList.remove("open");
          setTimeout(function () {
            lb.style.display = "none";
            lbImg.src = "";
            if (lbVid) {
              lbVid.pause();
              lbVid.src = "";
              lbVid.style.display = "none";
            }
            lbCurrent = -1;
          }, 300);
        }
        lb.querySelector(".lb-bg").addEventListener("click", closeLb);
        lb.querySelector(".lb-x").addEventListener("click", closeLb);
        var lbPrev = document.getElementById("lb-prev");
        var lbNext = document.getElementById("lb-next");
        if (lbPrev) lbPrev.addEventListener("click", function () { lbStep(-1); });
        if (lbNext) lbNext.addEventListener("click", function () { lbStep(1); });
        document.addEventListener("keydown", function (e) {
          if (!lb.classList.contains("open")) return;
          if (e.key === "Escape") closeLb();
          else if (e.key === "ArrowLeft") lbStep(-1);
          else if (e.key === "ArrowRight") lbStep(1);
        });
        // Touch swipe — left/right anywhere on the lightbox steps prev/next
        var tStartX = 0, tStartY = 0, tStartT = 0;
        lb.addEventListener("touchstart", function (e) {
          if (!e.touches || !e.touches[0]) return;
          tStartX = e.touches[0].clientX;
          tStartY = e.touches[0].clientY;
          tStartT = Date.now();
        }, { passive: true });
        lb.addEventListener("touchend", function (e) {
          if (!e.changedTouches || !e.changedTouches[0]) return;
          var dx = e.changedTouches[0].clientX - tStartX;
          var dy = e.changedTouches[0].clientY - tStartY;
          var dt = Date.now() - tStartT;
          // Only treat as swipe if mostly horizontal, ≥40px, ≤600ms
          if (dt > 600) return;
          if (Math.abs(dx) < 40) return;
          if (Math.abs(dx) < Math.abs(dy) * 1.4) return;
          lbStep(dx < 0 ? 1 : -1);
        }, { passive: true });

        // ── FILTER PILLS ── filter by media type, update count
        (function () {
          var counts = { all: items.length, img: 0, vid: 0, gif: 0 };
          items.forEach(function (it) {
            counts[it.pf]++;
          });
          var countEl = document.getElementById("play-count");
          if (countEl) countEl.textContent = items.length + " pieces";
          document.querySelectorAll("[data-pf-count]").forEach(function (el) {
            var t = el.getAttribute("data-pf-count");
            if (counts[t] != null) el.textContent = " · " + counts[t];
          });
          // Sticky filter bar — frosted bg when scrolled
          (function () {
            var bar = document.querySelector(".play-filter");
            if (!bar) return;
            var sentinel = document.createElement("div");
            sentinel.style.cssText = "height:1px;position:relative;top:-1px";
            bar.parentNode.insertBefore(sentinel, bar);
            new IntersectionObserver(
              function (entries) {
                entries.forEach(function (e) {
                  bar.classList.toggle("is-stuck", !e.isIntersecting);
                });
              },
              { threshold: 0, rootMargin: "-65px 0px 0px 0px" }
            ).observe(sentinel);
          })();
          document.querySelectorAll(".pf-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
              var f = btn.dataset.pf;
              document.querySelectorAll(".pf-btn").forEach(function (b) {
                b.classList.toggle("active", b === btn);
              });
              masonry.querySelectorAll(".card").forEach(function (c) {
                if (f === "all" || c.dataset.pf === f) {
                  c.style.display = "";
                } else {
                  c.style.display = "none";
                }
              });
              // Recompute row spans after filter change
              setTimeout(recomputeAll, 50);
            });
          });
        })();

        // Nav scroll
        window.addEventListener(
          "scroll",
          function () {
            document.querySelector(".nav").classList.toggle("nav--scrolled", window.scrollY > 20);
          },
          { passive: true }
        );

        // Wall reveal — Sherlock magnifying-glass: only the area under the cursor shows
        (function () {
          var container = document.getElementById("wall-reveal");
          var canvas = document.getElementById("wall-canvas");
          if (!container || !canvas) return;
          var ctx = canvas.getContext("2d");

          var img = new Image();
          img.src = "{{ site.baseurl }}/play/assets/wall.jpg";
          var mx = -500, my = -500;
          var inside = false;
          var radius = 130;
          var rendered = { mx: mx, my: my, opacity: 0 };

          function resize() {
            var dpr = window.devicePixelRatio || 1;
            canvas.width = container.offsetWidth * dpr;
            canvas.height = container.offsetHeight * dpr;
            canvas.style.width = container.offsetWidth + "px";
            canvas.style.height = container.offsetHeight + "px";
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          }
          resize();
          window.addEventListener("resize", resize);

          var hint = document.getElementById("wall-hint");
          var hintFaded = false;
          container.addEventListener("mousemove", function (e) {
            if (!hintFaded && hint) { hint.classList.add("fade"); hintFaded = true; }
            var r = container.getBoundingClientRect();
            mx = e.clientX - r.left;
            my = e.clientY - r.top;
            inside = true;
          });
          container.addEventListener("mouseleave", function () { inside = false; });

          // Pause the rAF loop entirely when the wall section is off-screen — saves the
          // 60fps tick from running during the (vast majority of) time the user is browsing
          // the masonry grid above. Resumes when the wall scrolls into view.
          var visible = false, rafId = 0;
          var visObs = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) {
              if (e.isIntersecting && !visible) {
                visible = true;
                if (!rafId) rafId = requestAnimationFrame(draw);
              } else if (!e.isIntersecting && visible) {
                visible = false;
                if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
              }
            });
          }, { threshold: 0 });
          visObs.observe(container);
          // Also pause when the tab is hidden
          document.addEventListener("visibilitychange", function () {
            if (document.hidden && rafId) { cancelAnimationFrame(rafId); rafId = 0; }
            else if (!document.hidden && visible && !rafId) rafId = requestAnimationFrame(draw);
          });

          function draw() {
            rafId = visible && !document.hidden ? requestAnimationFrame(draw) : 0;
            var w = container.offsetWidth, h = container.offsetHeight;
            ctx.clearRect(0, 0, w, h);
            if (!img.complete || !img.naturalWidth) return;

            // Smooth follow + opacity fade
            rendered.mx += (mx - rendered.mx) * 0.22;
            rendered.my += (my - rendered.my) * 0.22;
            var targetOpacity = inside ? 1 : 0;
            rendered.opacity += (targetOpacity - rendered.opacity) * 0.12;
            if (rendered.opacity < 0.01) return;

            // Fit image cover
            var imgRatio = img.naturalWidth / img.naturalHeight;
            var canRatio = w / h;
            var iw, ih, ox, oy;
            if (imgRatio > canRatio) { ih = h; iw = h * imgRatio; ox = (w - iw) / 2; oy = 0; }
            else { iw = w; ih = w / imgRatio; ox = 0; oy = (h - ih) / 2; }

            // Draw circular spotlight
            ctx.save();
            ctx.globalAlpha = rendered.opacity;
            ctx.beginPath();
            ctx.arc(rendered.mx, rendered.my, radius, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(img, ox, oy, iw, ih);
            ctx.restore();

            // Soft white ring around the lens for that detective-glass feel
            ctx.save();
            ctx.globalAlpha = rendered.opacity * 0.6;
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(rendered.mx, rendered.my, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
          // No initial draw() call — the IntersectionObserver above kicks off the loop
          // only when the wall section actually scrolls into view.
        })();
      })();
    </script>

    <svg style="position: absolute; width: 0; height: 0; overflow: hidden" aria-hidden="true">
      <defs>
        <filter id="glass-refract" x="-5%" y="-30%" width="110%" height="160%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.007 0.048" numOctaves="1" seed="9" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
  </body>
</html>
