lass="nav"> <a href="/"> <div class="cube-scene"> <div class="cube"> <div class="cube-face cube-front"></div> <div class="cube-face cube-back"></div> <div class="cube-face cube-left"></div> <div class="cube-face cube-right"></div> <div class="cube-face cube-top"></div> <div class="cube-face cube-bottom"></div> </div> </div> </a> <div class="nav-links"> <a href="/works/" class="nav-icon" aria-label="Work" title="Work"><img src="/assets/img/nav/cube.png" alt="Work"></a> <a href="/play/" class="nav-icon is-active" aria-label="Play" title="Play"><img src="/assets/img/nav/flower.png" alt="Play"></a> <a href="/contact/" class="nav-icon" aria-label="Contact" title="Contact"><img src="/assets/img/nav/sparkle.png" alt="Contact"></a> <a href="/about/" class="nav-icon" aria-label="About" title="About"><img src="/assets/img/nav/cross.png" alt="About"></a> </div> </nav> <div class="play-header"> <h1 class="play-title">Play</h1> <span class="play-count">127 pieces</span> </div> <div class="masonry" id="masonry"></div> <div class="wall-reveal" id="wall-reveal"> <canvas id="wall-canvas"></canvas> <div class="wall-hint" id="wall-hint">Play with your cursor</div> </div> <div class="lb" id="lb"> <div class="lb-bg"></div> <img id="lb-img" src="" alt=""> <button class="lb-x" aria-label="Close">✕</button> </div> <footer class="play-footer"> <span class="pf-text">Intellectual Property of Siddharth Mehta</span> <a href="/contact/" class="pf-cta">Get in Touch →</a> </footer> <style>@media(hover:hover) and (pointer:fine){*{cursor:none!important}}#cur-dot{position:fixed;width:12px;height:12px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:99999;background:radial-gradient(circle,rgba(255,255,255,0.9) 0%,rgba(160,210,255,0.5) 40%,rgba(80,150,240,0.15) 70%,transparent 100%);box-shadow:0 0 8px 2px rgba(120,180,255,0.3),0 0 20px 4px rgba(80,140,240,0.12);will-change:left,top;opacity:0;transition:opacity .2s}@media(hover:none),(pointer:coarse){*,*::before,*::after{cursor:auto!important}#cur-dot{display:none!important}}</style> <div id="cur-dot"></div> <script>
  (function () {
    const dot = document.getElementById("cur-dot");
    if (!dot) return;

    let mx = -100,
      my = -100,
      alive = false;
    window.__cursorX = -100;
    window.__cursorY = -100;

    document.addEventListener(
      "mousemove",
      (e) => {
        mx = e.clientX;
        my = e.clientY;
        window.__cursorX = mx;
        window.__cursorY = my;
        if (!alive) {
          alive = true;
          dot.style.opacity = "1";
        }
      },
      { passive: true }
    );

    document.addEventListener("mouseleave", () => {
      alive = false;
      dot.style.opacity = "0";
    });
    document.addEventListener("mouseenter", () => {
      alive = true;
      dot.style.opacity = "1";
    });

    (function loop() {
      requestAnimationFrame(loop);
      dot.style.left = mx + "px";
      dot.style.top = my + "px";
    })();
  })();

  // ── FLOATING DUST ──
  (function () {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;";
    document.body.appendChild(canvas);
    const ctx = canvas.getContext("2d");
    let dpr = 1;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }
    resize();
    window.addEventListener("resize", resize, { passive: true });

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    let lastScroll = window.scrollY;

    let pageVisible = true;
    document.addEventListener("visibilitychange", () => {
      pageVisible = !document.hidden;
    });

    const pts = Array.from({ length: 80 }, (_, i) => {
      const isMote = i < 12;
      return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.1,
        vy: -Math.random() * 0.06 - 0.01,
        r: isMote ? Math.random() * 1.1 + 0.6 : Math.random() * 0.5 + 0.2,
        a: isMote ? Math.random() * 0.12 + 0.06 : Math.random() * 0.08 + 0.02,
        ph: Math.random() * Math.PI * 2,
        spd: Math.random() * 0.006 + 0.003,
        depth: 0.3 + Math.random() * 0.7,
      };
    });

    (function draw() {
      requestAnimationFrame(draw);
      if (!pageVisible) return;
      ctx.clearRect(0, 0, W(), H());

      const curScroll = window.scrollY;
      const scrollDelta = curScroll - lastScroll;
      lastScroll = curScroll;

      const cmx = window.__cursorX || -200;
      const cmy = window.__cursorY || -200;

      for (const p of pts) {
        p.x += p.vx;
        p.y += p.vy;
        p.ph += p.spd;
        p.y -= scrollDelta * p.depth * 0.15;

        const cdx = p.x - cmx,
          cdy = p.y - cmy;
        const cDist = Math.sqrt(cdx * cdx + cdy * cdy);
        if (cDist < 120 && cDist > 0) {
          const push = ((120 - cDist) / 120) * 0.18;
          p.x += (cdx / cDist) * push;
          p.y += (cdy / cDist) * push;
        }

        if (p.y < -4) {
          p.y = H() + 4;
          p.x = Math.random() * W();
        }
        if (p.y > H() + 4) {
          p.y = -4;
          p.x = Math.random() * W();
        }
        if (p.x < -4) p.x = W() + 4;
        if (p.x > W() + 4) p.x = -4;

        const alpha = p.a * (0.45 + 0.55 * Math.sin(p.ph));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(180,190,210,0.7)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    })();
  })();

      (function () {
        var masonry = document.getElementById("masonry");
        var floats = ["f1", "f2", "f3"];
        var base = "";

        // Define all items: images p1-p98, videos v1-v36, gifs at p16 and p74
        var items = [];

        // Images
        for (var i = 1; i <= 98; i++) {
          var ext = i === 16 || i === 74 ? "gif" : "jpg";
          items.push({ type: "img", src: base + "/play/assets/p" + i + "." + ext });
        }

        // Insert videos spread throughout
        var vids = [];
        for (var vi = 1; vi <= 36; vi++) {
          vids.push({ type: "vid", src: base + "/play/assets/v" + vi + ".mp4" });
        }
        // Spread videos evenly
        for (var v = 0; v < vids.length; v++) {
          var pos = 3 + v * 4;
          if (pos > items.length) pos = items.length;
          items.splice(pos, 0, vids[v]);
        }

        // Build DOM
        items.forEach(function (item, idx) {
          var card = document.createElement("div");
          card.className = "card";
          card.setAttribute("data-float", floats[idx % 3]);

          if (item.type === "vid") {
            var video = document.createElement("video");
            video.src = item.src;
            video.autoplay = true;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            video.preload = "metadata";
            card.appendChild(video);
          } else {
            var img = document.createElement("img");
            img.src = item.src;
            img.alt = "Play";
            img.loading = idx < 16 ? "eager" : "lazy";
            card.appendChild(img);
            card.addEventListener("click", function (e) {
              openLb(e.currentTarget.querySelector("img").src);
            });
          }

          masonry.appendChild(card);
        });

        // Intersection observer — fade in + start breathing
        var obs = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (e) {
              if (e.isIntersecting) {
                var el = e.target;
                el.classList.add("vis");
                setTimeout(function () {
                  var f = el.getAttribute("data-float");
                  if (f) el.classList.add(f);
                }, 700);
                obs.unobserve(el);
              }
            });
          },
          { threshold: 0.05, rootMargin: "80px" }
        );

        document.querySelectorAll(".card").forEach(function (c) {
          obs.observe(c);
        });

        // Lightbox
        var lb = document.getElementById("lb");
        var lbImg = document.getElementById("lb-img");

        function openLb(src) {
          lbImg.src = src;
          lb.style.display = "flex";
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              lb.classList.add("open");
            });
          });
        }
        function closeLb() {
          lb.classList.remove("open");
          setTimeout(function () {
            lb.style.display = "none";
            lbImg.src = "";
          }, 300);
        }
        lb.querySelector(".lb-bg").addEventListener("click", closeLb);
        lb.querySelector(".lb-x").addEventListener("click", closeLb);
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && lb.classList.contains("open")) closeLb();
        });

        // Nav scroll
        window.addEventListener(
          "scroll",
          function () {
            document.querySelector(".nav").classList.toggle("nav--scrolled", window.scrollY > 20);
          },
          { passive: true }
        );

        // Wall reveal — cursor spotlight, revealed areas stay
        (function () {
          var container = document.getElementById("wall-reveal");
          var canvas = document.getElementById("wall-canvas");
          if (!container || !canvas) return;
          var ctx = canvas.getContext("2d");

          // Mask canvas — tracks revealed areas
          var maskCanvas = document.createElement("canvas");
          var maskCtx = maskCanvas.getContext("2d");

          var img = new Image();
          img.src = "/play/assets/wall.jpg";
          var mx = -200,
            my = -200;
          var radius = 100;

          function resize() {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            maskCanvas.width = canvas.width;
            maskCanvas.height = canvas.height;
          }
          resize();
          window.addEventListener("resize", resize);

          var hint = document.getElementById("wall-hint");
          var hintFaded = false;
          container.addEventListener("mousemove", function (e) {
            if (!hintFaded && hint) {
              hint.classList.add("fade");
              hintFaded = true;
            }
            var r = container.getBoundingClientRect();
            mx = e.clientX - r.left;
            my = e.clientY - r.top;
            // Paint onto mask — persistent reveal
            maskCtx.beginPath();
            maskCtx.arc(mx, my, radius, 0, Math.PI * 2);
            maskCtx.fillStyle = "#fff";
            maskCtx.fill();
          });

          function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (img.complete && img.naturalWidth) {
              // Fill full area (cover)
              var imgRatio = img.naturalWidth / img.naturalHeight;
              var canRatio = canvas.width / canvas.height;
              var w, h, ox, oy;
              if (imgRatio > canRatio) {
                h = canvas.height;
                w = h * imgRatio;
                ox = (canvas.width - w) / 2;
                oy = 0;
              } else {
                w = canvas.width;
                h = w / imgRatio;
                ox = 0;
                oy = (canvas.height - h) / 2;
              }

              // Draw full image
              ctx.save();
              ctx.drawImage(img, ox, oy, w, h);
              // Use mask as composite — only show where mask is white
              ctx.globalCompositeOperation = "destination-in";
              ctx.drawImage(maskCanvas, 0, 0);
              ctx.restore();
            }
            requestAnimationFrame(draw);
          }
          draw();
        })();
      })();
