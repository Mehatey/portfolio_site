<script>
(function(){
  const cubeEl    = document.querySelector('.nav .cube');
  const cubeScene = document.querySelector('.nav .cube-scene');
  if(!cubeEl || !cubeScene) return;

  const REST = 'rotateX(-20deg) rotateY(25deg)';
  let hovered = false;
  let timer   = null;

  function move(transform, dur, ease) {
    cubeEl.style.transition = 'transform ' + dur + 's ' + (ease || 'cubic-bezier(0.34,1.56,0.64,1)');
    cubeEl.style.transform  = transform;
  }

  function snap() {
    cubeEl.style.transition = 'none';
    cubeEl.style.transform  = REST;
    // Re-enable after two frames so next move() gets a transition
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      cubeEl.style.transition = '';
    }); });
  }

  function after(ms, fn) {
    timer = setTimeout(fn, ms);
  }

  function look() {
    if(hovered) return;
    // 1. Glance left
    move('rotateX(-20deg) rotateY(-12deg)', 0.35, 'ease-out');
    after(420, function() { if(hovered) return;
      // 2. Rest
      move(REST, 0.25, 'ease-in-out');
      after(900, function() { if(hovered) return;
        // 3. Glance right
        move('rotateX(-20deg) rotateY(62deg)', 0.35, 'ease-out');
        after(500, function() { if(hovered) return;
          // 4. Rest
          move(REST, 0.25, 'ease-in-out');
          after(550, function() { if(hovered) return;
            // 5. Full spin
            move('rotateX(-20deg) rotateY(385deg)', 0.85, 'cubic-bezier(0.4,0,0.2,1)');
            after(900, function() { if(hovered) return;
              snap();
              // Schedule next sequence
              timer = setTimeout(look, 9000 + Math.random() * 5000);
            });
          });
        });
      });
    });
  }

  cubeScene.addEventListener('mouseenter', function() {
    hovered = true;
    clearTimeout(timer);
    move('rotateX(-20deg) rotateY(205deg)', 0.65, 'cubic-bezier(0.34,1.56,0.64,1)');
  });

  cubeScene.addEventListener('mouseleave', function() {
    hovered = false;
    move(REST, 0.45, 'ease-out');
    timer = setTimeout(look, 6000 + Math.random() * 3000);
  });

  // First look after 2.5s
  timer = setTimeout(look, 2500);
})();
</script>
