<style>
  /* Footer rebuild — generous whitespace, clear typographic hierarchy.
     Inspiration: Patrick Heng / Bruno Simon — minimal mono row + a single confident CTA. */
  .site-footer {
    max-width: 1320px;
    margin: 0 auto;
    padding: 96px max(28px, 5vw) 60px;
    position: relative;
    z-index: 5;
  }
  .site-footer::before {
    content: "";
    position: absolute;
    top: 0;
    left: max(28px, 5vw);
    right: max(28px, 5vw);
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
  }

  /* TOP ROW — big "Get in Touch" CTA on left, large socials on right */
  .site-footer-top {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 56px;
    padding-bottom: 56px;
  }
  .site-footer-cta-large {
    font-family: var(--font-title, "Inter", sans-serif);
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.025em;
    color: rgba(255, 255, 255, 0.92);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 18px;
    transition: color 0.3s ease;
  }
  .site-footer-cta-large:hover {
    color: #fff;
  }
  .site-footer-cta-arrow {
    display: inline-block;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    font-weight: 200;
  }
  .site-footer-cta-large:hover .site-footer-cta-arrow {
    transform: translateX(8px);
  }

  /* Right cluster: socials stacked or inline */
  .site-footer-socials {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-end;
  }
  .site-footer-socials a {
    font-family: "DM Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
    text-decoration: none;
    transition: color 0.25s ease;
    position: relative;
  }
  .site-footer-socials a::after {
    content: "↗";
    margin-left: 8px;
    opacity: 0;
    transform: translateX(-4px);
    display: inline-block;
    transition:
      opacity 0.25s ease,
      transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .site-footer-socials a:hover {
    color: rgba(255, 255, 255, 0.95);
  }
  .site-footer-socials a:hover::after {
    opacity: 1;
    transform: translateX(0);
  }

  /* BOTTOM ROW — quiet meta strip: name, time, CO2, separated by small mono labels */
  .site-footer-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding-top: 32px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    flex-wrap: wrap;
  }
  .site-footer-name {
    font-family: "DM Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.5);
  }
  .site-footer-meta {
    display: flex;
    align-items: center;
    gap: 18px;
    font-family: "DM Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.35);
    flex-wrap: wrap;
  }
  .site-footer-meta-item {
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .site-footer-time-dot {
    width: 6px;
    height: 6px;
    background: rgba(180, 220, 255, 0.6);
    box-shadow: 0 0 6px rgba(180, 220, 255, 0.4);
    image-rendering: pixelated;
    animation: timeBlink 2.6s ease-in-out infinite;
  }
  @keyframes timeBlink {
    0%,
    100% {
      opacity: 0.4;
      transform: scale(1);
    }
    50% {
      opacity: 1;
      transform: scale(1.25);
    }
  }

  /* Light mode */
  html[data-theme="light"] .site-footer::before {
    background: rgba(0, 0, 0, 0.1);
  }
  html[data-theme="light"] .site-footer-bottom {
    border-top-color: rgba(0, 0, 0, 0.06);
  }
  html[data-theme="light"] .site-footer-cta-large {
    color: #07090f;
  }
  html[data-theme="light"] .site-footer-socials a {
    color: rgba(7, 9, 15, 0.6);
  }
  html[data-theme="light"] .site-footer-socials a:hover {
    color: #07090f;
  }
  html[data-theme="light"] .site-footer-name {
    color: rgba(7, 9, 15, 0.55);
  }
  html[data-theme="light"] .site-footer-meta {
    color: rgba(7, 9, 15, 0.5);
  }

  @media (max-width: 700px) {
    .site-footer {
      padding: 64px 22px 40px;
    }
    .site-footer-top {
      grid-template-columns: 1fr;
      gap: 36px;
      padding-bottom: 40px;
    }
    .site-footer-socials {
      align-items: flex-start;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 18px 22px;
    }
    .site-footer-bottom {
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
    }
  }
</style>

<footer class="site-footer">
  <div class="site-footer-top">
    <a href="{{ site.baseurl }}/contact/" class="site-footer-cta-large" data-magnetic>
      Get in touch <span class="site-footer-cta-arrow" aria-hidden="true">→</span>
    </a>
    <nav class="site-footer-socials" aria-label="Social links">
      <a href="mailto:sidmehtadesign@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/siddharth-mehta-35560916b/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://www.instagram.com/cubeofcreation/" target="_blank" rel="noopener">Instagram</a>
      <a href="{{ site.baseurl }}/now/">Now</a>
    </nav>
  </div>

  <div class="site-footer-bottom">
    <span class="site-footer-name">© 2026 · Siddharth Mehta · Made in NYC</span>
    <div class="site-footer-meta">
      <span class="site-footer-meta-item">
        <span class="site-footer-time-dot" aria-hidden="true"></span>
        <span id="site-footer-time">—:—</span>
      </span>
      <span class="site-footer-meta-item" id="site-footer-co2" aria-label="Estimated carbon per visit">~—g CO₂</span>
    </div>
  </div>
</footer>

<script>
  (function () {
    const el = document.getElementById("site-footer-time");
    if (!el) return;
    function tick() {
      try {
        const now = new Date();
        const fmt = new Intl.DateTimeFormat("en-US", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          timeZone: "America/New_York",
        }).format(now);
        el.textContent = fmt + " NYC";
      } catch (_) {
        el.style.display = "none";
      }
    }
    tick();
    setInterval(tick, 30 * 1000);
  })();

  (function () {
    var el = document.getElementById("site-footer-co2");
    if (!el) return;
    function compute() {
      try {
        var total = 0;
        var resources = performance.getEntriesByType("resource");
        resources.forEach(function (r) {
          total += r.transferSize || r.encodedBodySize || 0;
        });
        var nav = performance.getEntriesByType("navigation")[0];
        if (nav) total += nav.transferSize || nav.encodedBodySize || 0;
        if (total === 0) {
          el.style.display = "none";
          return;
        }
        var co2 = ((total * 0.5) / (1024 * 1024)).toFixed(2);
        el.textContent = "~" + co2 + "g CO₂";
        el.title = "Estimated carbon footprint per page visit";
      } catch (_) {
        el.style.display = "none";
      }
    }
    if (document.readyState === "complete") setTimeout(compute, 800);
    else
      window.addEventListener("load", function () {
        setTimeout(compute, 800);
      });
  })();
</script>
