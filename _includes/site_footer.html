<style>
  .site-footer {
    max-width: 1320px;
    margin: 0 auto;
    padding: 56px max(24px, 4vw) 40px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    position: relative;
    z-index: 5;
  }
  .site-footer::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(160, 200, 255, 0.18) 30%, rgba(255, 200, 160, 0.18) 70%, transparent 100%);
  }
  .site-footer::after {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 140px;
    background: radial-gradient(ellipse at top, rgba(160, 200, 255, 0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: -1;
  }
  .site-footer-text {
    font-family: "DM Mono", monospace;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.32);
    letter-spacing: 0.08em;
  }
  .site-footer-social {
    display: flex;
    gap: 18px;
    justify-content: center;
  }
  .site-footer-social a {
    font-family: "DM Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    transition: color 0.25s ease;
    position: relative;
    text-decoration: none;
  }
  .site-footer-social a::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: -3px;
    height: 1px;
    background: linear-gradient(90deg, rgba(160, 200, 255, 0.7), rgba(180, 230, 220, 0.6), rgba(255, 200, 160, 0.55));
    opacity: 0;
    transform: scaleX(0.3);
    transform-origin: left center;
    transition:
      opacity 0.25s ease,
      transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .site-footer-social a:hover {
    color: rgba(255, 255, 255, 0.95);
  }
  .site-footer-social a:hover::after {
    opacity: 0.85;
    transform: scaleX(1);
  }
  .site-footer-cta {
    font-family: "DM Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 10px 22px;
    color: rgba(255, 255, 255, 0.7);
    justify-self: end;
    text-decoration: none;
    transition:
      border-color 0.3s cubic-bezier(0.22, 1, 0.36, 1),
      color 0.3s,
      background 0.3s;
  }
  .site-footer-cta:hover {
    border-color: rgba(255, 255, 255, 0.5);
    color: #fff;
    background: rgba(255, 255, 255, 0.04);
  }
  @media (max-width: 700px) {
    .site-footer {
      grid-template-columns: 1fr;
      gap: 18px;
      text-align: center;
      padding: 40px 20px 28px;
    }
    .site-footer-cta {
      justify-self: center;
    }
  }
  /* Time-in-NYC indicator — subtle live clock */
  .site-footer-time {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: "DM Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.36);
    margin-left: 16px;
  }
  .site-footer-time::before {
    content: "";
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(180, 220, 255, 0.55);
    box-shadow: 0 0 6px rgba(180, 220, 255, 0.4);
    animation: timeBlink 2.6s ease-in-out infinite;
  }
  @keyframes timeBlink {
    0%,
    100% {
      opacity: 0.4;
      transform: scale(1);
    }
    50% {
      opacity: 1;
      transform: scale(1.25);
    }
  }
</style>

<footer class="site-footer">
  <span class="site-footer-text">
    © 2026 · Siddharth Mehta
    <span class="site-footer-time" id="site-footer-time" aria-label="Current time in New York">—:— NYC</span>
  </span>
  <div class="site-footer-social">
    <a href="mailto:sidmehtadesign@gmail.com">Email</a>
    <a href="https://www.linkedin.com/in/siddharth-mehta-35560916b/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://www.instagram.com/cubeofcreation/" target="_blank" rel="noopener">Instagram</a>
  </div>
  <a href="{{ site.baseurl }}/contact/" class="site-footer-cta">Get in Touch →</a>
</footer>

<script>
  (function () {
    const el = document.getElementById("site-footer-time");
    if (!el) return;
    function tick() {
      try {
        const now = new Date();
        const fmt = new Intl.DateTimeFormat("en-US", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          timeZone: "America/New_York",
        }).format(now);
        el.textContent = fmt + " NYC";
      } catch (_) {
        // Fallback: just hide it
        el.style.display = "none";
      }
    }
    tick();
    setInterval(tick, 30 * 1000);
  })();
</script>
