<style>
  .site-footer {
    max-width: 1320px;
    margin: 0 auto;
    padding: 56px max(24px, 4vw) 44px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 32px;
    position: relative;
    z-index: 5;
  }
  .site-footer::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.1) 30%, rgba(255, 255, 255, 0.1) 70%, transparent 100%);
  }
  /* LEFT: signature + meta cluster (clear hierarchy: name big, meta line small underneath) */
  .site-footer-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .site-footer-name {
    font-family: "DM Mono", monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: rgba(255, 255, 255, 0.85);
  }
  .site-footer-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: "DM Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    flex-wrap: wrap;
  }
  .site-footer-meta-item {
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .site-footer-meta-item::before {
    content: "";
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.28);
  }
  .site-footer-meta-item:first-child::before {
    display: none;
  }
  .site-footer-time-dot {
    width: 6px;
    height: 6px;
    border-radius: 0;
    background: rgba(180, 220, 255, 0.6);
    box-shadow: 0 0 6px rgba(180, 220, 255, 0.4);
    image-rendering: pixelated;
    animation: timeBlink 2.6s ease-in-out infinite;
  }
  @keyframes timeBlink {
    0%,
    100% {
      opacity: 0.4;
      transform: scale(1);
    }
    50% {
      opacity: 1;
      transform: scale(1.25);
    }
  }
  /* CENTER: links — bigger, more legible than before */
  .site-footer-social {
    display: flex;
    gap: 28px;
    justify-content: center;
  }
  .site-footer-social a {
    font-family: "DM Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.55);
    transition: color 0.25s ease;
    position: relative;
    text-decoration: none;
  }
  .site-footer-social a::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: -4px;
    height: 1px;
    background: rgba(255, 255, 255, 0.5);
    opacity: 0;
    transform: scaleX(0.3);
    transform-origin: left center;
    transition:
      opacity 0.25s ease,
      transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .site-footer-social a:hover {
    color: rgba(255, 255, 255, 0.95);
  }
  .site-footer-social a:hover::after {
    opacity: 0.85;
    transform: scaleX(1);
  }
  /* RIGHT: CTA — same size as links so the row reads as one type level */
  .site-footer-cta {
    font-family: "DM Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid rgba(255, 255, 255, 0.22);
    padding: 12px 24px;
    color: rgba(255, 255, 255, 0.85);
    justify-self: end;
    text-decoration: none;
    transition:
      border-color 0.3s,
      color 0.3s,
      background 0.3s;
  }
  .site-footer-cta:hover {
    border-color: rgba(255, 255, 255, 0.6);
    color: #fff;
    background: rgba(255, 255, 255, 0.04);
  }
  @media (max-width: 700px) {
    .site-footer {
      grid-template-columns: 1fr;
      gap: 22px;
      text-align: center;
      padding: 40px 20px 32px;
    }
    .site-footer-meta {
      justify-content: center;
    }
    .site-footer-cta {
      justify-self: center;
    }
  }
</style>

<footer class="site-footer">
  <div class="site-footer-left">
    <span class="site-footer-name">© 2026 · Siddharth Mehta</span>
    <div class="site-footer-meta">
      <span class="site-footer-meta-item">
        <span class="site-footer-time-dot" aria-hidden="true"></span>
        <span id="site-footer-time">—:— NYC</span>
      </span>
      <span class="site-footer-meta-item" id="site-footer-co2" aria-label="Estimated carbon per visit">~—g CO₂</span>
    </div>
  </div>
  <div class="site-footer-social">
    <a href="{{ site.baseurl }}/now/">Now</a>
    <a href="mailto:sidmehtadesign@gmail.com">Email</a>
    <a href="https://www.linkedin.com/in/siddharth-mehta-35560916b/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://www.instagram.com/cubeofcreation/" target="_blank" rel="noopener">Instagram</a>
  </div>
  <a href="{{ site.baseurl }}/contact/" class="site-footer-cta" data-magnetic>Get in Touch →</a>
</footer>

<script>
  (function () {
    const el = document.getElementById("site-footer-time");
    if (!el) return;
    function tick() {
      try {
        const now = new Date();
        const fmt = new Intl.DateTimeFormat("en-US", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          timeZone: "America/New_York",
        }).format(now);
        el.textContent = fmt + " NYC";
      } catch (_) {
        el.style.display = "none";
      }
    }
    tick();
    setInterval(tick, 30 * 1000);
  })();

  // CO2 per visit only — KB and version were noise. Rough estimate: ~0.5g CO₂ per 1MB transferred.
  (function () {
    var el = document.getElementById("site-footer-co2");
    if (!el) return;
    function compute() {
      try {
        var total = 0;
        var resources = performance.getEntriesByType("resource");
        resources.forEach(function (r) {
          total += r.transferSize || r.encodedBodySize || 0;
        });
        var nav = performance.getEntriesByType("navigation")[0];
        if (nav) total += nav.transferSize || nav.encodedBodySize || 0;
        if (total === 0) {
          el.style.display = "none";
          return;
        }
        var co2 = ((total * 0.5) / (1024 * 1024)).toFixed(2);
        el.textContent = "~" + co2 + "g CO₂";
        el.title = "Estimated carbon footprint per page visit";
      } catch (_) {
        el.style.display = "none";
      }
    }
    if (document.readyState === "complete") setTimeout(compute, 800);
    else
      window.addEventListener("load", function () {
        setTimeout(compute, 800);
      });
  })();
</script>
