<style>
  /* Desktop only — touch devices keep system cursor */
  @media (hover: hover) and (pointer: fine) {
    * {
      cursor: none !important;
    }
  }

  #cur-dot {
    position: fixed;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: none;
    z-index: 99999;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(160, 210, 255, 0.5) 40%, rgba(80, 150, 240, 0.15) 70%, transparent 100%);
    box-shadow:
      0 0 8px 2px rgba(120, 180, 255, 0.3),
      0 0 20px 4px rgba(80, 140, 240, 0.12);
    will-change: left, top, transform;
    opacity: 0;
    transition:
      opacity 0.2s,
      transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  /* Cursor grows + glows over interactive surfaces */
  #cur-dot.is-hover {
    transform: translate(-50%, -50%) scale(2.4);
    background: radial-gradient(circle, rgba(255, 255, 255, 0.55) 0%, rgba(160, 220, 255, 0.35) 50%, rgba(120, 180, 255, 0.1) 80%, transparent 100%);
    box-shadow:
      0 0 18px 5px rgba(140, 200, 255, 0.35),
      0 0 36px 8px rgba(100, 160, 240, 0.18);
  }
  /* Global click feedback — interactive elements briefly scale-down on press */
  a:active,
  button:active,
  [role="button"]:active,
  .nav-icon:active,
  .filter-btn:active,
  .cc-chip:active,
  .cmdk-item:active {
    transform: scale(0.97);
    transition: transform 0.08s ease-out !important;
  }

  /* Magnetic nav icons — subtle pull + scale on hover */
  .nav-icon {
    transition:
      transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
      opacity 0.25s ease !important;
  }
  .nav-icon:hover {
    transform: scale(1.18);
  }

  /* Cube logo: square by default, cube on hover (top + right faces fade in) */
  .cube-face {
    opacity: 0;
    transition: opacity 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .nav > a:hover .cube-face,
  .nav > a:focus-visible .cube-face {
    opacity: 1;
  }
  /* Cube logo eyes track cursor — sets translate via CSS var */
  .logo-eye {
    transform: translateX(calc(var(--eye-x, 0) * 0.7px)) translateY(calc(var(--eye-y, 0) * 0.5px));
    transition: transform 0.25s ease-out;
  }

  /* "Type SID" easter egg — wave the cube logo */
  @keyframes logoWave {
    0%,
    100% {
      transform: rotateZ(0);
    }
    18% {
      transform: rotateZ(16deg);
    }
    36% {
      transform: rotateZ(-14deg);
    }
    54% {
      transform: rotateZ(10deg);
    }
    72% {
      transform: rotateZ(-6deg);
    }
    90% {
      transform: rotateZ(2deg);
    }
  }
  .logo-cube.logo-wave {
    animation: logoWave 1.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* Cube logo path-draw — only on first session paint (gated by html.cube-drawn class) */
  html:not(.cube-drawn) .logo-cube path,
  html:not(.cube-drawn) .logo-cube rect {
    stroke-dasharray: 84;
    stroke-dashoffset: 84;
    animation: cubeDraw 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.25s forwards;
  }
  .logo-cube path:nth-of-type(2) {
    animation-delay: 0.5s;
  }
  .logo-cube rect:not(.logo-eye) {
    animation-delay: 0.75s;
  }
  /* Don't path-draw the eyes (rect.logo-eye) — they should appear filled */
  .logo-cube rect.logo-eye {
    stroke-dasharray: none;
    stroke-dashoffset: 0;
    animation: none;
  }
  @keyframes cubeDraw {
    to {
      stroke-dashoffset: 0;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo-cube path,
    .logo-cube rect {
      animation: none;
      stroke-dashoffset: 0;
    }
  }
  /* Subtle outset glow on the front face when hovered, sells the dimensional shift */
  .nav > a:hover .logo-cube {
    filter: drop-shadow(0 0 8px rgba(180, 220, 255, 0.4));
  }

  /* Nav auto-hide on scroll down (returns on scroll up) */
  .nav {
    transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav--hidden {
    transform: translateY(-110%);
  }

  /* Mobile: scale logo + nav-icons to fit 56px nav comfortably */
  @media (max-width: 600px) {
    .logo-cube {
      width: 32px !important;
      height: 32px !important;
    }
    .nav-icon,
    .nav-icon img {
      width: 26px !important;
      height: 26px !important;
    }
    .nav-links {
      gap: 18px !important;
    }
    .nav {
      padding: 0 16px !important;
    }
    /* Cmd+K hint hidden on mobile (no Cmd key) */
    .cmdk-hint {
      display: none !important;
    }
  }

  /* Scroll hint pill — fades in after 4s of no scroll on long pages */
  #scroll-hint {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    z-index: 90;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    opacity: 0;
    transition:
      opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
      transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  #scroll-hint.is-visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .scroll-hint-line {
    width: 1px;
    height: 28px;
    background: linear-gradient(180deg, transparent, rgba(180, 220, 255, 0.65) 70%, transparent);
    animation: scrollHintLine 1.8s ease-in-out infinite;
  }
  @keyframes scrollHintLine {
    0%,
    100% {
      transform: scaleY(1) translateY(0);
      opacity: 0.9;
    }
    50% {
      transform: scaleY(1.3) translateY(8px);
      opacity: 0.4;
    }
  }
  .scroll-hint-label {
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.45);
  }
  @media (max-width: 600px) {
    #scroll-hint {
      bottom: 24px;
    }
  }

  /* ── DARK / LIGHT MODE TOGGLE ──
     The site is design-locked to dark. Light mode is implemented via CSS filter inversion
     + hue rotation (which keeps brand cyans + peaches consistent), with counter-inversion on media.
     This is a working MVP — a true light theme would require redesigning every gradient. */
  html[data-theme="light"] body {
    filter: invert(0.93) hue-rotate(180deg) saturate(0.88);
  }
  /* Counter-invert media so images, videos, canvases render with their actual colors */
  html[data-theme="light"] img,
  html[data-theme="light"] video,
  html[data-theme="light"] canvas,
  html[data-theme="light"] .logo-cube,
  html[data-theme="light"] [data-no-invert] {
    filter: invert(0.93) hue-rotate(180deg) saturate(1.14);
  }
  /* Hover-state media inversion needs to compose with existing filter */
  html[data-theme="light"] .nav-icon:hover img {
    filter: invert(0.93) hue-rotate(180deg) saturate(1.14) brightness(1.1);
  }
  /* Theme toggle button — bottom-left fixed */
  #theme-toggle {
    position: fixed;
    bottom: 22px;
    left: 22px;
    z-index: 200;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.45);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.85);
  }
  /* On home (has fixed .bottom-bar): lift theme above bottom-bar; hide chat FAB entirely so the desk-stage breathes (chat still reachable via Cmd+K) */
  body:has(.bottom-bar) #theme-toggle {
    bottom: 76px !important;
  }
  body:has(.bottom-bar) #cube-chat-fab {
    display: none !important;
  }
  body:has(.bottom-bar) #cube-chat {
    bottom: 22px !important;
  }
  /* Theme toggle continued — flex centering + transitions */
  #theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    transition:
      transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
      border-color 0.25s ease,
      background 0.25s ease;
    padding: 0;
  }
  #theme-toggle:hover {
    transform: scale(1.08);
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(0, 0, 0, 0.6);
  }
  #theme-toggle svg {
    width: 16px;
    height: 16px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #theme-toggle .theme-sun {
    display: none;
  }
  html[data-theme="light"] #theme-toggle .theme-moon {
    display: none;
  }
  html[data-theme="light"] #theme-toggle .theme-sun {
    display: block;
  }
  @media (max-width: 600px) {
    #theme-toggle {
      bottom: 16px;
      left: 16px;
      width: 34px;
      height: 34px;
    }
  }

  /* ── CUBE CHAT ── floating companion bottom-right; opens to a small chat panel */
  #cube-chat-fab {
    position: fixed;
    bottom: 22px;
    right: 22px;
    z-index: 200;
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: rgba(0, 0, 0, 0.55);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    backdrop-filter: blur(16px) saturate(1.4);
    border: 1px solid rgba(160, 200, 255, 0.18);
    box-shadow:
      0 12px 32px rgba(0, 0, 0, 0.4),
      0 0 0 1px rgba(160, 200, 255, 0.04),
      0 0 24px rgba(80, 130, 220, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    padding: 0;
    transition:
      transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
      border-color 0.3s ease,
      box-shadow 0.3s ease;
  }
  #cube-chat-fab svg {
    width: 22px;
    height: 22px;
    color: rgba(180, 220, 255, 0.92);
  }
  #cube-chat-fab:hover {
    transform: scale(1.08) rotate(-6deg);
    border-color: rgba(180, 220, 255, 0.45);
    box-shadow:
      0 14px 38px rgba(0, 0, 0, 0.45),
      0 0 0 1px rgba(180, 220, 255, 0.1),
      0 0 36px rgba(120, 180, 255, 0.3);
  }
  #cube-chat-fab .fab-pulse {
    position: absolute;
    inset: -3px;
    border-radius: 18px;
    border: 1px solid rgba(180, 220, 255, 0.4);
    animation: fabPulse 3.4s ease-out infinite;
    pointer-events: none;
  }
  @keyframes fabPulse {
    0% {
      opacity: 0.7;
      transform: scale(1);
    }
    100% {
      opacity: 0;
      transform: scale(1.4);
    }
  }
  #cube-chat-fab.is-open {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.6);
  }

  #cube-chat {
    position: fixed;
    bottom: 22px;
    right: 22px;
    z-index: 9990;
    width: 360px;
    max-width: calc(100vw - 32px);
    height: 540px;
    max-height: calc(100vh - 100px);
    background: rgba(14, 16, 22, 0.95);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid rgba(160, 200, 255, 0.14);
    border-radius: 18px;
    box-shadow:
      0 30px 80px -10px rgba(0, 0, 0, 0.7),
      0 0 0 1px rgba(160, 200, 255, 0.05),
      0 0 80px rgba(80, 130, 220, 0.18);
    display: none;
    flex-direction: column;
    overflow: hidden;
    transform-origin: bottom right;
  }
  #cube-chat.is-open {
    display: flex;
    animation: cubeChatIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes cubeChatIn {
    from {
      opacity: 0;
      transform: translateY(16px) scale(0.92);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
  .cc-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }
  .cc-avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(160, 200, 255, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(180, 220, 255, 0.9);
    flex-shrink: 0;
    animation: ccAvatarFloat 6s ease-in-out infinite;
  }
  @keyframes ccAvatarFloat {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-3px);
    }
  }
  .cc-avatar svg {
    width: 20px;
    height: 20px;
  }
  .cc-title {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .cc-name {
    font-family: var(--font-head, "Inter", sans-serif);
    font-size: 14px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.95);
  }
  .cc-status {
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(160, 230, 160, 0.85);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .cc-status::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(140, 230, 150, 1);
    box-shadow: 0 0 6px rgba(140, 230, 150, 0.6);
    animation: dotPulse 2.4s ease-in-out infinite;
  }
  .cc-close {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.55);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: none;
    font-size: 13px;
    transition:
      border-color 0.2s,
      color 0.2s;
  }
  .cc-close:hover {
    border-color: rgba(255, 255, 255, 0.4);
    color: #fff;
  }
  .cc-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .cc-msg {
    max-width: 84%;
    padding: 10px 14px;
    border-radius: 14px;
    font-family: var(--font-head, "Inter", sans-serif);
    font-size: 13.5px;
    line-height: 1.5;
    animation: ccMsgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes ccMsgIn {
    from {
      opacity: 0;
      transform: translateY(8px) scale(0.96);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
  .cc-msg.from-cube {
    align-self: flex-start;
    background: rgba(160, 200, 255, 0.08);
    border: 1px solid rgba(160, 200, 255, 0.12);
    color: rgba(255, 255, 255, 0.92);
    border-bottom-left-radius: 4px;
  }
  .cc-msg.from-user {
    align-self: flex-end;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.95);
    border-bottom-right-radius: 4px;
  }
  .cc-typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: rgba(160, 200, 255, 0.08);
    border: 1px solid rgba(160, 200, 255, 0.12);
    border-radius: 14px 14px 14px 4px;
  }
  .cc-typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(180, 220, 255, 0.6);
    animation: ccDotBounce 1.2s ease-in-out infinite;
  }
  .cc-typing span:nth-child(2) {
    animation-delay: 0.15s;
  }
  .cc-typing span:nth-child(3) {
    animation-delay: 0.3s;
  }
  @keyframes ccDotBounce {
    0%,
    100% {
      opacity: 0.3;
      transform: translateY(0);
    }
    50% {
      opacity: 1;
      transform: translateY(-3px);
    }
  }
  .cc-suggestions {
    padding: 10px 12px 16px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cc-chip {
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 11px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: rgba(255, 255, 255, 0.7);
    cursor: none;
    transition:
      background 0.2s,
      border-color 0.2s,
      color 0.2s,
      transform 0.2s;
  }
  .cc-chip:hover {
    background: rgba(160, 200, 255, 0.12);
    border-color: rgba(160, 200, 255, 0.35);
    color: #fff;
    transform: translateY(-1px);
  }
  /* Hide on hover-none / coarse-pointer mobile by default but keep available */
  @media (max-width: 600px) {
    #cube-chat-fab {
      bottom: 16px;
      right: 16px;
      width: 46px;
      height: 46px;
    }
    #cube-chat {
      bottom: 0;
      right: 0;
      left: 0;
      width: 100%;
      max-width: 100%;
      max-height: 80vh;
      height: 80vh;
      border-radius: 18px 18px 0 0;
      transform-origin: bottom center;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    #cube-chat-fab .fab-pulse {
      animation: none;
    }
    .cc-avatar {
      animation: none;
    }
    .cc-typing span {
      animation: none;
    }
  }

  /* Branded text selection — designers notice */
  ::selection {
    background: rgba(160, 220, 255, 0.32);
    color: #fff;
    text-shadow: 0 0 8px rgba(160, 220, 255, 0.4);
  }
  ::-moz-selection {
    background: rgba(160, 220, 255, 0.32);
    color: #fff;
  }

  /* Branded scrollbar — Webkit browsers */
  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.02);
  }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(160, 200, 255, 0.25), rgba(180, 230, 220, 0.18));
    border-radius: 5px;
    border: 2px solid #000;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(180, 220, 255, 0.5), rgba(200, 240, 230, 0.35));
  }

  /* Konami easter egg — color-cycle the page when triggered */
  @keyframes kameha {
    0%,
    100% {
      filter: hue-rotate(0deg) saturate(1) brightness(1);
    }
    25% {
      filter: hue-rotate(90deg) saturate(1.5) brightness(1.05);
    }
    50% {
      filter: hue-rotate(180deg) saturate(1.6) brightness(1.1);
    }
    75% {
      filter: hue-rotate(270deg) saturate(1.5) brightness(1.05);
    }
  }

  /* ── CMD+K COMMAND PALETTE ── Linear/Vercel/Stripe pattern */
  #cmdk {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 14vh;
  }
  #cmdk.is-open {
    display: flex;
    animation: cmdkFadeIn 0.18s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes cmdkFadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }
  .cmdk-bg {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    backdrop-filter: blur(18px) saturate(1.2);
  }
  .cmdk-panel {
    position: relative;
    width: min(640px, 92vw);
    max-height: 70vh;
    background: rgba(14, 16, 22, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    box-shadow:
      0 30px 80px -20px rgba(0, 0, 0, 0.7),
      0 0 0 1px rgba(160, 200, 255, 0.06),
      0 0 60px rgba(80, 130, 220, 0.12);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: cmdkPanelIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes cmdkPanelIn {
    from {
      transform: translateY(-12px) scale(0.97);
      opacity: 0;
    }
    to {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
  }
  .cmdk-search {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 22px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }
  .cmdk-search svg {
    color: rgba(255, 255, 255, 0.4);
    flex-shrink: 0;
  }
  .cmdk-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: rgba(255, 255, 255, 0.95);
    font-family: var(--font-head, "Inter", sans-serif);
    font-size: 15px;
    letter-spacing: -0.005em;
    cursor: text;
  }
  .cmdk-search input::placeholder {
    color: rgba(255, 255, 255, 0.32);
  }
  .cmdk-search kbd {
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 3px 7px;
    border-radius: 3px;
  }
  .cmdk-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    scroll-behavior: smooth;
  }
  .cmdk-group-label {
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.32);

<script>
  // ── CUBE CHAT ── canned conversational agent (Sid's cube as host)
  (function () {
    var fab = document.getElementById("cube-chat-fab");
    var panel = document.getElementById("cube-chat");
    if (!fab || !panel) return;
    var body = document.getElementById("cc-body");
    var suggestions = document.getElementById("cc-suggestions");
    var closeBtn = panel.querySelector(".cc-close");

    var qa = [
      {
        q: "Who's Sid?",
        a: "Sid is a designer × technologist based in NYC. He's finishing his MFA in Design & Technology at Parsons in May 2026. Before that: ISDI Mumbai, then EyeJack, Deloitte, Philips.",
      },
      {
        q: "Best work?",
        a: "Honestly hard to pick. ENCODED won 2 Webbys at the Met. Mandala is his thesis — a meditative AR/VR experience. Cube of Creations (that's me) is a 7-year character study turned game. Try R for a random project.",
      },
      {
        q: "What does he build?",
        a: "AR exhibitions, VR narratives, enterprise interfaces, spatial systems, brand identities. He's most curious about the intersection of design, culture, and emerging tech.",
      },
      {
        q: "Tools?",
        a: "Figma, Unity, TouchDesigner, Unreal, JavaScript, Python, Arduino, Premiere Pro. Some Three.js. Plenty of caffeine.",
      },
      {
        q: "How do I reach him?",
        a: "Email is fastest: sidmehtadesign@gmail.com. Also on LinkedIn (siddharth-mehta), Instagram (@cubeofcreation), and GitHub (Mehatey).",
      },
      {
        q: "Available?",
        a: "Yes. Open to full-time, freelance, and collaborations starting summer 2026. The green dot in the footer is real.",
      },
      {
        q: "Show me random",
        a: "On it.",
        action: "random",
      },
      {
        q: "About you, cube?",
        a: "I started as a square in 2018 in Sid's sketchbook. Each year he gave me a new side — until I became a cube. Click my logo and I spin. Type S-I-D anywhere and I wave. Try ⌘K too.",
      },
      {
        q: "Awards?",
        a: "Webby × 2 (2026, both for ENCODED at the Met). Kyoorius Creative Award (2021, MOOL). MIT Reality Hack (2026). Featured in Artnet and Agog.",
      },
    ];

    var greeting = "Hey. I'm Sid's Cube. Ask me anything about him — or hit a chip below.";

    var typing = false;
    var initialized = false;

    function addMsg(text, who) {
      var el = document.createElement("div");
      el.className = "cc-msg from-" + who;
      el.textContent = text;
      body.appendChild(el);
      body.scrollTop = body.scrollHeight;
    }

    function showTyping(duration, cb) {
      var el = document.createElement("div");
      el.className = "cc-typing";
      el.innerHTML = "<span></span><span></span><span></span>";
      body.appendChild(el);
      body.scrollTop = body.scrollHeight;
      typing = true;
      setTimeout(function () {
        if (el.parentNode) el.parentNode.removeChild(el);
        typing = false;
        cb && cb();
      }, duration);
    }

    function renderChips() {
      suggestions.innerHTML = "";
      qa.forEach(function (item) {
        var chip = document.createElement("button");
        chip.className = "cc-chip";
        chip.textContent = item.q;
        chip.addEventListener("click", function () {
          if (typing) return;
          addMsg(item.q, "user");
          var delay = 600 + Math.min(900, item.a.length * 12);
          showTyping(delay, function () {
            addMsg(item.a, "cube");
            if (item.action === "random") {
              setTimeout(function () {
                var projects = [
                  "/encoded/",
                  "/cube-guy/",
                  "/ai-self/",
                  "/mandalas/",
                  "/mind-your-feelings/",
                  "/b-plus-b/",
                  "/mool/",
                  "/shot-on-iphone/",
                  "/naavo/",
                  "/aananda/",
                  "/alpha-stockathon/",
                  "/illustrations/",
                ];
                var cur = window.location.pathname;
                var pool = projects.filter(function (p) {
                  return p !== cur;
                });
                var t = pool[Math.floor(Math.random() * pool.length)];
                window.location.href = "{{ site.baseurl }}" + t;
              }, 700);
            }
          });
        });
        suggestions.appendChild(chip);
      });
    }

    function open() {
      if (!initialized) {
        showTyping(900, function () {
          addMsg(greeting, "cube");
        });
        renderChips();
        initialized = true;
      }
      panel.classList.add("is-open");
      fab.classList.add("is-open");
    }

    function close() {
      panel.classList.remove("is-open");
      fab.classList.remove("is-open");
    }

    fab.addEventListener("click", open);
    closeBtn.addEventListener("click", close);
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && panel.classList.contains("is-open")) close();
    });

    window.__sidOpenChat = open;
  })();
</script>

<script>
  // ── THEME TOGGLE ── persists in localStorage, syncs across tabs
  (function () {
    var KEY = "sid_theme";
    var html = document.documentElement;
    function apply(theme) {
      html.setAttribute("data-theme", theme);
    }
    var saved = null;
    try {
      saved = localStorage.getItem(KEY);
    } catch (_) {}
    if (saved === "light" || saved === "dark") apply(saved);
    var btn = document.getElementById("theme-toggle");
    if (btn) {
      btn.addEventListener("click", function () {
        var cur = html.getAttribute("data-theme") || "dark";
        var next = cur === "light" ? "dark" : "light";
        apply(next);
        try {
          localStorage.setItem(KEY, next);
        } catch (_) {}
      });
    }
    // Also expose a global so Cmd+K can call it
    window.__sidToggleTheme = function () {
      btn && btn.click();
    };
  })();
</script>

<script>
  (function () {
    const dot = document.getElementById("cur-dot");
    if (!dot) return;

    let mx = -100,
      my = -100,
      alive = false;
    window.__cursorX = -100;
    window.__cursorY = -100;

    document.addEventListener(
      "mousemove",
      (e) => {
        mx = e.clientX;
        my = e.clientY;
        window.__cursorX = mx;
        window.__cursorY = my;
        if (!alive) {
          alive = true;
          dot.style.opacity = "1";
        }
      },
      { passive: true }
    );

    document.addEventListener("mouseleave", () => {
      alive = false;
      dot.style.opacity = "0";
    });
    document.addEventListener("mouseenter", () => {
      alive = true;
      dot.style.opacity = "1";
    });

    const spotlight = document.getElementById("cursor-spotlight");
    (function loop() {
      requestAnimationFrame(loop);
      dot.style.left = mx + "px";
      dot.style.top = my + "px";
      if (spotlight) {
        spotlight.style.left = mx + "px";
        spotlight.style.top = my + "px";
        if (alive && spotlight.style.opacity !== "1") spotlight.style.opacity = "1";
        else if (!alive && spotlight.style.opacity !== "0") spotlight.style.opacity = "0";
      }
    })();

    // Skip cursor-driven hover/magnetic effects entirely on touch devices
    const isTouchDevice = window.matchMedia && window.matchMedia("(hover: none), (pointer: coarse)").matches;

    // ── HOVER AWARENESS ── grow cursor over interactive surfaces
    if (!isTouchDevice) {
      const HOVER_SELECTOR =
        'a, button, [role="button"], .work-card, .nav-icon, .card, video, .filter-btn, .footer-cta, .site-footer-cta, .about-resume-link, .desk-play-reel, .meta-item';
      document.addEventListener(
        "mouseover",
        (e) => {
          if (e.target.closest && e.target.closest(HOVER_SELECTOR)) dot.classList.add("is-hover");
        },
        { passive: true }
      );
      document.addEventListener(
        "mouseout",
        (e) => {
          if (e.target.closest && e.target.closest(HOVER_SELECTOR)) {
            // Only remove if we're really leaving the hover surface (not just moving to a child)
            const to = e.relatedTarget;
            if (!to || !(to.closest && to.closest(HOVER_SELECTOR))) dot.classList.remove("is-hover");
          }
        },
        { passive: true }
      );
    }

    // ── MAGNETIC NAV ICONS ── subtle pull toward cursor (desktop only)
    if (!isTouchDevice)
      document.querySelectorAll(".nav-icon").forEach((icon) => {
        icon.addEventListener("mousemove", (ev) => {
          const r = icon.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dx = (ev.clientX - cx) * 0.32;
          const dy = (ev.clientY - cy) * 0.32;
          icon.style.transform = `translate(${dx}px, ${dy}px) scale(1.18)`;
        });
        icon.addEventListener("mouseleave", () => {
          icon.style.transform = "";
        });
      });

    // ── MAGNETIC FOOTER CTAs ── softer pull on Get in Touch / View Resume buttons (desktop only)
    if (!isTouchDevice)
      document.querySelectorAll(".site-footer-cta, .about-resume-link").forEach((cta) => {
        cta.style.transition = "transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.3s, color 0.3s, background 0.3s";
        cta.addEventListener("mousemove", (ev) => {
          const r = cta.getBoundingClientRect();
          const cx = r.left + r.width / 2;

      if (!pageVisible) return;

      lastScroll = curScroll;

  })();

  // ── COUNT-UP ── animate any [data-count-up] number from 0 → target on viewport entry
  (function () {
    var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var nodes = document.querySelectorAll("[data-count-up]");
    if (!nodes.length) return;
    function animateCount(el) {
      var target = parseFloat(el.getAttribute("data-count-up"));
      if (isNaN(target)) return;
      if (prefersReduced) {
        el.textContent = target;
        return;
      }
      var duration = 1100;
      var start = performance.now();
      function frame(now) {
        var t = Math.min(1, (now - start) / duration);
        var eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
        var v = Math.round(target * eased);
        el.textContent = v;
        if (t < 1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }
    var obs = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            animateCount(e.target);
            obs.unobserve(e.target);
          }
        });
      },
      { threshold: 0.4 }
    );
    nodes.forEach(function (n) {
      n.textContent = "0";
      obs.observe(n);
    });
  })();

  // ── LETTER SCRAMBLE ── on .proj-title and .about-name (load-in + hover)
  (function () {
    const prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (prefersReduced) return;
    const SCRAMBLE_CHARS = "!<>-_\\/[]{}=+*^?#·×∆◇◆";
    function scrambleEffect(el) {
      const original = el.textContent.trim();
      if (!original) return;
      let scrambling = false;
      function run(duration) {
        if (scrambling) return;
        scrambling = true;
        const start = performance.now();
        function frame() {
          const t = (performance.now() - start) / duration;
          if (t >= 1) {
            el.textContent = original;
            scrambling = false;
            return;
          }
          const reveal = Math.floor(t * original.length);
          let out = "";
          for (let i = 0; i < original.length; i++) {
            const c = original[i];
            if (i < reveal || c === " " || c === "·" || c === "—") out += c;
            else out += SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
          }
          el.textContent = out;
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      }
      el.style.cursor = "none";
      el.addEventListener("mouseenter", () => run(550));
      // Initial decryption on page load
      setTimeout(() => run(750), 250);
    }
    // Targeted selectors — only single-line plain-text headings (skip .proj-title, has its own typewriter on project pages)
    document.querySelectorAll(".about-name, .play-title").forEach(scrambleEffect);
  })();

  // ── CMD+K RECENT HISTORY ── track last 5 visited URLs in localStorage
  (function () {
    try {
      const HKEY = "cmdk_recent";
      const path = window.location.pathname;
      // Skip /og-card/, /404/ and root tracking
      if (path === "/og-card/" || path === "/404.html") return;
      let recent = JSON.parse(localStorage.getItem(HKEY) || "[]");
      // Page title for label
      const t = document.title.replace(/\s*—\s*Sid Mehta\s*$/, "").trim() || path;
      // Move-to-front pattern
      recent = recent.filter((r) => r.url !== path);
      recent.unshift({ url: path, label: t });
      if (recent.length > 5) recent = recent.slice(0, 5);
      localStorage.setItem(HKEY, JSON.stringify(recent));
    } catch (_) {}
  })();

  // ── HIDDEN-TAB TITLE SWAP ── nudges visitors to come back when they switch tabs
  (function () {
    const original = document.title;
    const away = "← " + original;
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        document.title = away;
      } else {
        // Restore on return; also briefly flash a "welcome back" then settle
        document.title = original;
      }
    });
  })();

  // ── CONSOLE SIGNATURE ── tasteful hello to anyone opening DevTools
  (function () {
    try {
      const big = ["color: rgba(160, 200, 255, 0.95)", "font: 14px 'DM Mono', monospace", "padding: 6px 0", "letter-spacing: 0.04em"].join(";");
      const dim = "color: rgba(255, 255, 255, 0.5); font: 11px 'DM Mono', monospace; letter-spacing: 0.06em";
      const accent = "color: rgba(255, 220, 160, 0.9); font: 11px 'DM Mono', monospace; letter-spacing: 0.06em";
      console.log("%c◇ Hi from Sid Mehta", big);
      console.log(
        "%c   ◆     · · ·\n  ◆ ◆   /     \\\n   ◆     · · ·\n",
        "color: rgba(160, 200, 255, 0.6); font: 11px 'DM Mono', monospace; line-height: 1.3"
      );
      console.log("%cDesigner × Technologist · NYC · Available for work", accent);
      console.log("%cBuilt with HTML, CSS, JS, and patience.\nCurious how something works? sidmehtadesign@gmail.com", dim);
      console.log("%cTry ⌘K to navigate · ↑↑↓↓←→←→ba for the konami easter egg", dim);
    } catch (_) {}
  })();

  // ── READING TIME ESTIMATE ── injects "~N min read" badge on project pages
  (function () {
    const main = document.querySelector(".proj-hero ~ .meta-row, .meta-row");
    const body = document.querySelector(".proj-intro, .proj-overview, .cs-bleed, .cube-cap");
    if (!main || !body) return;
    // Count words in the page body content (skip nav/footer)
    const textEl = document.querySelector("main, .proj-content, body");
    if (!textEl) return;
    const text = textEl.innerText || textEl.textContent || "";
    const words = text.trim().split(/\s+/).filter(Boolean).length;
    const minutes = Math.max(1, Math.round(words / 220));
    if (words < 200) return; // skip short pages
    const badge = document.createElement("div");
    badge.className = "meta-item meta-item--readtime";
    badge.innerHTML = '<p class="meta-k">Read</p><p class="meta-v">~' + minutes + " min</p>";
    main.appendChild(badge);
  })();
</script>
