<style>
  /* Desktop only — touch devices keep system cursor */
  @media (hover: hover) and (pointer: fine) {
    * {
      cursor: none !important;
    }
  }

  #cur-dot {
    position: fixed;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: none;
    z-index: 99999;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(160, 210, 255, 0.5) 40%, rgba(80, 150, 240, 0.15) 70%, transparent 100%);
    box-shadow:
      0 0 8px 2px rgba(120, 180, 255, 0.3),
      0 0 20px 4px rgba(80, 140, 240, 0.12);
    will-change: left, top, transform;
    opacity: 0;
    transition:
      opacity 0.2s,
      transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  /* Cursor grows + glows over interactive surfaces */
  #cur-dot.is-hover {
    transform: translate(-50%, -50%) scale(2.4);
    background: radial-gradient(circle, rgba(255, 255, 255, 0.55) 0%, rgba(160, 220, 255, 0.35) 50%, rgba(120, 180, 255, 0.1) 80%, transparent 100%);
    box-shadow:
      0 0 18px 5px rgba(140, 200, 255, 0.35),
      0 0 36px 8px rgba(100, 160, 240, 0.18);
  }
  /* Magnetic nav icons — subtle pull + scale on hover */
  .nav-icon {
    transition:
      transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
      opacity 0.25s ease !important;
  }
  .nav-icon:hover {
    transform: scale(1.18);
  }

  /* Cube logo: square by default, cube on hover (top + right faces fade in) */
  .cube-face {
    opacity: 0;
    transition: opacity 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .nav > a:hover .cube-face,
  .nav > a:focus-visible .cube-face {
    opacity: 1;
  }
  /* Subtle outset glow on the front face when hovered, sells the dimensional shift */
  .nav > a:hover .logo-cube {
    filter: drop-shadow(0 0 8px rgba(180, 220, 255, 0.4));
  }

  /* Nav auto-hide on scroll down (returns on scroll up) */
  .nav {
    transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .nav--hidden {
    transform: translateY(-110%);
  }

  /* Branded text selection — designers notice */
  ::selection {
    background: rgba(160, 220, 255, 0.32);
    color: #fff;
    text-shadow: 0 0 8px rgba(160, 220, 255, 0.4);
  }
  ::-moz-selection {
    background: rgba(160, 220, 255, 0.32);
    color: #fff;
  }

  /* Branded scrollbar — Webkit browsers */
  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.02);
  }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(160, 200, 255, 0.25), rgba(180, 230, 220, 0.18));
    border-radius: 5px;
    border: 2px solid #000;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(180, 220, 255, 0.5), rgba(200, 240, 230, 0.35));
  }

  /* Konami easter egg — color-cycle the page when triggered */
  @keyframes kameha {
    0%,
    100% {
      filter: hue-rotate(0deg) saturate(1) brightness(1);
    }
    25% {
      filter: hue-rotate(90deg) saturate(1.5) brightness(1.05);
    }
    50% {
      filter: hue-rotate(180deg) saturate(1.6) brightness(1.1);
    }
    75% {
      filter: hue-rotate(270deg) saturate(1.5) brightness(1.05);
    }
  }

  /* ── CMD+K COMMAND PALETTE ── Linear/Vercel/Stripe pattern */
  #cmdk {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 14vh;
  }
  #cmdk.is-open {
    display: flex;
    animation: cmdkFadeIn 0.18s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes cmdkFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .cmdk-bg {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    -webkit-backdrop-filter: blur(18px) saturate(1.2);
    backdrop-filter: blur(18px) saturate(1.2);
  }
  .cmdk-panel {
    position: relative;
    width: min(640px, 92vw);
    max-height: 70vh;
    background: rgba(14, 16, 22, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(160, 200, 255, 0.06), 0 0 60px rgba(80, 130, 220, 0.12);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: cmdkPanelIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes cmdkPanelIn {
    from { transform: translateY(-12px) scale(0.97); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .cmdk-search {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 22px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }
  .cmdk-search svg { color: rgba(255, 255, 255, 0.4); flex-shrink: 0; }
  .cmdk-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: rgba(255, 255, 255, 0.95);
    font-family: var(--font-head, "Inter", sans-serif);
    font-size: 15px;
    letter-spacing: -0.005em;
    cursor: text;
  }
  .cmdk-search input::placeholder { color: rgba(255, 255, 255, 0.32); }
  .cmdk-search kbd {
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 3px 7px;
    border-radius: 3px;
  }
  .cmdk-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    scroll-behavior: smooth;
  }
  .cmdk-group-label {
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.32);
    padding: 12px 14px 6px;
  }
  .cmdk-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 8px;
    cursor: none;
    color: rgba(255, 255, 255, 0.85);
    font-family: var(--font-head, "Inter", sans-serif);
    font-size: 14px;
    transition: background 0.12s ease;
  }
  .cmdk-item.is-active,
  .cmdk-item:hover {
    background: rgba(160, 200, 255, 0.08);
    color: #fff;
  }
  .cmdk-item-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(160, 200, 255, 0.6);
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 11px;
  }
  .cmdk-item-meta {
    margin-left: auto;
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.32);
  }
  .cmdk-empty {
    padding: 32px;
    text-align: center;
    color: rgba(255, 255, 255, 0.32);
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .cmdk-footer {
    padding: 12px 22px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.32);
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .cmdk-footer kbd {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.55);
    padding: 2px 6px;
    border-radius: 3px;
    margin-right: 4px;
    font-size: 9px;
  }
  .cmdk-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.36);
    background: rgba(0, 0, 0, 0.55);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    padding: 8px 14px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 4px;
    display: flex;
    gap: 6px;
    align-items: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    animation: cmdkHintFadeOut 12s ease forwards;
  }
  .cmdk-hint kbd {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.65);
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 9px;
  }
  @keyframes cmdkHintFadeOut {
    0% { opacity: 0; }
    8%, 80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, 8px); }
  }
  @media (max-width: 700px) {
    .cmdk-hint { display: none; }
  }
  /* On touch devices: restore system cursor, hide custom dot */
  @media (hover: none), (pointer: coarse) {
    *,
    *::before,
    *::after {
      cursor: auto !important;
    }
    #cur-dot {
      display: none !important;
    }
  }

  /* Click ripple — gentle expanding ring from cursor */
  .click-ripple {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 99998;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(180, 220, 255, 0.55);
    background: radial-gradient(circle, rgba(255, 255, 255, 0.18) 0%, transparent 65%);
    animation: click-ripple 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    will-change: transform, opacity;
  }
  @keyframes click-ripple {
    0% {
      width: 8px;
      height: 8px;
      opacity: 0.85;
      border-width: 1.5px;
    }
    100% {
      width: 70px;
      height: 70px;
      opacity: 0;
      border-width: 0.5px;
    }
  }

  /* ── GLOBAL FILM GRAIN ── adds atmospheric texture site-wide */
  #global-grain {
    position: fixed;
    inset: 0;
    z-index: 9;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 220px 220px;
    animation: grainShift 0.35s steps(4) infinite;
  }
  @keyframes grainShift {
    0% {
      transform: translate(0, 0);
    }
    25% {
      transform: translate(-2px, 3px);
    }
    50% {
      transform: translate(3px, -1px);
    }
    75% {
      transform: translate(-1px, -3px);
    }
    100% {
      transform: translate(2px, 1px);
    }
  }
  /* ── SOFT VIGNETTE ── slight depth around the page edges */
  #global-vignette {
    position: fixed;
    inset: 0;
    z-index: 8;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.55) 100%);
  }

  /* ── REDUCED MOTION ── respect users who request less animation */
  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
    #global-grain {
      display: none !important;
    }
    #cur-dot {
      display: none !important;
    }
  }

  /* ── SKIP LINK ── keyboard users can jump past nav */
  .skip-to-content {
    position: fixed;
    top: -100px;
    left: 16px;
    z-index: 1000;
    padding: 10px 18px;
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    font-family: var(--font-mono, "DM Mono", monospace);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 4px;
    text-decoration: none;
    transition: top 0.2s ease;
  }
  .skip-to-content:focus {
    top: 16px;
    outline: 2px solid rgba(160, 200, 255, 0.6);
  }
</style>

<a href="#main" class="skip-to-content">Skip to content</a>

<div id="global-grain" aria-hidden="true"></div>
<div id="global-vignette" aria-hidden="true"></div>
<div id="cur-dot"></div>

<!-- Cmd+K command palette -->
<div id="cmdk" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Command palette">
  <div class="cmdk-bg" data-cmdk-close></div>
  <div class="cmdk-panel">
    <div class="cmdk-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="cmdk-input" type="text" placeholder="Jump to a project, page, or social…" autocomplete="off" spellcheck="false" />
      <kbd>esc</kbd>
    </div>
    <div class="cmdk-list" id="cmdk-list"></div>
    <div class="cmdk-footer">
      <span><kbd>↑</kbd><kbd>↓</kbd>navigate</span>
      <span><kbd>↵</kbd>open</span>
      <span><kbd>esc</kbd>close</span>
    </div>
  </div>
</div>

<!-- First-visit hint -->
<div class="cmdk-hint" id="cmdk-hint" aria-hidden="true">
  <kbd>⌘</kbd><kbd>K</kbd> to navigate
</div>

<script>
  (function () {
    const dot = document.getElementById("cur-dot");
    if (!dot) return;

    let mx = -100,
      my = -100,
      alive = false;
    window.__cursorX = -100;
    window.__cursorY = -100;

    document.addEventListener(
      "mousemove",
      (e) => {
        mx = e.clientX;
        my = e.clientY;
        window.__cursorX = mx;
        window.__cursorY = my;
        if (!alive) {
          alive = true;
          dot.style.opacity = "1";
        }
      },
      { passive: true }
    );

    document.addEventListener("mouseleave", () => {
      alive = false;
      dot.style.opacity = "0";
    });
    document.addEventListener("mouseenter", () => {
      alive = true;
      dot.style.opacity = "1";
    });

    (function loop() {
      requestAnimationFrame(loop);
      dot.style.left = mx + "px";
      dot.style.top = my + "px";
    })();

    // ── HOVER AWARENESS ── grow cursor over interactive surfaces
    const HOVER_SELECTOR =
      'a, button, [role="button"], .work-card, .nav-icon, .card, video, .filter-btn, .footer-cta, .site-footer-cta, .about-resume-link, .desk-play-reel, .meta-item';
    document.addEventListener(
      "mouseover",
      (e) => {
        if (e.target.closest && e.target.closest(HOVER_SELECTOR)) dot.classList.add("is-hover");
      },
      { passive: true }
    );
    document.addEventListener(
      "mouseout",
      (e) => {
        if (e.target.closest && e.target.closest(HOVER_SELECTOR)) {
          // Only remove if we're really leaving the hover surface (not just moving to a child)
          const to = e.relatedTarget;
          if (!to || !(to.closest && to.closest(HOVER_SELECTOR))) dot.classList.remove("is-hover");
        }
      },
      { passive: true }
    );

    // ── MAGNETIC NAV ICONS ── subtle pull toward cursor
    document.querySelectorAll(".nav-icon").forEach((icon) => {
      icon.addEventListener("mousemove", (ev) => {
        const r = icon.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dx = (ev.clientX - cx) * 0.32;
        const dy = (ev.clientY - cy) * 0.32;
        icon.style.transform = `translate(${dx}px, ${dy}px) scale(1.18)`;
      });
      icon.addEventListener("mouseleave", () => {
        icon.style.transform = "";
      });
    });

    // ── NAV AUTO-HIDE ON SCROLL DOWN ── returns when scrolling up. Skips home (no scroll).
    (function () {
      const navEl = document.querySelector(".nav");
      if (!navEl) return;
      let lastY = window.scrollY;
      let ticking = false;
      function handleScroll() {
        const y = window.scrollY;
        // Always show within first 80px of page
        if (y < 80) {
          navEl.classList.remove("nav--hidden");
        } else if (y > lastY + 8) {
          // Scrolling down past threshold
          navEl.classList.add("nav--hidden");
        } else if (y < lastY - 8) {
          // Scrolling up
          navEl.classList.remove("nav--hidden");
        }
        lastY = y;
        ticking = false;
      }
      window.addEventListener(
        "scroll",
        () => {
          if (!ticking) {
            requestAnimationFrame(handleScroll);
            ticking = true;
          }
        },
        { passive: true }
      );
    })();

    // ── KONAMI EASTER EGG ── ↑ ↑ ↓ ↓ ← → ← → B A
    (function () {
      const seq = ["ArrowUp", "ArrowUp", "ArrowDown", "ArrowDown", "ArrowLeft", "ArrowRight", "ArrowLeft", "ArrowRight", "b", "a"];
      let pos = 0;
      window.addEventListener("keydown", (e) => {
        const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        if (k === seq[pos]) {
          pos++;
          if (pos === seq.length) {
            pos = 0;
            document.body.style.animation = "kameha 1.6s cubic-bezier(0.34, 1.56, 0.64, 1)";
            setTimeout(() => {
              document.body.style.animation = "";
            }, 1700);
          }
        } else {
          pos = k === seq[0] ? 1 : 0;
        }
      });
    })();

    // ── CMD+K COMMAND PALETTE ──
    (function () {
      const root = document.getElementById("cmdk");
      const input = document.getElementById("cmdk-input");
      const list = document.getElementById("cmdk-list");
      const hint = document.getElementById("cmdk-hint");
      if (!root || !input || !list) return;

      // Show hint on first visit (per session)
      try {
        if (!sessionStorage.getItem("cmdkHintSeen")) {
          if (hint) hint.style.opacity = "1";
          sessionStorage.setItem("cmdkHintSeen", "1");
        } else if (hint) {
          hint.style.display = "none";
        }
      } catch (_) {}

      const items = [
        { label: "Home", url: "/", group: "Pages", kbd: "H" },
        { label: "Works", url: "/works/", group: "Pages", kbd: "W" },
        { label: "Play", url: "/play/", group: "Pages", kbd: "P" },
        { label: "About", url: "/about/", group: "Pages", kbd: "A" },
        { label: "Contact", url: "/contact/", group: "Pages", kbd: "C" },
        { label: "Encoded — AR at the Met", url: "/encoded/", group: "Projects", kbd: "01" },
        { label: "Cube of Creations", url: "/cube-guy/", group: "Projects", kbd: "02" },
        { label: "AI Self", url: "/ai-self/", group: "Projects", kbd: "03" },
        { label: "Mind Your Feelings", url: "/mind-your-feelings/", group: "Projects", kbd: "04" },
        { label: "Bloom — Mandalas Thesis", url: "/mandalas/", group: "Projects", kbd: "05" },
        { label: "Broken & Beautiful", url: "/b-plus-b/", group: "Projects", kbd: "06" },
        { label: "Mool — Banking for Bharat", url: "/mool/", group: "Projects", kbd: "07" },
        { label: "Shot on iPhone", url: "/shot-on-iphone/", group: "Projects", kbd: "08" },
        { label: "Naavo — Ayurveda Branding", url: "/naavo/", group: "Projects", kbd: "09" },
        { label: "Aananda — Jain Philosophy", url: "/aananda/", group: "Projects", kbd: "10" },
        { label: "Alpha Stockathon", url: "/alpha-stockathon/", group: "Projects", kbd: "11" },
        { label: "Illustrations", url: "/illustrations/", group: "Projects", kbd: "12" },
        { label: "Email Sid", url: "mailto:sidmehtadesign@gmail.com", group: "Connect", kbd: "@", external: true },
        { label: "LinkedIn", url: "https://www.linkedin.com/in/siddharth-mehta-35560916b/", group: "Connect", kbd: "in", external: true },
        { label: "Instagram", url: "https://www.instagram.com/cubeofcreation/", group: "Connect", kbd: "ig", external: true },
        { label: "GitHub", url: "https://github.com/Mehatey", group: "Connect", kbd: "gh", external: true },
        { label: "Resume PDF", url: "/assets/resume.pdf", group: "Connect", kbd: "↗" },
      ];

      let activeIndex = 0;
      let filtered = items.slice();

      function fuzzy(needle, hay) {
        needle = needle.toLowerCase();
        hay = hay.toLowerCase();
        if (!needle) return true;
        if (hay.includes(needle)) return true;
        // Loose subsequence match
        let i = 0;
        for (const c of hay) {
          if (c === needle[i]) i++;
          if (i === needle.length) return true;
        }
        return false;
      }

      function render() {
        const q = input.value.trim();
        filtered = q ? items.filter((it) => fuzzy(q, it.label) || fuzzy(q, it.group)) : items.slice();
        if (filtered.length === 0) {
          list.innerHTML = '<div class="cmdk-empty">Nothing matches</div>';
          return;
        }
        let html = "";
        let lastGroup = "";
        filtered.forEach((it, idx) => {
          if (it.group !== lastGroup) {
            html += `<div class="cmdk-group-label">${it.group}</div>`;
            lastGroup = it.group;
          }
          html += `<div class="cmdk-item${idx === activeIndex ? " is-active" : ""}" data-idx="${idx}">
            <span class="cmdk-item-icon">${it.kbd}</span>
            <span>${it.label}</span>
            ${it.external ? '<span class="cmdk-item-meta">↗</span>' : ""}
          </div>`;
        });
        list.innerHTML = html;
        list.querySelectorAll(".cmdk-item").forEach((el) => {
          el.addEventListener("mouseenter", () => {
            activeIndex = parseInt(el.dataset.idx, 10);
            updateActive();
          });
          el.addEventListener("click", () => {
            activeIndex = parseInt(el.dataset.idx, 10);
            navigate();
          });
        });
      }
      function updateActive() {
        list.querySelectorAll(".cmdk-item").forEach((el, i) => {
          el.classList.toggle("is-active", parseInt(el.dataset.idx, 10) === activeIndex);
        });
        const active = list.querySelector(".cmdk-item.is-active");
        if (active) active.scrollIntoView({ block: "nearest" });
      }
      function navigate() {
        const it = filtered[activeIndex];
        if (!it) return;
        close();
        if (it.external) window.open(it.url, "_blank", "noopener");
        else window.location.href = "{{ site.baseurl }}" + it.url;
      }
      function open() {
        root.classList.add("is-open");
        root.setAttribute("aria-hidden", "false");
        input.value = "";
        activeIndex = 0;
        render();
        setTimeout(() => input.focus(), 30);
        if (hint) hint.style.display = "none";
      }
      function close() {
        root.classList.remove("is-open");
        root.setAttribute("aria-hidden", "true");
      }

      window.addEventListener("keydown", (e) => {
        // Cmd+K / Ctrl+K to open
        if ((e.metaKey || e.ctrlKey) && e.key === "k") {
          e.preventDefault();
          if (root.classList.contains("is-open")) close();
          else open();
          return;
        }
        // "/" to open (when not in input)
        if (e.key === "/" && document.activeElement && !["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
          e.preventDefault();
          open();
          return;
        }
        if (!root.classList.contains("is-open")) return;
        if (e.key === "Escape") {
          e.preventDefault();
          close();
        } else if (e.key === "ArrowDown") {
          e.preventDefault();
          activeIndex = Math.min(activeIndex + 1, filtered.length - 1);
          updateActive();
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          activeIndex = Math.max(activeIndex - 1, 0);
          updateActive();
        } else if (e.key === "Enter") {
          e.preventDefault();
          navigate();
        }
      });

      input.addEventListener("input", () => {
        activeIndex = 0;
        render();
      });
      document.querySelectorAll("[data-cmdk-close]").forEach((el) => el.addEventListener("click", close));
    })();

    // ── CLICK HAPTICS ── tiny synthesized click + cursor ripple
    let __actx = null;
    function getCtx() {
      if (!__actx) {
        const C = window.AudioContext || window.webkitAudioContext;
        if (!C) return null;
        __actx = new C();
      }
      // Resume on first interaction (browsers suspend AC until gesture)
      if (__actx.state === "suspended") __actx.resume().catch(() => {});
      return __actx;
    }
    function playClick() {
      const ctx = getCtx();
      if (!ctx) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      // Soft, warm click — barely-there haptic-style tap
      osc.type = "sine";
      osc.frequency.setValueAtTime(560, t);
      osc.frequency.exponentialRampToValueAtTime(220, t + 0.05);
      gain.gain.setValueAtTime(0.00001, t);
      gain.gain.exponentialRampToValueAtTime(0.012, t + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.1);
    }
    // Warm up AudioContext on the first user gesture so the very first click is audible
    function warmAudio() {
      getCtx();
      window.removeEventListener("pointerdown", warmAudio, true);
      window.removeEventListener("keydown", warmAudio, true);
    }
    window.addEventListener("pointerdown", warmAudio, true);
    window.addEventListener("keydown", warmAudio, true);

    document.addEventListener(
      "mousedown",
      (e) => {
        // Skip on right-click and middle-click
        if (e.button !== 0) return;
        // Skip on form inputs
        const tag = e.target && e.target.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
        playClick();
        // Real haptic on mobile (no-op on desktop)
        if (navigator.vibrate) {
          try {
            navigator.vibrate(6);
          } catch (_) {}
        }
        const r = document.createElement("div");
        r.className = "click-ripple";
        r.style.left = e.clientX + "px";
        r.style.top = e.clientY + "px";
        document.body.appendChild(r);
        setTimeout(() => r.remove(), 600);
      },
      { passive: true }
    );
  })();

  // ── FLOATING DUST ──
  (function () {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;";
    document.body.appendChild(canvas);
    const ctx = canvas.getContext("2d");
    let dpr = 1;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }
    resize();
    window.addEventListener("resize", resize, { passive: true });

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    let lastScroll = window.scrollY;

    let pageVisible = true;
    document.addEventListener("visibilitychange", () => {
      pageVisible = !document.hidden;
    });

    const pts = Array.from({ length: 80 }, (_, i) => {
      const isMote = i < 12;
      return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.1,
        vy: -Math.random() * 0.06 - 0.01,
        r: isMote ? Math.random() * 1.1 + 0.6 : Math.random() * 0.5 + 0.2,
        a: isMote ? Math.random() * 0.12 + 0.06 : Math.random() * 0.08 + 0.02,
        ph: Math.random() * Math.PI * 2,
        spd: Math.random() * 0.006 + 0.003,
        depth: 0.3 + Math.random() * 0.7,
      };
    });

    (function draw() {
      requestAnimationFrame(draw);
      if (!pageVisible) return;
      ctx.clearRect(0, 0, W(), H());

      const curScroll = window.scrollY;
      const scrollDelta = curScroll - lastScroll;
      lastScroll = curScroll;

      const cmx = window.__cursorX || -200;
      const cmy = window.__cursorY || -200;

      for (const p of pts) {
        p.x += p.vx;
        p.y += p.vy;
        p.ph += p.spd;
        p.y -= scrollDelta * p.depth * 0.15;

        const cdx = p.x - cmx,
          cdy = p.y - cmy;
        const cDist = Math.sqrt(cdx * cdx + cdy * cdy);
        if (cDist < 120 && cDist > 0) {
          const push = ((120 - cDist) / 120) * 0.18;
          p.x += (cdx / cDist) * push;
          p.y += (cdy / cDist) * push;
        }

        if (p.y < -4) {
          p.y = H() + 4;
          p.x = Math.random() * W();
        }
        if (p.y > H() + 4) {
          p.y = -4;
          p.x = Math.random() * W();
        }
        if (p.x < -4) p.x = W() + 4;
        if (p.x > W() + 4) p.x = -4;

        const alpha = p.a * (0.45 + 0.55 * Math.sin(p.ph));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(180,190,210,0.7)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    })();
  })();
</script>
