<style>
  /* Desktop only — touch devices keep system cursor */
  @media (hover: hover) and (pointer: fine) {
    * {
      cursor: none !important;
    }
  }

  #cur-dot {
    position: fixed;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 99999;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(160, 210, 255, 0.5) 40%, rgba(80, 150, 240, 0.15) 70%, transparent 100%);
    box-shadow:
      0 0 8px 2px rgba(120, 180, 255, 0.3),
      0 0 20px 4px rgba(80, 140, 240, 0.12);
    will-change: left, top;
    opacity: 0;
    transition: opacity 0.2s;
  }
  /* On touch devices: restore system cursor, hide custom dot */
  @media (hover: none), (pointer: coarse) {
    *,
    *::before,
    *::after {
      cursor: auto !important;
    }
    #cur-dot {
      display: none !important;
    }
  }
</style>

<div id="cur-dot"></div>

<script>
  (function () {
    const dot = document.getElementById("cur-dot");
    if (!dot) return;

    let mx = -100,
      my = -100,
      alive = false;
    window.__cursorX = -100;
    window.__cursorY = -100;

    document.addEventListener(
      "mousemove",
      (e) => {
        mx = e.clientX;
        my = e.clientY;
        window.__cursorX = mx;
        window.__cursorY = my;
        if (!alive) {
          alive = true;
          dot.style.opacity = "1";
        }
      },
      { passive: true }
    );

    document.addEventListener("mouseleave", () => {
      alive = false;
      dot.style.opacity = "0";
    });
    document.addEventListener("mouseenter", () => {
      alive = true;
      dot.style.opacity = "1";
    });

    (function loop() {
      requestAnimationFrame(loop);
      dot.style.left = mx + "px";
      dot.style.top = my + "px";
    })();
  })();

  // ── FLOATING DUST ──
  (function () {
    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;";
    document.body.appendChild(canvas);
    const ctx = canvas.getContext("2d");
    let dpr = 1;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }
    resize();
    window.addEventListener("resize", resize, { passive: true });

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    let lastScroll = window.scrollY;

    let pageVisible = true;
    document.addEventListener("visibilitychange", () => {
      pageVisible = !document.hidden;
    });

    const pts = Array.from({ length: 80 }, (_, i) => {
      const isMote = i < 12;
      return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.1,
        vy: -Math.random() * 0.06 - 0.01,
        r: isMote ? Math.random() * 1.1 + 0.6 : Math.random() * 0.5 + 0.2,
        a: isMote ? Math.random() * 0.12 + 0.06 : Math.random() * 0.08 + 0.02,
        ph: Math.random() * Math.PI * 2,
        spd: Math.random() * 0.006 + 0.003,
        depth: 0.3 + Math.random() * 0.7,
      };
    });

    (function draw() {
      requestAnimationFrame(draw);
      if (!pageVisible) return;
      ctx.clearRect(0, 0, W(), H());

      const curScroll = window.scrollY;
      const scrollDelta = curScroll - lastScroll;
      lastScroll = curScroll;

      const cmx = window.__cursorX || -200;
      const cmy = window.__cursorY || -200;

      for (const p of pts) {
        p.x += p.vx;
        p.y += p.vy;
        p.ph += p.spd;
        p.y -= scrollDelta * p.depth * 0.15;

        const cdx = p.x - cmx,
          cdy = p.y - cmy;
        const cDist = Math.sqrt(cdx * cdx + cdy * cdy);
        if (cDist < 120 && cDist > 0) {
          const push = ((120 - cDist) / 120) * 0.18;
          p.x += (cdx / cDist) * push;
          p.y += (cdy / cDist) * push;
        }

        if (p.y < -4) {
          p.y = H() + 4;
          p.x = Math.random() * W();
        }
        if (p.y > H() + 4) {
          p.y = -4;
          p.x = Math.random() * W();
        }
        if (p.x < -4) p.x = W() + 4;
        if (p.x > W() + 4) p.x = -4;

        const alpha = p.a * (0.45 + 0.55 * Math.sin(p.ph));
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(180,190,210,0.7)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    })();
  })();
</script>
