<!-- Reusable WebGL smoke shader background — same code as home #smoke-bg.
     Cursor-revealed cyan smoke on black. Sits at z-index 0; pages should put their content at z-index 1+.
     Hidden in light mode (would clash with cream). Pauses on visibilitychange to save battery. -->
<canvas id="page-smoke-bg" aria-hidden="true"></canvas>
<style>
  /* Force body into its own stacking context so canvas at z-index -1 sits behind body's content
     but in front of html bg. Critical: do NOT add position:relative to body's other children — that
     breaks position:fixed elements (skip-link, theme toggle, cube-chat FAB) by yanking them into flow. */
  html,
  body {
    overflow-x: hidden; /* kill any horizontal scroll bleed (marquee tracks, oversized media, etc) */
  }
  body {
    isolation: isolate;
  }
  #page-smoke-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    opacity: 0;
    animation: pageSmokeFadeIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
  }
  @keyframes pageSmokeFadeIn {
    to {
      opacity: 0.55;
    }
  }
  html[data-theme="light"] #page-smoke-bg {
    display: none !important;
  }
</style>
<script>
  (function () {
    var c = document.getElementById("page-smoke-bg");
    if (!c) return;
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    // Skip on mobile/touch — fragment-shader fbm noise was hanging low-end Android & older iPhones.
    // The page already has a fallback dark bg; nothing else depends on this canvas painting.
    var isTouchSmall =
      window.matchMedia && (window.matchMedia("(hover: none) and (pointer: coarse)").matches || window.matchMedia("(max-width: 700px)").matches);
    if (isTouchSmall) {
      c.style.display = "none";
      return;
    }
    var gl = c.getContext("webgl", { alpha: true, premultipliedAlpha: false });
    if (!gl) return;
    function resize() {
      c.width = window.innerWidth * 0.5;
      c.height = window.innerHeight * 0.5;
      gl.viewport(0, 0, c.width, c.height);
    }
    resize();
    window.addEventListener("resize", resize, { passive: true });
    var VS = "attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}";
    var FS = [
      "precision mediump float;",
      "uniform float u_time;uniform vec2 u_res;uniform vec2 u_mouse;",
      "vec3 mod289(vec3 x){return x-floor(x/289.0)*289.0;}",
      "vec2 mod289(vec2 x){return x-floor(x/289.0)*289.0;}",
      "vec3 permute(vec3 x){return mod289((x*34.0+1.0)*x);}",
      "float snoise(vec2 v){const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);vec2 i1=x0.x>x0.y?vec2(1,0):vec2(0,1);vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);m=m*m;m=m*m;vec3 x=2.0*fract(p*C.www)-1.0;vec3 h=abs(x)-0.5;vec3 ox=floor(x+0.5);vec3 a0=x-ox;m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;return 130.0*dot(m,g);}",
      "float fbm(vec2 p){float f=0.0;f+=0.5*snoise(p);p*=2.02;f+=0.25*snoise(p);p*=2.03;f+=0.125*snoise(p);p*=2.01;f+=0.0625*snoise(p);return f;}",
      "void main(){vec2 uv=gl_FragCoord.xy/u_res;float t=u_time*0.15;vec2 mouse=u_mouse;vec2 d=uv-mouse;float dist=length(d);float curl=exp(-dist*3.0)*0.4;vec2 swirl=vec2(-d.y,d.x)*curl;float n1=fbm(uv*3.0+vec2(t*0.8,t*0.6)+swirl*2.0);float n2=fbm(uv*2.0+vec2(-t*0.5,t*0.7)+swirl*1.5+0.5);float n3=fbm(uv*4.5+vec2(t*0.3,-t*0.4)+swirl*3.0+1.0);float smoke=n1*0.5+n2*0.3+n3*0.2;smoke=smoke*0.5+0.5;smoke=smoothstep(0.25,0.75,smoke);vec3 deep=vec3(0.01,0.02,0.04);vec3 mid=vec3(0.04,0.12,0.18);vec3 light=vec3(0.15,0.30,0.35);vec3 highlight=vec3(0.35,0.50,0.48);vec3 col=mix(deep,mid,smoothstep(0.2,0.45,smoke));col=mix(col,light,smoothstep(0.45,0.65,smoke));col=mix(col,highlight,smoothstep(0.7,0.9,smoke)*0.3);float proximity=exp(-dist*12.0);col*=proximity*2.5+0.005;float glow=exp(-dist*18.0)*0.25;col+=vec3(0.30,0.50,0.55)*glow;float vig=1.0-dot((uv-0.5)*1.6,(uv-0.5)*1.6);col*=vig;gl_FragColor=vec4(col,1.0);}",
    ].join("\n");
    function mkShader(t, s) {
      var sh = gl.createShader(t);
      gl.shaderSource(sh, s);
      gl.compileShader(sh);
      return sh;
    }
    var prog = gl.createProgram();
    gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
    gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog);
    gl.useProgram(prog);
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    var a = gl.getAttribLocation(prog, "a");
    gl.enableVertexAttribArray(a);
    gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
    var uTime = gl.getUniformLocation(prog, "u_time");
    var uRes = gl.getUniformLocation(prog, "u_res");
    var uMouse = gl.getUniformLocation(prog, "u_mouse");
    var mx = 0.5,
      my = 0.5,
      tmx = 0.5,
      tmy = 0.5;
    document.addEventListener(
      "mousemove",
      function (e) {
        tmx = e.clientX / window.innerWidth;
        tmy = 1.0 - e.clientY / window.innerHeight;
      },
      { passive: true }
    );
    var t0 = performance.now();
    var hidden = false,
      rafId = 0,
      tOff = 0,
      pauseAt = 0;
    function tick() {
      mx += (tmx - mx) * 0.05;
      my += (tmy - my) * 0.05;
      gl.uniform1f(uTime, (performance.now() - t0 - tOff) / 1000);
      gl.uniform2f(uRes, c.width, c.height);
      gl.uniform2f(uMouse, mx, my);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      if (!hidden) rafId = requestAnimationFrame(tick);
    }
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) {
        hidden = true;
        pauseAt = performance.now();
        if (rafId) cancelAnimationFrame(rafId);
      } else if (hidden) {
        hidden = false;
        tOff += performance.now() - pauseAt;
        tick();
      }
    });
    tick();
  })();
</script>
