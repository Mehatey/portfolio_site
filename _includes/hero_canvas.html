<section id="sid-hero" style="height: 100vh; width: 100%; position: relative; overflow: hidden; background: #0a0a12; margin-bottom: 2rem">
  <canvas id="sid-hero-canvas" style="position: absolute; inset: 0; width: 100%; height: 100%"></canvas>

  <!-- Text overlay -->
  <div
    style="
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    "
  >
    <h1
      class="sid-hero-title"
      style="
        font-size: clamp(3rem, 8vw, 6rem);
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.02em;
        margin: 0;
        text-shadow: 0 2px 30px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(30px);
        animation: sid-fade-up 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.1s forwards;
      "
    >
      Siddharth Mehta
    </h1>
    <p
      class="sid-hero-sub"
      style="
        margin-top: 1rem;
        font-size: clamp(1rem, 2vw, 1.25rem);
        color: rgba(209, 213, 219, 0.8);
        font-family: monospace;
        letter-spacing: 0.05em;
        text-shadow: 0 1px 15px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(20px);
        animation: sid-fade-up 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.35s forwards;
      "
    >
      Product Designer &amp; Creative Technologist
    </p>
  </div>

  <!-- Scroll indicator -->
  <div
    style="
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none;
      opacity: 0;
      animation: sid-fade-in 1s ease 1.2s forwards;
    "
  >
    <span style="font-size: 0.65rem; color: rgb(107, 114, 128); font-family: monospace; text-transform: uppercase; letter-spacing: 0.15em"
      >Scroll</span
    >
    <svg class="sid-scroll-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none" style="color: rgb(107, 114, 128)">
      <path d="M4 7l6 6 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </div>
</section>

<style>
  @keyframes sid-fade-up {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes sid-fade-in {
    to {
      opacity: 1;
    }
  }
  @keyframes sid-bounce {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(6px);
    }
  }
  .sid-scroll-arrow {
    animation: sid-bounce 1.8s ease-in-out infinite;
  }
  /* Pull the hero outside al-folio's container padding */
  #sid-hero {
    margin-left: calc(-50vw + 50%);
    margin-right: calc(-50vw + 50%);
    width: 100vw;
  }
</style>

<script type="module">
  import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js";

  const canvas = document.getElementById("sid-hero-canvas");
  const section = document.getElementById("sid-hero");

  // ---- Renderer ----
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(section.clientWidth, section.clientHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
  camera.position.z = 1;

  // ---- GLSL (ported from HeroCanvas.tsx) ----
  const vertexShader = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position.xy, 0.0, 1.0);
}`;

  const fragmentShader = `
precision highp float;
uniform float uTime;
uniform vec2  uMouse;
uniform vec2  uResolution;
varying vec2  vUv;

vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}

float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);
  const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod289(i);
  vec4 p=permute(permute(permute(
    i.z+vec4(0.0,i1.z,i2.z,1.0))
    +i.y+vec4(0.0,i1.y,i2.y,1.0))
    +i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;
  vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

float fbm(vec3 p){
  float value=0.0,amplitude=0.5,frequency=1.0;
  for(int i=0;i<3;i++){
    value+=amplitude*snoise(p*frequency);
    frequency*=2.0;amplitude*=0.5;
  }
  return value;
}

void main(){
  vec2 uv=vUv;
  float aspect=uResolution.x/uResolution.y;
  vec2 st=uv;
  st.x*=aspect;
  float t=uTime*0.15;
  vec2 mouse=uMouse*0.08;
  st+=mouse*smoothstep(0.0,1.5,1.0-length(uv-0.5));
  float n1=fbm(vec3(st*1.4,t));
  float n2=fbm(vec3(st*2.2+3.7,t*1.3+10.0));
  float n3=snoise(vec3(st*3.5+n1*0.5,t*0.8+5.0));
  float warp=fbm(vec3(st*1.8+vec2(n1*0.4,n2*0.4),t*0.7));
  vec3 deepIndigo=vec3(0.102,0.102,0.243);
  vec3 electricBlue=vec3(0.310,0.549,1.000);
  vec3 purple=vec3(0.545,0.361,0.965);
  vec3 darkBase=vec3(0.039,0.039,0.071);
  vec3 accentCyan=vec3(0.200,0.600,0.900);
  vec3 color=darkBase;
  color=mix(color,deepIndigo,smoothstep(-0.3,0.6,warp)*0.9);
  color=mix(color,electricBlue,smoothstep(0.0,0.7,n1+n3*0.3)*0.45);
  color=mix(color,purple,smoothstep(-0.1,0.8,n2)*0.35);
  color=mix(color,accentCyan,smoothstep(0.4,0.9,n1*n2+0.5)*0.2);
  float ridge=abs(n1-n2);
  color+=electricBlue*smoothstep(0.0,0.15,ridge)*smoothstep(0.5,0.15,ridge)*0.15;
  color*=mix(0.5,1.0,1.0-smoothstep(0.3,1.2,length((uv-0.5)*vec2(1.2,1.0))));
  color*=1.1;
  gl_FragColor=vec4(color,1.0);
}`;

  const uniforms = {
    uTime: { value: 0 },
    uMouse: { value: new THREE.Vector2(0, 0) },
    uResolution: { value: new THREE.Vector2(section.clientWidth, section.clientHeight) },
  };

  const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms, depthWrite: false, depthTest: false });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
  scene.add(mesh);

  // ---- Mouse ----
  const rawMouse = { x: 0, y: 0 };
  const smMouse = { x: 0, y: 0 };
  section.addEventListener("pointermove", (e) => {
    const r = section.getBoundingClientRect();
    rawMouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    rawMouse.y = -(((e.clientY - r.top) / r.height) * 2 - 1);
  });

  // ---- Resize ----
  window.addEventListener("resize", () => {
    renderer.setSize(section.clientWidth, section.clientHeight);
    uniforms.uResolution.value.set(section.clientWidth, section.clientHeight);
  });

  // ---- Animation loop ----
  let last = performance.now();
  function loop(now) {
    const delta = Math.min((now - last) / 1000, 0.05);
    last = now;
    uniforms.uTime.value += delta;
    const k = 1.0 - Math.pow(0.05, delta);
    smMouse.x += (rawMouse.x - smMouse.x) * k;
    smMouse.y += (rawMouse.y - smMouse.y) * k;
    uniforms.uMouse.value.set(smMouse.x, smMouse.y);
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
