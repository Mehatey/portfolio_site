<style>
  /* ─── SITE LOADER ─── */
  #site-loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "DM Mono", monospace;
  }
  .sl-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    opacity: 0;
    animation: sl-in 0.45s ease 0.1s forwards;
  }
  @keyframes sl-in {
    to {
      opacity: 1;
    }
  }

  /* ─── CUBE — 100px ─── */
  #sl-cube-scene {
    width: 100px;
    height: 100px;
    perspective: 460px;
  }
  #sl-cube {
    width: 100px;
    height: 100px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-15deg) rotateY(0deg);
    animation: sl-rotate 5.5s linear infinite;
  }
  @keyframes sl-rotate {
    0% {
      transform: rotateX(-15deg) rotateY(0deg);
    }
    25% {
      transform: rotateX(-18deg) rotateY(90deg);
    }
    50% {
      transform: rotateX(-12deg) rotateY(180deg);
    }
    75% {
      transform: rotateX(-18deg) rotateY(270deg);
    }
    100% {
      transform: rotateX(-15deg) rotateY(360deg);
    }
  }

  .sl-face {
    position: absolute;
    width: 100px;
    height: 100px;
    border: 1.5px solid rgba(255, 255, 255, 0.45);
    background: #000;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    opacity: 0;
    animation: sl-face-in 0.32s ease forwards;
    transition:
      border-color 0.85s ease,
      box-shadow 0.85s ease;
  }
  /* fill via ::before */
  .sl-face::before {
    content: "";
    position: absolute;
    inset: 0;
    background: transparent;
    transition: background 0.85s ease;
    pointer-events: none;
  }
  @keyframes sl-face-in {
    to {
      opacity: 1;
    }
  }

  /* Face transforms & stagger */
  .sl-front {
    transform: translateZ(50px);
    animation-delay: 0.05s;
  }
  .sl-back {
    transform: rotateY(180deg) translateZ(50px);
    animation-delay: 0.15s;
  }
  .sl-left {
    transform: rotateY(-90deg) translateZ(50px);
    animation-delay: 0.25s;
  }
  .sl-right {
    transform: rotateY(90deg) translateZ(50px);
    animation-delay: 0.35s;
  }
  .sl-top {
    transform: rotateX(90deg) translateZ(50px);
    animation-delay: 0.45s;
  }
  .sl-bottom {
    transform: rotateX(-90deg) translateZ(50px);
    animation-delay: 0.55s;
  }

  /* Per-face hue (r,g,b as comma list) */
  .sl-front {
    --fc: 80, 130, 255;
  }
  .sl-back {
    --fc: 155, 75, 255;
  }
  .sl-left {
    --fc: 0, 185, 215;
  }
  .sl-right {
    --fc: 0, 160, 145;
  }
  .sl-top {
    --fc: 125, 85, 255;
  }
  .sl-bottom {
    --fc: 55, 85, 230;
  }

  /* Vertical eyes on front */
  .sl-front::after {
    content: "";
    position: absolute;
    top: 22px;
    left: 28px;
    width: 5px;
    height: 30px;
    background: rgba(255, 255, 255, 0.3);
    box-shadow: 33px 0 0 rgba(255, 255, 255, 0.3);
    border-radius: 3px;
    transition:
      background 0.85s ease,
      box-shadow 0.85s ease;
    animation: sl-blink 3.5s ease-in-out infinite 1.2s;
  }
  @keyframes sl-blink {
    0%,
    88%,
    100% {
      opacity: 1;
    }
    93% {
      opacity: 0;
    }
  }

  /* ── PHASE: FILL — soft translucent colour fills, gently breathing ── */
  #sl-cube.phase-fill .sl-face::before {
    background: rgba(var(--fc), 0.12);
    animation: sl-fill-breathe 2.2s ease-in-out infinite;
  }
  #sl-cube.phase-fill .sl-face {
    border-color: rgba(var(--fc), 0.35);
  }
  @keyframes sl-fill-breathe {
    0%,
    100% {
      opacity: 0.5;
    }
    50% {
      opacity: 1;
    }
  }
  #sl-cube.phase-fill .sl-front::after {
    background: rgba(80, 130, 255, 0.6);
    box-shadow: 33px 0 0 rgba(80, 130, 255, 0.6);
  }

  /* ── PHASE: TRANSFER — fill evaporates, colour bleeds into stroke ── */
  #sl-cube.phase-transfer .sl-face::before {
    background: rgba(var(--fc), 0.03);
  }
  #sl-cube.phase-transfer .sl-face {
    border-color: rgba(var(--fc), 0.8);
    box-shadow:
      0 0 12px rgba(var(--fc), 0.22),
      inset 0 0 6px rgba(var(--fc), 0.08);
  }
  #sl-cube.phase-transfer .sl-front::after {
    background: rgba(80, 130, 255, 0.85);
    box-shadow: 33px 0 0 rgba(80, 130, 255, 0.85);
  }

  /* ── PHASE: STROKE — pure glowing borders ── */
  #sl-cube.phase-stroke .sl-face::before {
    background: transparent;
  }
  #sl-cube.phase-stroke .sl-face {
    border-color: rgba(var(--fc), 0.75);
    box-shadow:
      0 0 16px rgba(var(--fc), 0.28),
      inset 0 0 8px rgba(var(--fc), 0.06);
  }
  #sl-cube.phase-stroke .sl-front::after {
    background: rgba(80, 130, 255, 0.75);
    box-shadow: 33px 0 0 rgba(80, 130, 255, 0.75);
  }

  /* ─── STATUS TEXT ─── */
  #sl-status {
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0);
    animation: sl-text-in 0.4s ease 0.3s forwards;
    min-width: 200px;
    text-align: center;
    transition: opacity 0.22s ease;
  }
  @keyframes sl-text-in {
    to {
      color: rgba(255, 255, 255, 0.62);
    }
  }

  /* ─── PROGRESS BAR ─── */
  #sl-bar-wrap {
    width: 100px;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
    opacity: 0;
    animation: sl-bar-show 0.25s ease 0.5s forwards;
  }
  @keyframes sl-bar-show {
    to {
      opacity: 1;
    }
  }
  #sl-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, rgba(80, 130, 255, 0.55), rgba(180, 140, 255, 0.6), rgba(255, 255, 255, 0.85));
    transition: width 0.12s linear;
  }
</style>

<div id="site-loader">
  <div class="sl-inner">
    <div id="sl-cube-scene">
      <div id="sl-cube">
        <div class="sl-face sl-front"></div>
        <div class="sl-face sl-back"></div>
        <div class="sl-face sl-left"></div>
        <div class="sl-face sl-right"></div>
        <div class="sl-face sl-top"></div>
        <div class="sl-face sl-bottom"></div>
      </div>
    </div>
    <p id="sl-status">building worlds</p>
    <div id="sl-bar-wrap"><div id="sl-bar-fill"></div></div>
  </div>
</div>

<script>
  (function () {
    const loader = document.getElementById("site-loader");
    const cubeEl = document.getElementById("sl-cube");
    const sceneEl = document.getElementById("sl-cube-scene");
    const statusEl = document.getElementById("sl-status");
    const barFill = document.getElementById("sl-bar-fill");
    const barWrap = document.getElementById("sl-bar-wrap");
    if (!loader) return;

    // ── On return visits: remove instantly, no animation ──
    if (sessionStorage.getItem("sid_loaded")) {
      // Remove immediately — assets are cached, no need to wait
      loader.remove();
      return;
    }
    sessionStorage.setItem("sid_loaded", "1");

    // ── Hard safety timeout: always remove after 3s no matter what ──
    setTimeout(() => {
      if (loader && loader.parentNode) loader.remove();
    }, 3000);

    const MIN_MS = 600;
    const start = Date.now();

    // ── Status text cycle ──
    const phrases = ["building worlds", "compiling wonder", "almost there"];
    let phraseIdx = 0;
    function cyclePhrase(text) {
      statusEl.style.opacity = "0";
      setTimeout(() => {
        statusEl.textContent = text || phrases[Math.min(++phraseIdx, phrases.length - 1)];
        statusEl.style.opacity = "";
      }, 220);
    }

    // ── Phase sequence (compressed for faster reveal) ──
    // Phase 1: Fill at ~280ms
    setTimeout(() => cubeEl.classList.add("phase-fill"), 280);

    // Phase 2: Transfer fill → stroke at 700ms
    setTimeout(() => {
      cubeEl.classList.remove("phase-fill");
      cubeEl.classList.add("phase-transfer");
      cyclePhrase();
    }, 700);

    // Phase 3: Full stroke at 1100ms — start bar
    setTimeout(() => {
      cubeEl.classList.remove("phase-transfer");
      cubeEl.classList.add("phase-stroke");
      cyclePhrase();
      startBar();
    }, 1100);

    // ── Progress bar — smooth fill, holds at 88% until page ready ──
    let barW = 0,
      barIv = null;
    function startBar() {
      barIv = setInterval(() => {
        barW += 2;
        barFill.style.width = Math.min(barW, 88) + "%";
        if (barW >= 88) clearInterval(barIv);
      }, 38);
    }

    // ── Finish: complete bar → fade out loader ──
    function finishAndFly() {
      if (barIv) clearInterval(barIv);
      barFill.style.transition = "width 0.3s ease";
      barFill.style.width = "100%";
      cyclePhrase("ready");
      setTimeout(fadeOut, 280);
    }

    function fadeOut() {
      loader.style.transition = "opacity 0.38s ease";
      loader.style.opacity = "0";
      loader.style.pointerEvents = "none";
      setTimeout(() => { if (loader.parentNode) loader.remove(); }, 420);
    }

    // ── Wait for page load + minimum time ──
    function tryExit() {
      const elapsed = Date.now() - start;
      setTimeout(finishAndFly, Math.max(0, MIN_MS - elapsed));
    }

    if (document.readyState === "complete") {
      tryExit();
    } else {
      window.addEventListener("load", tryExit);
    }
  })();
</script>
