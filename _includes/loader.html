<style>
  #site-loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Inter", sans-serif;
    overflow: hidden;
  }
  /* Solid backdrop — hides homepage content (desk WebGL, marquee, bottom-bar) during entry + loader scenes.
     The work-collage shader paints above this; cube video + typewriter paint above the shader. */
  #enter-backdrop {
    position: fixed;
    inset: 0;
    z-index: 8000;
    background: #08080c;
    pointer-events: none;
  }
  .sl-phase {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .sl-phase.active {
    opacity: 1;
  }
  .sl-phase.exit {
    opacity: 0;
  }

  /* Phase 1: Video + typewriter
     mix-blend-mode: screen drops the video's black background so the smoke shader shows through.
     Cube character (white-on-black) survives the blend; black bars don't. */
  #sl-video-phase video {
    /* Cube video bumped ~15% (1150 → 1322 max, 92vw → 100vw cap) per design call */
    max-width: 1322px;
    width: min(100vw, 1322px);
    border-radius: 0;
    margin-top: 4vh;
    mix-blend-mode: screen;
    filter: contrast(1.1) brightness(1.05);
  }
  /* Hello — bigger, more confident, distinct from the mono const() stream so they don't clash */
  #sl-hello {
    font-family: "Inter", sans-serif;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 200;
    letter-spacing: -0.02em;
    color: rgba(245, 250, 255, 0.96);
    text-shadow: 0 0 28px rgba(140, 200, 255, 0.55);
    min-height: 1.2em;
    text-align: center;
    white-space: nowrap;
  }
  #sl-hello::after {
    content: "";
    display: inline-block;
    width: 3px;
    height: 0.74em;
    background: rgba(180, 220, 255, 0.85);
    margin-left: 8px;
    vertical-align: text-bottom;
    animation: sl-cursor 0.6s step-end infinite;
    box-shadow: 0 0 10px rgba(160, 220, 255, 0.7);
  }
  @keyframes sl-cursor {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0;
    }
  }

  /* Loader dust */
  #loader-dust {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ── LOADER INTRO STREAM ── 6-line cube's-POV typewriter, top-left during cube entry */
  #loader-stream {
    position: absolute;
    top: 7%;
    left: max(32px, 4.5vw);
    z-index: 12;
    font-family: "DM Mono", monospace;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.04em;
    line-height: 2;
    color: rgba(180, 230, 255, 0.78);
    text-shadow: 0 0 14px rgba(140, 200, 255, 0.35);
    max-width: min(480px, 44vw);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: opacity;
  }
  #loader-stream.is-on {
    opacity: 1;
  }
  #loader-stream.is-fade {
    opacity: 0;
    transition-duration: 0.4s;
  }
  #loader-stream .ls-line {
    display: block;
    white-space: nowrap;
    overflow: hidden;
    position: relative;
  }
  #loader-stream .ls-line.ls-active::after {
    content: "";
    display: inline-block;
    width: 9px;
    height: 14px;
    background: rgba(160, 220, 255, 0.85);
    margin-left: 4px;
    vertical-align: text-bottom;
    animation: lsCursor 0.55s steps(2) infinite;
    box-shadow: 0 0 8px rgba(160, 220, 255, 0.7);
  }
  @keyframes lsCursor {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0;
    }
  }
  #loader-stream .ls-prompt {
    color: rgba(180, 230, 255, 0.9);
    margin-right: 6px;
  }
  @media (max-width: 900px) {
    #loader-stream {
      font-size: 12px;
      max-width: 75vw;
      top: 6%;
      left: 18px;
    }
  }
  @media (max-width: 600px) {
    #loader-stream {
      font-size: 11px;
      letter-spacing: 0.05em;
      line-height: 1.85;
      top: 5%;
      left: 14px;
      max-width: 92vw;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    #loader-stream .ls-line.ls-active::after {
      animation: none;
    }
  }

  /* Loader work-collage — top-level fixed so it backs both the Enter gate and the cube animation.
     z-index: 8500 sits above the solid #enter-backdrop (8000) and below the cube + Enter button (9999+).
     Opacity 1 from start (instant, no fade-in) — was 1.4s transition that read as "shader takes 2s". */
  #loader-collage {
    position: fixed;
    inset: 0;
    z-index: 8500;
    pointer-events: none;
    opacity: 1;
    overflow: hidden;
  }
  #loader-smoke-bg {
    position: fixed;
    inset: 0;
    width: 100%; /* override the canvas's width attribute (set to W*0.5 for perf) so it stretches to fill viewport */
    height: 100%;
    z-index: 8450;
    pointer-events: none;
    opacity: 0.65;
  }
  /* Imagery removed per design call — collage is now pure shader (gradient layers only) */
  .lc-grid {
    display: none;
  }
  /* Static fallback gradient — hidden by default; JS adds .no-shader to <html> if WebGL init fails / reduced-motion.
     Keeps the WebGL smoke shader as the SOLE background when it works (no double-paint). */
  html.no-shader #loader-collage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(40, 70, 130, 0.4) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 70%, rgba(60, 40, 100, 0.28) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(15, 25, 55, 0.55) 0%, rgba(5, 10, 22, 0.92) 75%);
    pointer-events: none;
    z-index: 0;
  }
  /* (Cursor halo from old design removed — the WebGL smoke shader now handles cursor reveal natively) */
  @media (prefers-reduced-motion: reduce) {
    #loader-collage {
      display: none;
    }
  }

  /* Phase 2: Loading animation (replaces eye + brain) */
  #sl-loading-phase video {
    width: 380px;
    max-width: 70vw;
    height: auto;
    display: block;
  }

  /* Onboarding icon row — appears below typewriter text, syncs with phases */
  #sl-onboard-icons {
    position: absolute;
    bottom: 9%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 40px;
    z-index: 11;
  }
  #sl-onboard-icons img {
    width: 40px;
    height: 40px;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    opacity: 0;
    transform: scale(0.55);
    filter: blur(4px);
    transition:
      opacity 0.7s ease,
      transform 0.7s cubic-bezier(0.2, 1.2, 0.3, 1),
      filter 0.6s ease;
  }
  #sl-onboard-icons img.show {
    opacity: 0.9;
    transform: scale(1);
    filter: blur(0);
  }
</style>

<!-- Underwater turbulence filter — used by the work-collage during enter + loader scenes -->
<svg style="position: fixed; width: 0; height: 0; overflow: hidden" aria-hidden="true">
  <defs>
    <filter id="lc-water" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.020" numOctaves="2" seed="7" result="noise">
        <animate attributeName="baseFrequency" values="0.014 0.020;0.020 0.014;0.014 0.020" dur="18s" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="32" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>

<style>
  /* Floating buddha — pointer-events: auto so it's hoverable; transform set inline by JS */
  #enter-3d-stage {
    position: fixed;
    left: 0;
    top: 0;
    width: 180px;
    height: 180px;
    z-index: 9050;
    pointer-events: auto;
    opacity: 0;
    transition:
      opacity 0.6s ease,
      filter 0.4s ease;
    will-change: transform;
    cursor: none;
  }
  #enter-3d-stage.is-on {
    opacity: 1;
  }
  /* Hover playfulness — buddha wiggles + glows softly */
  #enter-3d-stage.is-hovering {
    filter: drop-shadow(0 0 24px rgba(180, 220, 255, 0.55));
    animation: buddhaWiggle 0.8s ease-in-out infinite;
  }
  @keyframes buddhaWiggle {
    0%,
    100% {
      rotate: 0deg;
    }
    25% {
      rotate: -6deg;
    }
    50% {
      rotate: 0deg;
    }
    75% {
      rotate: 6deg;
    }
  }
  #enter-3d-mount {
    width: 100%;
    height: 100%;
    pointer-events: none; /* let stage capture hover, not the model-viewer canvas */
  }
  #enter-3d-mount model-viewer {
    width: 100%;
    height: 100%;
    background: transparent;
    --poster-color: transparent;
  }
  @media (max-width: 700px) {
    #enter-3d-stage {
      width: 130px;
      height: 130px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    #enter-3d-stage {
      display: none;
    }
  }
</style>

<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.0.0/dist/model-viewer.min.js" crossorigin="anonymous"></script>

<script>
  // Floating buddha head — single model that DVD-bounces around. Slowly grows in size and rotation
  // speed over time. Hover triggers a playful wiggle + soft glow.
  (function () {
    var stage = document.getElementById("enter-3d-stage");
    var mount = document.getElementById("enter-3d-mount");
    if (!stage || !mount) return;
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    if (window.matchMedia && window.matchMedia("(hover: none), (pointer: coarse)").matches) return;

    var BUDDHA_SRC = "{{ site.baseurl }}/assets/models/buddha.glb";
    var mv;
    function buildViewer() {
      mount.innerHTML = "";
      mv = document.createElement("model-viewer");
      mv.setAttribute("src", BUDDHA_SRC);
      mv.setAttribute("auto-rotate", "");
      mv.setAttribute("rotation-per-second", "18deg");
      mv.setAttribute("camera-orbit", "0deg 75deg 110%");
      mv.setAttribute("interaction-prompt", "none");
      mv.setAttribute("disable-zoom", "");
      mv.setAttribute("disable-pan", "");
      mv.setAttribute("disable-tap", "");
      mv.setAttribute("environment-image", "neutral");
      mv.setAttribute("exposure", "0.95");
      mv.setAttribute("shadow-intensity", "0");
      mv.style.pointerEvents = "none";
      mount.appendChild(mv);
      return mv;
    }

    var W, H;
    function measure() {
      W = window.innerWidth;
      H = window.innerHeight;
    }
    measure();
    window.addEventListener("resize", measure, { passive: true });

    var baseSize = stage.offsetWidth || 180; // reference at scale 1
    function randPos(currentSize) {
      var cx = W / 2,
        cy = H / 2;
      for (var attempt = 0; attempt < 30; attempt++) {
        var rx = Math.random() * (W - currentSize);
        var ry = Math.random() * (H - currentSize);
        var dx = rx + currentSize / 2 - cx,
          dy = ry + currentSize / 2 - cy;
        if (Math.sqrt(dx * dx + dy * dy) > 260) return [rx, ry];
      }
      return [40, 40];
    }
    var startPos = randPos(baseSize);
    var x = startPos[0],
      y = startPos[1];
    var vx = (Math.random() < 0.5 ? -1 : 1) * (0.55 + Math.random() * 0.25);
    var vy = (Math.random() < 0.5 ? -1 : 1) * (0.4 + Math.random() * 0.2);

    // Hover playfulness — toggle a CSS class so it wiggles + glows. We also cancel propagation
    // so cube chat / cmdk / etc. don't fight.
    stage.addEventListener("mouseenter", function () {
      stage.classList.add("is-hovering");
      // Speed up rotation while hovering for extra liveliness
      if (mv) mv.setAttribute("rotation-per-second", "70deg");
    });
    stage.addEventListener("mouseleave", function () {
      stage.classList.remove("is-hovering");
      if (mv) mv.setAttribute("rotation-per-second", baseRotation + "deg");
    });

    // Mount once, never swap. Reveal when loaded.
    setTimeout(function () {
      var inst = buildViewer();
      inst.addEventListener(
        "load",
        function () {
          stage.classList.add("is-on");
          requestAnimationFrame(tick);
        },
        { once: true }
      );
      // Safety: reveal anyway after 4s if 'load' doesn't fire
      setTimeout(function () {
        if (!stage.classList.contains("is-on") && stage.parentNode) {
          stage.classList.add("is-on");
          requestAnimationFrame(tick);
        }
      }, 4000);
    }, 600);

    var t0 = performance.now();
    var baseRotation = 18; // deg/sec at start
    function tick(now) {
      if (!stage.parentNode) return; // user pressed Enter, gate removed
      now = now || performance.now();
      var elapsed = (now - t0) / 1000; // seconds since reveal

      // Slowly grow scale: 1.0 → 1.6 over 60s, then cap (so it doesn't fill the screen)
      var growth = Math.min(1.0 + elapsed * 0.01, 1.6);
      var currentSize = baseSize * growth;

      // Slowly increase rotation speed: 18 → 50 deg/sec over 60s
      if (mv && !stage.classList.contains("is-hovering")) {
        var rotSpeed = Math.min(baseRotation + elapsed * 0.5, 50);
        mv.setAttribute("rotation-per-second", rotSpeed + "deg");
      }

      x += vx;
      y += vy;
      // Bounce off edges using current grown size
      if (x <= 0) {
        x = 0;
        vx = Math.abs(vx);
      }
      if (x >= W - currentSize) {
        x = W - currentSize;
        vx = -Math.abs(vx);
      }
      if (y <= 0) {
        y = 0;
        vy = Math.abs(vy);
      }
      if (y >= H - currentSize) {
        y = H - currentSize;
        vy = -Math.abs(vy);
      }

      stage.style.transform = "translate3d(" + x + "px," + y + "px,0) scale(" + growth + ")";
      stage.style.transformOrigin = "0 0";
      requestAnimationFrame(tick);
    }
  })();
</script>

<style>

<script>
  // ── LOADER SMOKE SHADER ── same WebGL noise field used on home #smoke-bg.
  // Runs from page load so the Enter scene has a live shader backdrop, not a static gradient.
  // Cleaned up on loaderDone alongside #loader-collage.
  // If WebGL fails → set html.no-shader so the static gradient fallback paints instead.
  (function () {
    var c = document.getElementById("loader-smoke-bg");
    if (!c) {
      document.documentElement.classList.add("no-shader");
      return;
    }
    var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (prefersReduced) {
      document.documentElement.classList.add("no-shader");
      return;
    }
    // Skip the loader fbm shader on touch+small — let the static gradient fallback paint instead.
    var isTouchSmall =
      window.matchMedia && (window.matchMedia("(hover: none) and (pointer: coarse)").matches || window.matchMedia("(max-width: 700px)").matches);
    if (isTouchSmall) {
      document.documentElement.classList.add("no-shader");
      return;
    }
    var gl = c.getContext("webgl", { alpha: true, premultipliedAlpha: false });
    if (!gl) {
      document.documentElement.classList.add("no-shader");
      return;
    }
    function resize() {
      c.width = window.innerWidth * 0.5;
      c.height = window.innerHeight * 0.5;
      gl.viewport(0, 0, c.width, c.height);
    }
    resize();
    window.addEventListener("resize", resize);
    var VS = "attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}";
    var FS = [
      "precision mediump float;",
      "uniform float u_time;",
      "uniform vec2 u_res;",
      "uniform vec2 u_mouse;",
      "vec3 mod289(vec3 x){return x-floor(x/289.0)*289.0;}",
      "vec2 mod289(vec2 x){return x-floor(x/289.0)*289.0;}",
      "vec3 permute(vec3 x){return mod289((x*34.0+1.0)*x);}",
      "float snoise(vec2 v){",
      "  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);",
      "  vec2 i=floor(v+dot(v,C.yy));",
      "  vec2 x0=v-i+dot(i,C.xx);",
      "  vec2 i1=x0.x>x0.y?vec2(1,0):vec2(0,1);",
      "  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;",
      "  i=mod289(i);",
      "  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));",
      "  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);",
      "  m=m*m;m=m*m;",
      "  vec3 x=2.0*fract(p*C.www)-1.0;",
      "  vec3 h=abs(x)-0.5;",
      "  vec3 ox=floor(x+0.5);",
      "  vec3 a0=x-ox;",
      "  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);",
      "  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;",
      "  return 130.0*dot(m,g);",
      "}",
      "float fbm(vec2 p){float f=0.0;f+=0.5*snoise(p);p*=2.02;f+=0.25*snoise(p);p*=2.03;f+=0.125*snoise(p);p*=2.01;f+=0.0625*snoise(p);return f;}",
      "void main(){",
      "  vec2 uv=gl_FragCoord.xy/u_res;",
      "  float t=u_time*0.15;",
      "  // Cursor influence — creates swirl around mouse",
      "  vec2 mouse=u_mouse;",
      "  vec2 d=uv-mouse;",
      "  float dist=length(d);",
      "  float curl=exp(-dist*3.0)*0.4;",
      "  vec2 swirl=vec2(-d.y,d.x)*curl;",
      "  // Multi-layer smoke",
      "  float n1=fbm(uv*3.0+vec2(t*0.8,t*0.6)+swirl*2.0);",
      "  float n2=fbm(uv*2.0+vec2(-t*0.5,t*0.7)+swirl*1.5+0.5);",
      "  float n3=fbm(uv*4.5+vec2(t*0.3,-t*0.4)+swirl*3.0+1.0);",
      "  float smoke=n1*0.5+n2*0.3+n3*0.2;",
      "  smoke=smoke*0.5+0.5;",
      "  smoke=smoothstep(0.25,0.75,smoke);",
      "  // Exact match to home #smoke-bg — cursor-revealed cyan smoke on near-black, seamless across loader scene + home",
      "  vec3 deep=vec3(0.01,0.02,0.04);",
      "  vec3 mid=vec3(0.04,0.12,0.18);",
      "  vec3 light=vec3(0.15,0.30,0.35);",
      "  vec3 highlight=vec3(0.35,0.50,0.48);",
      "  vec3 col=mix(deep,mid,smoothstep(0.2,0.45,smoke));",
      "  col=mix(col,light,smoothstep(0.45,0.65,smoke));",
      "  col=mix(col,highlight,smoothstep(0.7,0.9,smoke)*0.3);",
      "  // Cursor proximity — smoke only visible near cursor, like home",
      "  float proximity=exp(-dist*12.0);",
      "  col*=proximity*2.5+0.005;",
      "  // Cursor glow — tight + bright",
      "  float glow=exp(-dist*18.0)*0.25;",
      "  col+=vec3(0.30,0.50,0.55)*glow;",
      "  // Vignette darken edges",
      "  float vig=1.0-dot((uv-0.5)*1.6,(uv-0.5)*1.6);",
      "  col*=vig;",
      "  gl_FragColor=vec4(col,1.0);",
      "}",
    ].join("\n");
    function mkShader(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }
    var prog = gl.createProgram();
    gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
    gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog);
    gl.useProgram(prog);
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    var a = gl.getAttribLocation(prog, "a");
    gl.enableVertexAttribArray(a);
    gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
    var uTime = gl.getUniformLocation(prog, "u_time");
    var uRes = gl.getUniformLocation(prog, "u_res");
    var uMouse = gl.getUniformLocation(prog, "u_mouse");
    var mx = 0.5,
      my = 0.5,
      tmx = 0.5,
      tmy = 0.5,
      alive = true;
    document.addEventListener(
      "mousemove",
      function (e) {
        tmx = e.clientX / window.innerWidth;
        tmy = 1.0 - e.clientY / window.innerHeight;
      },
      { passive: true }
    );
    var t0 = performance.now();
    var tOffset = 0; // ms paused while tab hidden — keeps shader time continuous
    var pauseAt = 0;
    var hidden = false;
    var rafId = 0;
    function tick() {
      if (!alive || !c.parentNode) return;
      mx += (tmx - mx) * 0.05;
      my += (tmy - my) * 0.05;
      gl.uniform1f(uTime, (performance.now() - t0 - tOffset) / 1000);
      gl.uniform2f(uRes, c.width, c.height);
      gl.uniform2f(uMouse, mx, my);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      if (!hidden) rafId = requestAnimationFrame(tick);
    }
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) {
        hidden = true;
        pauseAt = performance.now();
        if (rafId) cancelAnimationFrame(rafId);
      } else if (hidden) {
        hidden = false;
        tOffset += performance.now() - pauseAt;
        if (alive && c.parentNode) tick();
      }
    });
    tick();
    window.addEventListener("loaderDone", function () {
      setTimeout(function () {
        alive = false;
        if (c.parentNode) {
          c.style.transition = "opacity 0.6s ease";
          c.style.opacity = "0";
          setTimeout(function () {
            if (c.parentNode) c.remove();
          }, 700);
        }
      }, 200);
    });
  })();

  // ── INTRO STREAM ── const() typewriter top-left, runs from page load so it's already typing
  // when the visitor sees the Enter button. Continues through the cube animation phase.
  (function () {
    var stream = document.getElementById("loader-stream");
    if (!stream) return;
    var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var lines = stream.querySelectorAll(".ls-line");
    var texts = [];
    lines.forEach(function (l) {
      texts.push(l.getAttribute("data-text") || "");
    });
    // Reveal immediately (no delay — visitor needs to see the text on the entry scene)
    requestAnimationFrame(function () {
      stream.classList.add("is-on");
    });
    if (prefersReduced) {
      lines.forEach(function (l, i) {
        l.textContent = texts[i];
      });
      return;
    }
    var lineIdx = 0;
    var charIdx = 0;
    function typeNext() {
      if (lineIdx >= lines.length) return;
      var line = lines[lineIdx];
      var target = texts[lineIdx];
      if (charIdx === 0) line.classList.add("ls-active");
      if (charIdx <= target.length) {
        line.textContent = target.substring(0, charIdx);
        charIdx++;
        var delay = 28 + Math.random() * 26;
        if (target.charAt(charIdx - 1) === ">") delay = 90;
        setTimeout(typeNext, delay);
      } else {
        line.classList.remove("ls-active");
        lineIdx++;
        charIdx = 0;
        setTimeout(typeNext, 280);
      }
    }
    // Start typing 600ms after page load (gives the shader a beat to settle in)
    setTimeout(typeNext, 600);
    // Fade out when loader is fully done
    window.addEventListener("loaderDone", function () {
      setTimeout(function () {
        stream.classList.add("is-fade");
      }, 200);
    });
  })();

  // ── ENTRY-SCENE WORK-COLLAGE — top-level cursor reveal + auto-pan, runs from page load (backs Enter gate too).
  // Removed cleanly when the loader sequence completes; home page has its own #work-collage that takes over.
  (function () {
    var lc = document.getElementById("loader-collage");
    if (!lc) return;
    var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (prefersReduced) return;
    var t0 = performance.now();
    var userTook = false;
    var lastUserMove = 0;
    function tick(now) {
      if (!lc.parentNode) return;
      var elapsed = (now - t0) / 1000;
      var w = window.innerWidth,
        h = window.innerHeight;
      if (userTook && now - lastUserMove < 1200) {
        // already set by mousemove handler
      } else {
        var cx = (0.5 + 0.32 * Math.sin(elapsed * 0.4)) * w;
        var cy = (0.5 + 0.22 * Math.sin(elapsed * 0.62)) * h;
        lc.style.setProperty("--lcx", cx + "px");
        lc.style.setProperty("--lcy", cy + "px");
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    document.addEventListener(
      "mousemove",
      function (e) {
        userTook = true;
        lastUserMove = performance.now();
        lc.style.setProperty("--lcx", e.clientX + "px");
        lc.style.setProperty("--lcy", e.clientY + "px");
      },
      { passive: true }
    );
    // When the loader sequence finishes, fade + remove so home page's own work-collage takes over
    window.addEventListener("loaderDone", function () {
      setTimeout(function () {
        // Backdrop fades out first so home reveals smoothly
        var backdrop = document.getElementById("enter-backdrop");
        if (backdrop) {
          backdrop.style.transition = "opacity 0.6s ease";
          backdrop.style.opacity = "0";
          setTimeout(function () {
            if (backdrop.parentNode) backdrop.remove();
          }, 700);
        }
        if (!lc || !lc.parentNode) return;
        lc.style.transition = "opacity 0.6s ease";
        lc.style.opacity = "0";
        setTimeout(function () {
          if (lc && lc.parentNode) lc.remove();
        }, 700);
      }, 200);
    });
  })();

  (function () {
    var loader = document.getElementById("site-loader");
    if (!loader) return;

    var enterGate = document.getElementById("enter-gate");
    var enterBtn = document.getElementById("enter-btn");

    if (sessionStorage.getItem("sid_loaded")) {
      if (enterGate) enterGate.remove();
      loader.remove();
      // Defer to next tick so listeners attached later in the document still receive it
      window.__loaderInstantDone = true;
      setTimeout(function () {
        window.dispatchEvent(new CustomEvent("loaderDone", { detail: { instant: true } }));
      }, 0);
      return;
    }

    // Wait for Enter click
    function onEnter() {
      sessionStorage.setItem("sid_loaded", "1");
      if (enterGate) enterGate.remove();
      loader.style.display = "flex";

      // Start nature sounds immediately on Enter
      window.__natureSnd = new Audio("{{ site.baseurl }}/assets/audio/nature.mp3");
      window.__natureSnd.volume = 0;
      window.__natureSnd.loop = true;
      window.__natureSnd.currentTime = 5;
      window.__natureSnd.play().catch(function () {});
      // Fade in nature gently — very low volume
      var nFade = setInterval(function () {
        if (window.__natureSnd.volume < 0.03) {
          window.__natureSnd.volume = Math.min(window.__natureSnd.volume + 0.002, 0.03);
        } else {
          clearInterval(nFade);
        }
      }, 100);

      // Create typing sound for loader typewriter
      window.__typeSound = new Audio("{{ site.baseurl }}/assets/audio/typing.mp3");
      window.__typeSound.volume = 0.18;
      window.__typeSound.loop = true;

      startLoader();
    }
    if (enterBtn) {
      enterBtn.addEventListener("click", onEnter);
      // Auto-focus so Enter / Space activate without a tab + click
      try {
        enterBtn.focus({ preventScroll: true });
      } catch (_) {}
      // Keyboard: Enter or Space anywhere triggers entry while gate is showing
      var keyHandler = function (e) {
        if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
          // Don't fire if user is typing in an input (defensive — no inputs on this scene, but safe)
          var tag = document.activeElement && document.activeElement.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA") return;
          e.preventDefault();
          onEnter();
          window.removeEventListener("keydown", keyHandler);
        }
      };
      window.addEventListener("keydown", keyHandler);
    }

    function startLoader() {
      setTimeout(function () {
        if (loader && loader.parentNode) {
          loader.remove();
          window.dispatchEvent(new CustomEvent("loaderDone", { detail: { instant: true } }));
        }
      }, 25000);

      var videoPhase = document.getElementById("sl-video-phase");
      var video = document.getElementById("sl-video");
      var hello = document.getElementById("sl-hello");
      var loadingPhase = document.getElementById("sl-loading-phase");
      var loadingVideo = document.getElementById("sl-loading-video");

      function startTypingSound() {
        if (window.__typeSound) {
          window.__typeSound.currentTime = 0;
          window.__typeSound.play().catch(function () {});
        }
      }
      function stopTypingSound() {
        if (window.__typeSound) {
          window.__typeSound.pause();
        }
      }

      // Loader dust particles
      (function () {
        var dc = document.getElementById("loader-dust");
        if (!dc) return;
        var ctx = dc.getContext("2d");
        dc.width = window.innerWidth;
        dc.height = window.innerHeight;
        var dots = [];
        for (var d = 0; d < 40; d++) {
          dots.push({
            x: Math.random() * dc.width,
            y: Math.random() * dc.height,
            r: 0.5 + Math.random() * 1.5,
            vx: (Math.random() - 0.5) * 0.3,
            vy: -0.1 - Math.random() * 0.2,
            a: 0.15 + Math.random() * 0.25,
          });
        }
        function drawDust() {
          ctx.clearRect(0, 0, dc.width, dc.height);
          dots.forEach(function (p) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.y < -10) {
              p.y = dc.height + 10;
              p.x = Math.random() * dc.width;
            }
            if (p.x < -10) p.x = dc.width + 10;
            if (p.x > dc.width + 10) p.x = -10;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,255," + p.a + ")";
            ctx.fill();
          });
          if (document.getElementById("loader-dust")) requestAnimationFrame(drawDust);
        }
        drawDust();
      })();

      // Phase 1: Video + typewriter
      videoPhase.classList.add("active");
      video.play().catch(function () {});

      // Intro stream is now top-level (runs from page load, visible during Enter scene + cube animation)

      // Typewriter lines — "Welcome to my portfolio" removed (overstayed its welcome past the cube exit)
      var lines = [
        { text: "Hello", startAt: 800 },
        { text: "Most people call me Sid", startAt: 3500 },
      ];

      // Onboarding icons reveal — each slightly before its line types
      var iconIds = ["sl-icon-1", "sl-icon-2", "sl-icon-3", "sl-icon-4"];
      lines.forEach(function (line, idx) {
        setTimeout(
          function () {
            var ic = document.getElementById(iconIds[idx]);
            if (ic) ic.classList.add("show");
          },
          Math.max(0, line.startAt - 250)
        );
      });

      // ── SCRAMBLE REVEAL ── each char cycles through random glyphs then settles to the real char.
      // Replaces the typewriter; reads as a creative-tech / hacker reveal that suits the Inter 200 face.
      var SCRAMBLE_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!?#@*<>/\\";
      function scrambleTo(el, target, opts) {
        opts = opts || {};
        var duration = opts.duration || 900;
        var fps = 30;
        var totalFrames = Math.round((duration / 1000) * fps);
        var startTime = performance.now();
        // Per-char: assign a random "settle frame" so chars resolve at staggered times
        var settleFrames = [];
        for (var i = 0; i < target.length; i++) {
          settleFrames.push(Math.floor(totalFrames * (0.3 + 0.65 * (i / Math.max(1, target.length - 1)))));
        }
        function frame(now) {
          var elapsed = now - startTime;
          var f = Math.floor((elapsed / 1000) * fps);
          if (f >= totalFrames) {
            el.textContent = target;
            if (opts.done) opts.done();
            return;
          }
          var out = "";
          for (var i = 0; i < target.length; i++) {
            if (f >= settleFrames[i]) {
              out += target[i];
            } else if (target[i] === " ") {
              out += " ";
            } else {
              out += SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
            }
          }
          el.textContent = out;
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      }

      lines.forEach(function (line, idx) {
        setTimeout(function () {
          // Fade out previous (opacity 0 + heavy blur).
          hello.style.transition = "opacity 0.35s ease, filter 0.35s ease";
          hello.style.opacity = "0";
          hello.style.filter = "blur(8px)";
          setTimeout(function () {
            // SCRAMBLE PHASE: low opacity + light blur so the cycling random characters are visible
            // but quiet — they don't steal attention while the text is still forming.
            hello.style.transition = "none";
            hello.style.opacity = "0.32";
            hello.style.filter = "blur(3px)";
            scrambleTo(hello, line.text, {
              duration: 900,
              done: function () {
                // RESOLVE PHASE: text has fully formed. Smoothly ramp opacity → 1 and unblur.
                hello.style.transition = "opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), filter 0.7s ease";
                hello.style.opacity = "1";
                hello.style.filter = "blur(0)";
              },
            });
          }, 350);
        }, line.startAt);
      });

      // When the cube video ends, fade the Hello text out so it doesn't linger past the cube exit
      var fadeHelloOnVideoEnd = function () {
        hello.style.transition = "opacity 0.5s ease, filter 0.5s ease";
        hello.style.opacity = "0";
        hello.style.filter = "blur(6px)";
      };

      // Video ends → loading animation → dissolve
      var videoEnded = false;
      var loadingEnded = false;

      function onLoadingEnd() {
        if (loadingEnded) return;
        loadingEnded = true;
        loadingVideo.pause();
        // Brief hold, then dissolve
        setTimeout(function () {
          loader.style.transition = "opacity 0.8s ease";
          loader.style.opacity = "0";
          setTimeout(function () {
            if (loader.parentNode) loader.remove();
            window.dispatchEvent(new CustomEvent("loaderDone", { detail: { instant: false } }));
          }, 800);
        }, 200);
      }

      function onVideoEnd() {
        if (videoEnded) return;
        videoEnded = true;
        videoPhase.classList.remove("active");
        videoPhase.classList.add("exit");
        // Fade Hello out — it overstayed its welcome past the cube exit
        fadeHelloOnVideoEnd();
        // Fade out the intro stream as we move to phase 2
        var stream = document.getElementById("loader-stream");
        if (stream) stream.classList.add("is-fade");
        video.pause();
        loadingPhase.classList.add("active");
        loadingVideo.play().catch(function () {});

        loadingVideo.addEventListener("ended", onLoadingEnd);
        // Fallback: clamp duration to 5.5s in case 'ended' doesn't fire
        setTimeout(onLoadingEnd, 5500);
      }

      video.addEventListener("ended", onVideoEnd);
      setTimeout(onVideoEnd, 11000);
    } // end startLoader
  })();
</script>
