<style>
  #site-loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Inter", sans-serif;
    overflow: hidden;
  }
  .sl-phase {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .sl-phase.active {
    opacity: 1;
  }
  .sl-phase.exit {
    opacity: 0;
  }

  /* Phase 1: Video + typewriter */
  #sl-video-phase video {
    max-width: 1150px;
    width: 92vw;
    border-radius: 8px;
    margin-top: 6vh;
  }
  #sl-hello {
    font-family: "Inter", sans-serif;
    font-size: clamp(18px, 2.2vw, 26px);
    font-weight: 400;
    letter-spacing: 0.01em;
    color: rgba(255, 255, 255, 0.55);
    min-height: 36px;
    text-align: center;
    white-space: nowrap;
  }
  #sl-hello::after {
    content: "";
    display: inline-block;
    width: 1px;
    height: 0.8em;
    background: rgba(255, 255, 255, 0.4);
    margin-left: 3px;
    vertical-align: text-bottom;
    animation: sl-cursor 0.6s step-end infinite;
  }
  @keyframes sl-cursor {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0;
    }
  }

  /* Loader dust */
  #loader-dust {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ── LOADER INTRO STREAM ── 6-line cube's-POV typewriter, top-left during cube entry */
  #loader-stream {
    position: absolute;
    top: 8%;
    left: max(28px, 4vw);
    z-index: 12;
    font-family: "DM Mono", monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.06em;
    line-height: 1.95;
    color: rgba(160, 220, 255, 0.6);
    text-shadow: 0 0 10px rgba(160, 220, 255, 0.28);
    max-width: min(360px, 38vw);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: opacity;
  }
  #loader-stream.is-on {
    opacity: 1;
  }
  #loader-stream.is-fade {
    opacity: 0;
    transition-duration: 0.4s;
  }
  #loader-stream .ls-line {
    display: block;
    white-space: nowrap;
    overflow: hidden;
    position: relative;
  }
  #loader-stream .ls-line.ls-active::after {
    content: "";
    display: inline-block;
    width: 7px;
    height: 11px;
    background: rgba(160, 220, 255, 0.75);
    margin-left: 3px;
    vertical-align: text-bottom;
    animation: lsCursor 0.55s steps(2) infinite;
    box-shadow: 0 0 6px rgba(160, 220, 255, 0.6);
  }
  @keyframes lsCursor {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0;
    }
  }
  #loader-stream .ls-prompt {
    color: rgba(180, 230, 255, 0.9);
    margin-right: 6px;
  }
  @media (max-width: 900px) {
    #loader-stream {
      font-size: 10px;
      max-width: 70vw;
      top: 6%;
      left: 18px;
    }
  }
  @media (max-width: 600px) {
    #loader-stream {
      display: none;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    #loader-stream .ls-line.ls-active::after {
      animation: none;
    }
  }

  /* Loader work-collage — same underwater reveal idea as home, slow auto-pan */
  #loader-collage {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1);
    -webkit-mask-image: radial-gradient(
      circle 320px at var(--lcx, 50%) var(--lcy, 50%),
      rgba(0, 0, 0, 0.85) 0%,
      rgba(0, 0, 0, 0.45) 35%,
      rgba(0, 0, 0, 0.15) 65%,
      transparent 90%
    );
    mask-image: radial-gradient(
      circle 320px at var(--lcx, 50%) var(--lcy, 50%),
      rgba(0, 0, 0, 0.85) 0%,
      rgba(0, 0, 0, 0.45) 35%,
      rgba(0, 0, 0, 0.15) 65%,
      transparent 90%
    );
    mix-blend-mode: screen;
    filter: url(#lc-water);
  }
  #loader-collage.is-on {
    opacity: 0.6;
  }
  .lc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: 100%;
    height: 100%;
  }
  .lc-grid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: hue-rotate(195deg) saturate(0.55) brightness(0.5) contrast(1.1);
  }
  #loader-collage::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle 320px at var(--lcx, 50%) var(--lcy, 50%), rgba(140, 200, 255, 0.18) 0%, transparent 60%);
    pointer-events: none;
    mix-blend-mode: overlay;
  }
  @media (prefers-reduced-motion: reduce) {
    #loader-collage {
      display: none;
    }
  }

  /* Phase 2: Loading animation (replaces eye + brain) */
  #sl-loading-phase video {
    width: 380px;
    max-width: 70vw;
    height: auto;
    display: block;
  }

  /* Onboarding icon row — appears below typewriter text, syncs with phases */
  #sl-onboard-icons {
    position: absolute;
    bottom: 9%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 40px;
    z-index: 11;
  }
  #sl-onboard-icons img {
    width: 40px;
    height: 40px;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    opacity: 0;
    transform: scale(0.55);
    filter: blur(4px);
    transition:
      opacity 0.7s ease,
      transform 0.7s cubic-bezier(0.2, 1.2, 0.3, 1),
      filter 0.6s ease;
  }
  #sl-onboard-icons img.show {
    opacity: 0.9;
    transform: scale(1);
    filter: blur(0);
  }
</style>

<!-- Enter gate — unlocks audio -->
<div
  id="enter-gate"
  style="
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    font-family: &quot;Inter&quot;, sans-serif;
    cursor: none;
  "
>
  <button
    id="enter-btn"
    style="
      font-family: &quot;DM Mono&quot;, monospace;
      font-size: 16px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.35);
      padding: 22px 60px;
      cursor: none;
      transition:
        border-color 0.3s,
        color 0.3s,
        background 0.3s;
    "
    onmouseover="
      this.style.borderColor = 'rgba(255,255,255,0.85)';

    onmouseout="
      this.style.borderColor = 'rgba(255,255,255,0.35)';
      this.style.color = 'rgba(255,255,255,0.92)';
      this.style.background = 'transparent';
    "
  >
    Enter
  </button>
</div>

<div id="site-loader" style="display: none">
  <!-- Underwater work-collage backing the cube entry animation — covers loaded lazily via data-src so they don't block the loader -->
  <div id="loader-collage" aria-hidden="true">
    <div class="lc-grid">
      <img data-src="{{ site.baseurl }}/1.met/0.png" alt="" loading="lazy" decoding="async" />
      <img data-src="{{ site.baseurl }}/2.cube/cover.png" alt="" loading="lazy" decoding="async" />
      <img data-src="{{ site.baseurl }}/2.ai-self/cover.png" alt="" loading="lazy" decoding="async" />
      <img data-src="{{ site.baseurl }}/4.mandala/cover.png" alt="" loading="lazy" decoding="async" />
      <img data-src="{{ site.baseurl }}/5.bb/cover.png" alt="" loading="lazy" decoding="async" />
      <img data-src="{{ site.baseurl }}/5.mool/cover.png" alt="" loading="lazy" decoding="async" />
      <img data-src="{{ site.baseurl }}/6.mindu/cover 2.webp" alt="" loading="lazy" decoding="async" />
      <img data-src="{{ site.baseurl }}/7.naavo/cover.png" alt="" loading="lazy" decoding="async" />

  <!-- Underwater turbulence filter for the loader collage -->
  <svg style="position: absolute; width: 0; height: 0; overflow: hidden" aria-hidden="true">
    <defs>
      <filter id="lc-water" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="fractalNoise" baseFrequency="0.014 0.020" numOctaves="2" seed="7" result="noise">
          <animate attributeName="baseFrequency" values="0.014 0.020;0.020 0.014;0.014 0.020" dur="18s" repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="32" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <canvas id="loader-dust"></canvas>

  <!-- Top-left intro stream — 6 lines, cube's POV about Sid, types in dystopian terminal style -->
  <div id="loader-stream" aria-hidden="true">
    <span class="ls-line" data-text="&gt; what he builds_"></span>
    <span class="ls-line" data-text="&gt; spaces that hold strangers"></span>
    <span class="ls-line" data-text="&gt; mandalas that disappear"></span>
    <span class="ls-line" data-text="&gt; cubes that grow sides"></span>
    <span class="ls-line" data-text="&gt; stories you walk through"></span>
    <span class="ls-line" data-text="&gt; rooms that remember"></span>
  </div>
  <!-- Typewriter text — persists across all phases -->
  <span id="sl-hello" style="position: absolute; top: 14%; left: 50%; transform: translateX(-50%); z-index: 10"></span>

  <!-- Onboarding icons — preview the nav, appear with each typewriter line -->
  <div id="sl-onboard-icons">
    <img id="sl-icon-1" src="{{ site.baseurl }}/assets/img/nav/cube.png" alt="" />
    <img id="sl-icon-2" src="{{ site.baseurl }}/assets/img/nav/flower.png" alt="" />
    <img id="sl-icon-3" src="{{ site.baseurl }}/assets/img/nav/sparkle.png" alt="" />
    <img id="sl-icon-4" src="{{ site.baseurl }}/assets/img/nav/cross.png" alt="" />
  </div>

  <div class="sl-phase" id="sl-video-phase">
    <video id="sl-video" playsinline muted preload="auto" src="{{ site.baseurl }}/assets/video/cube_gettingup.mp4"></video>
  </div>

  <div class="sl-phase" id="sl-loading-phase">
    <video id="sl-loading-video" playsinline muted preload="auto" src="{{ site.baseurl }}/assets/video/loading-ani.mp4"></video>
  </div>
</div>

<script>
  (function () {
    var loader = document.getElementById("site-loader");
    if (!loader) return;

    var enterGate = document.getElementById("enter-gate");
    var enterBtn = document.getElementById("enter-btn");

    if (sessionStorage.getItem("sid_loaded")) {
      if (enterGate) enterGate.remove();
      loader.remove();
      // Defer to next tick so listeners attached later in the document still receive it
      window.__loaderInstantDone = true;
      setTimeout(function () {
        window.dispatchEvent(new CustomEvent("loaderDone", { detail: { instant: true } }));
      }, 0);
      return;
    }

    // Wait for Enter click
    function onEnter() {
      sessionStorage.setItem("sid_loaded", "1");
      if (enterGate) enterGate.remove();
      loader.style.display = "flex";

      // Start nature sounds immediately on Enter
      window.__natureSnd = new Audio("{{ site.baseurl }}/assets/audio/nature.mp3");
      window.__natureSnd.volume = 0;
      window.__natureSnd.loop = true;
      window.__natureSnd.currentTime = 5;
      window.__natureSnd.play().catch(function () {});
      // Fade in nature gently — very low volume
      var nFade = setInterval(function () {
        if (window.__natureSnd.volume < 0.03) {
          window.__natureSnd.volume = Math.min(window.__natureSnd.volume + 0.002, 0.03);
        } else {
          clearInterval(nFade);
        }
      }, 100);

      // Create typing sound for loader typewriter
      window.__typeSound = new Audio("{{ site.baseurl }}/assets/audio/typing.mp3");
      window.__typeSound.volume = 0.18;
      window.__typeSound.loop = true;

      startLoader();
    }
    if (enterBtn) enterBtn.addEventListener("click", onEnter);

    function startLoader() {
      setTimeout(function () {
        if (loader && loader.parentNode) {
          loader.remove();
          window.dispatchEvent(new CustomEvent("loaderDone", { detail: { instant: true } }));
        }
      }, 25000);

      var videoPhase = document.getElementById("sl-video-phase");
      var video = document.getElementById("sl-video");
      var hello = document.getElementById("sl-hello");
      var loadingPhase = document.getElementById("sl-loading-phase");
      var loadingVideo = document.getElementById("sl-loading-video");

      function startTypingSound() {
        if (window.__typeSound) {
          window.__typeSound.currentTime = 0;
          window.__typeSound.play().catch(function () {});
        }
      }
      function stopTypingSound() {
        if (window.__typeSound) {
          window.__typeSound.pause();
        }
      }

      // Loader dust particles
      (function () {
        var dc = document.getElementById("loader-dust");
        if (!dc) return;
        var ctx = dc.getContext("2d");
        dc.width = window.innerWidth;
        dc.height = window.innerHeight;
        var dots = [];
        for (var d = 0; d < 40; d++) {
          dots.push({
            x: Math.random() * dc.width,
            y: Math.random() * dc.height,
            r: 0.5 + Math.random() * 1.5,
            vx: (Math.random() - 0.5) * 0.3,
            vy: -0.1 - Math.random() * 0.2,
            a: 0.15 + Math.random() * 0.25,
          });
        }
        function drawDust() {
          ctx.clearRect(0, 0, dc.width, dc.height);
          dots.forEach(function (p) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.y < -10) {
              p.y = dc.height + 10;
              p.x = Math.random() * dc.width;
            }
            if (p.x < -10) p.x = dc.width + 10;
            if (p.x > dc.width + 10) p.x = -10;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,255," + p.a + ")";
            ctx.fill();
          });
          if (document.getElementById("loader-dust")) requestAnimationFrame(drawDust);
        }
        drawDust();
      })();

      // Phase 1: Video + typewriter
      videoPhase.classList.add("active");
      video.play().catch(function () {});

      // ── INTRO STREAM ── 6-line typewriter top-left, types throughout cube entry
      (function () {
        var stream = document.getElementById("loader-stream");
        if (!stream) return;
        var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var lines = stream.querySelectorAll(".ls-line");
        var texts = [];
        lines.forEach(function (l) {
          texts.push(l.getAttribute("data-text") || "");
        });

        // Reveal the container after a short beat (after cube starts animating)
        setTimeout(function () {
          stream.classList.add("is-on");
        }, 700);

        if (prefersReduced) {
          // Just show all lines at once
          setTimeout(function () {
            lines.forEach(function (l, i) {
              l.textContent = texts[i];
            });
          }, 800);
          return;
        }

        var lineIdx = 0;
        var charIdx = 0;
        function typeNext() {
          if (lineIdx >= lines.length) return;
          var line = lines[lineIdx];
          var target = texts[lineIdx];
          if (charIdx === 0) line.classList.add("ls-active");
          if (charIdx <= target.length) {
            line.textContent = target.substring(0, charIdx);
            charIdx++;
            // Slightly variable speed; pause after the > prompt char
            var delay = 28 + Math.random() * 26;
            if (target.charAt(charIdx - 1) === ">") delay = 90;
            setTimeout(typeNext, delay);
          } else {
            line.classList.remove("ls-active");
            // Mark final char with prompt color via inline span swap (light touch)
            lineIdx++;
            charIdx = 0;
            // Pause between lines
            setTimeout(typeNext, 280);
          }
        }
        // Begin typing ~1s in (gives cube animation a moment to set the stage)
        setTimeout(typeNext, 1100);
      })();

      // ── LOADER WORK-COLLAGE: auto-pan + cursor override ──
      (function () {
        var lc = document.getElementById("loader-collage");
        if (!lc) return;
        var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReduced) return;
        // Defer cover loading until idle so it doesn't compete with the cube video
        function loadLcCovers() {
          lc.querySelectorAll("img[data-src]").forEach(function (img) {
            img.src = img.dataset.src;
            img.removeAttribute("data-src");
          });
        }
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(loadLcCovers, { timeout: 2500 });
        } else {
          setTimeout(loadLcCovers, 1000);
        }
        // Reveal it after a beat so it eases in alongside the cube animation
        setTimeout(function () {
          lc.classList.add("is-on");
        }, 600);
        // Auto-pan a soft figure-8 across the screen until the user takes over
        var t0 = performance.now();
        var userTook = false;
        var lastUserMove = 0;
        function tick(now) {
          if (!loader.parentNode) return; // bail if loader removed
          var elapsed = (now - t0) / 1000;
          var w = window.innerWidth,
            h = window.innerHeight;
          // Override pause: if user moved cursor in last 1.2s, follow them
          if (userTook && now - lastUserMove < 1200) {
            // already set by mousemove handler
          } else {
            // Lissajous-ish path: x: 0.5 + 0.32*sin(0.4t), y: 0.5 + 0.22*sin(0.6t)
            var cx = (0.5 + 0.32 * Math.sin(elapsed * 0.4)) * w;
            var cy = (0.5 + 0.22 * Math.sin(elapsed * 0.62)) * h;
            lc.style.setProperty("--lcx", cx + "px");
            lc.style.setProperty("--lcy", cy + "px");
          }
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
        document.addEventListener(
          "mousemove",
          function (e) {
            userTook = true;
            lastUserMove = performance.now();
            lc.style.setProperty("--lcx", e.clientX + "px");
            lc.style.setProperty("--lcy", e.clientY + "px");
          },
          { passive: true }
        );
      })();

      // Typewriter lines — fade out instead of backspace
      var lines = [
        { text: "Hello", startAt: 800 },
        { text: "Most people call me Sid", startAt: 3500 },
        { text: "But you can call me anytime", startAt: 7000 },
        { text: "Welcome to my portfolio", startAt: 11000 },
      ];

      // Onboarding icons reveal — each slightly before its line types
      var iconIds = ["sl-icon-1", "sl-icon-2", "sl-icon-3", "sl-icon-4"];
      lines.forEach(function (line, idx) {
        setTimeout(
          function () {
            var ic = document.getElementById(iconIds[idx]);
            if (ic) ic.classList.add("show");
          },
          Math.max(0, line.startAt - 250)
        );
      });

      lines.forEach(function (line, idx) {
        setTimeout(function () {
          // Fade out previous text
          hello.style.transition = "opacity 0.3s ease";
          hello.style.opacity = "0";
          setTimeout(function () {
            hello.textContent = "";
            hello.style.opacity = "1";
            // Type new line
            var i = 0;
            startTypingSound();
            (function t() {
              if (i < line.text.length) {
                i++;
                hello.textContent = line.text.slice(0, i);
                setTimeout(t, 60 + Math.random() * 30);
              } else {
                stopTypingSound();
              }
            })();
          }, 300);
        }, line.startAt);
      });

      // Video ends → loading animation → dissolve
      var videoEnded = false;
      var loadingEnded = false;

      function onLoadingEnd() {
        if (loadingEnded) return;
        loadingEnded = true;
        loadingVideo.pause();
        // Brief hold, then dissolve
        setTimeout(function () {
          loader.style.transition = "opacity 0.8s ease";
          loader.style.opacity = "0";
          setTimeout(function () {
            if (loader.parentNode) loader.remove();
            window.dispatchEvent(new CustomEvent("loaderDone", { detail: { instant: false } }));
          }, 800);
        }, 200);
      }

      function onVideoEnd() {
        if (videoEnded) return;
        videoEnded = true;
        videoPhase.classList.remove("active");
        videoPhase.classList.add("exit");
        // Fade out the intro stream as we move to phase 2
        var stream = document.getElementById("loader-stream");
        if (stream) stream.classList.add("is-fade");
        video.pause();
        loadingPhase.classList.add("active");
        loadingVideo.play().catch(function () {});

        loadingVideo.addEventListener("ended", onLoadingEnd);
        // Fallback: clamp duration to 5.5s in case 'ended' doesn't fire
        setTimeout(onLoadingEnd, 5500);
      }

      video.addEventListener("ended", onVideoEnd);
      setTimeout(onVideoEnd, 11000);
    } // end startLoader
  })();
</script>
