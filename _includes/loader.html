<style>
  #site-loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Inter", sans-serif;
    overflow: hidden;
  }
  /* Solid backdrop — hides homepage content (desk WebGL, marquee, bottom-bar) during entry + loader scenes.
     The work-collage shader paints above this; cube video + typewriter paint above the shader. */
  #enter-backdrop {
    position: fixed;
    inset: 0;
    z-index: 8000;
    background: #08080c;
    pointer-events: none;
  }
  .sl-phase {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .sl-phase.active {
    opacity: 1;
  }
  .sl-phase.exit {
    opacity: 0;
  }

  /* Phase 1: Video + typewriter
     mix-blend-mode: screen drops the video's black background so the smoke shader shows through.
     Cube character (white-on-black) survives the blend; black bars don't. */
  #sl-video-phase video {
    max-width: 1150px;
    width: 92vw;
    border-radius: 0;
    margin-top: 6vh;
    mix-blend-mode: screen;
    filter: contrast(1.1) brightness(1.05);
  }
  /* Hello — bigger, more confident, distinct from the mono const() stream so they don't clash */
  #sl-hello {
    font-family: "Inter", sans-serif;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 200;
    letter-spacing: -0.02em;
    color: rgba(245, 250, 255, 0.96);
    text-shadow: 0 0 28px rgba(140, 200, 255, 0.55);
    min-height: 1.2em;
    text-align: center;
    white-space: nowrap;
  }
  #sl-hello::after {
    content: "";
    display: inline-block;
    width: 3px;
    height: 0.74em;
    background: rgba(180, 220, 255, 0.85);
    margin-left: 8px;
    vertical-align: text-bottom;
    animation: sl-cursor 0.6s step-end infinite;
    box-shadow: 0 0 10px rgba(160, 220, 255, 0.7);
  }
  @keyframes sl-cursor {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0;
    }
  }

  /* Loader dust */
  #loader-dust {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ── LOADER INTRO STREAM ── 6-line cube's-POV typewriter, top-left during cube entry */
  #loader-stream {
    position: absolute;
    top: 7%;
    left: max(32px, 4.5vw);
    z-index: 12;
    font-family: "DM Mono", monospace;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.04em;
    line-height: 2;
    color: rgba(180, 230, 255, 0.78);
    text-shadow: 0 0 14px rgba(140, 200, 255, 0.35);
    max-width: min(480px, 44vw);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: opacity;
  }
  #loader-stream.is-on {
    opacity: 1;
  }
  #loader-stream.is-fade {
    opacity: 0;
    transition-duration: 0.4s;
  }
  #loader-stream .ls-line {
    display: block;
    white-space: nowrap;
    overflow: hidden;
    position: relative;
  }
  #loader-stream .ls-line.ls-active::after {
    content: "";
    display: inline-block;
    width: 9px;
    height: 14px;
    background: rgba(160, 220, 255, 0.85);
    margin-left: 4px;
    vertical-align: text-bottom;
    animation: lsCursor 0.55s steps(2) infinite;
    box-shadow: 0 0 8px rgba(160, 220, 255, 0.7);
  }
  @keyframes lsCursor {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0;
    }
  }
  #loader-stream .ls-prompt {
    color: rgba(180, 230, 255, 0.9);
    margin-right: 6px;
  }
  @media (max-width: 900px) {
    #loader-stream {
      font-size: 12px;
      max-width: 75vw;
      top: 6%;
      left: 18px;
    }
  }
  @media (max-width: 600px) {
    #loader-stream {
      font-size: 11px;
      letter-spacing: 0.05em;
      line-height: 1.85;
      top: 5%;
      left: 14px;
      max-width: 92vw;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    #loader-stream .ls-line.ls-active::after {
      animation: none;
    }
  }

  /* Loader work-collage — top-level fixed so it backs both the Enter gate and the cube animation.
     z-index: 8500 sits above the solid #enter-backdrop (8000) and below the cube + Enter button (9999+).
     Opacity 1 from start (instant, no fade-in) — was 1.4s transition that read as "shader takes 2s". */
  #loader-collage {
    position: fixed;
    inset: 0;
    z-index: 8500;
    pointer-events: none;
    opacity: 1;
    overflow: hidden;
  }
  #loader-smoke-bg {
    position: fixed;
    inset: 0;
    z-index: 8450;
    pointer-events: none;
    opacity: 0.65;
  }
  /* Imagery removed per design call — collage is now pure shader (gradient layers only) */
  .lc-grid {
    display: none;
  }
  /* Static fallback gradient — only paints if WebGL fails / reduced-motion / shader script doesn't run.
     If WebGL is alive, #loader-smoke-bg paints over this layer. */
  #loader-collage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(40, 70, 130, 0.4) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 70%, rgba(60, 40, 100, 0.28) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(15, 25, 55, 0.55) 0%, rgba(5, 10, 22, 0.92) 75%);
    pointer-events: none;
    z-index: 0;
  }
  /* Layer 2: cursor-following cyan halo — alive, follows the mouse */
  #loader-collage::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(
      circle 720px at var(--lcx, 50%) var(--lcy, 50%),
      rgba(160, 220, 255, 0.32) 0%,
      rgba(90, 150, 220, 0.12) 30%,
      transparent 70%
    );
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 2;
  }
  @media (prefers-reduced-motion: reduce) {
    #loader-collage {
      display: none;
    }
  }

  /* Phase 2: Loading animation (replaces eye + brain) */
  #sl-loading-phase video {
    width: 380px;
    max-width: 70vw;
    height: auto;
    display: block;
  }

  /* Onboarding icon row — appears below typewriter text, syncs with phases */
  #sl-onboard-icons {
    position: absolute;
    bottom: 9%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 40px;
    z-index: 11;
  }
  #sl-onboard-icons img {
    width: 40px;
    height: 40px;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    opacity: 0;
    transform: scale(0.55);
    filter: blur(4px);
    transition:
      opacity 0.7s ease,
      transform 0.7s cubic-bezier(0.2, 1.2, 0.3, 1),
      filter 0.6s ease;
  }
  #sl-onboard-icons img.show {
    opacity: 0.9;
    transform: scale(1);
    filter: blur(0);
  }
</style>

<!-- Underwater turbulence filter — used by the work-collage during enter + loader scenes -->
<svg style="position: fixed; width: 0; height: 0; overflow: hidden" aria-hidden="true">
  <defs>
    <filter id="lc-water" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.020" numOctaves="2" seed="7" result="noise">
        <animate attributeName="baseFrequency" values="0.014 0.020;0.020 0.014;0.014 0.020" dur="18s" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="32" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>

<!-- Solid dark backdrop — hides homepage content during entry + loader phases -->
<div id="enter-backdrop"></div>

<!-- WebGL smoke shader — same blue-noise field as home #smoke-bg, mounted at loader z-index so it backs the Enter scene -->
<canvas id="loader-smoke-bg" aria-hidden="true"></canvas>

<!-- Loader shader fallback gradient (paints if WebGL fails) + cursor halo -->
<div id="loader-collage" class="is-on" aria-hidden="true"></div>

<!-- Enter gate — transparent (backdrop + shader paint behind). Just centers the Enter button. -->
<div
  id="enter-gate"
  style="
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    font-family: &quot;Inter&quot;, sans-serif;
    cursor: none;
  "
>
  <button id="enter-btn" class="enter-btn" aria-label="Enter site">
    <span class="enter-btn__ring enter-btn__ring--1" aria-hidden="true"></span>
    <span class="enter-btn__ring enter-btn__ring--2" aria-hidden="true"></span>
    <span class="enter-btn__ring enter-btn__ring--3" aria-hidden="true"></span>
    <span class="enter-btn__inner">
      <span class="enter-btn__label">Enter</span>
    </span>
  </button>
</div>

<style>
  /* ── ENTER BUTTON — portal animation: pulsing rings, breathing core, hover lights up ── */
  #enter-btn.enter-btn {
    position: relative;
    width: 200px;
    height: 200px;
    border: none;
    background: transparent;
    padding: 0;
    cursor: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .enter-btn__inner {
    position: relative;
    z-index: 5;
    width: 132px;
    height: 132px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, rgba(60, 120, 200, 0.18) 0%, rgba(20, 50, 110, 0.12) 60%, rgba(10, 30, 70, 0.08) 100%);
    border: 1px solid rgba(180, 220, 255, 0.45);
    backdrop-filter: blur(6px) saturate(1.3);
    -webkit-backdrop-filter: blur(6px) saturate(1.3);
    box-shadow:
      inset 0 0 32px rgba(140, 200, 255, 0.18),
      0 0 40px rgba(60, 120, 200, 0.25),
      0 0 80px rgba(40, 90, 180, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    transition:
      transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
      border-color 0.35s,
      box-shadow 0.45s;
    animation: enterCoreBreathe 4s ease-in-out infinite;
  }
  .enter-btn__label {
    font-family: "DM Mono", monospace;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(220, 240, 255, 0.95);
    text-shadow: 0 0 12px rgba(140, 200, 255, 0.7);
    padding-left: 0.32em; /* compensate for letter-spacing on last char */
  }
  /* Three concentric rings pulse outward continuously (staggered) */
  .enter-btn__ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(160, 210, 255, 0.45);
    pointer-events: none;
    opacity: 0;
    transform: scale(0.66);
    animation: enterRingPulse 3.6s cubic-bezier(0.22, 1, 0.36, 1) infinite;
  }
  .enter-btn__ring--2 {
    animation-delay: 1.2s;
  }
  .enter-btn__ring--3 {
    animation-delay: 2.4s;
  }
  @keyframes enterRingPulse {
    0% {
      opacity: 0;
      transform: scale(0.66);
      border-width: 1.5px;
    }
    20% {
      opacity: 0.85;
    }
    100% {
      opacity: 0;
      transform: scale(1.4);
      border-width: 0.5px;
    }
  }
  @keyframes enterCoreBreathe {
    0%,
    100% {
      transform: scale(1);
      box-shadow:
        inset 0 0 32px rgba(140, 200, 255, 0.18),
        0 0 40px rgba(60, 120, 200, 0.25),
        0 0 80px rgba(40, 90, 180, 0.15);
    }
    50% {
      transform: scale(1.04);
      box-shadow:
        inset 0 0 44px rgba(140, 200, 255, 0.28),
        0 0 56px rgba(60, 120, 200, 0.4),
        0 0 110px rgba(40, 90, 180, 0.25);
    }
  }
  /* Hover — rings accelerate, core brightens + scales */
  #enter-btn.enter-btn:hover .enter-btn__inner {
    transform: scale(1.08);
    border-color: rgba(220, 240, 255, 0.85);
    box-shadow:
      inset 0 0 56px rgba(180, 220, 255, 0.4),
      0 0 80px rgba(100, 160, 230, 0.5),
      0 0 160px rgba(60, 130, 210, 0.32);
  }
  #enter-btn.enter-btn:hover .enter-btn__ring {
    animation-duration: 1.8s;
    border-color: rgba(200, 230, 255, 0.7);
  }
  #enter-btn.enter-btn:hover .enter-btn__label {
    text-shadow: 0 0 18px rgba(180, 220, 255, 0.95);
  }
  @media (prefers-reduced-motion: reduce) {
    .enter-btn__ring {
      animation: none;
      opacity: 0.4;
      transform: scale(1);
    }
    .enter-btn__inner {
      animation: none;
    }
  }
</style>

<div id="site-loader" style="display: none">

  <!-- Top-left intro stream — 6 lines, recruiter-grade info in const() syntax, types in dystopian terminal -->

  <!-- Typewriter text — persists across all phases -->

  <!-- Onboarding icons — preview the nav, appear with each typewriter line -->
  <div id="sl-onboard-icons">
    <img id="sl-icon-1" src="{{ site.baseurl }}/assets/img/nav/cube.png" alt="" />
    <img id="sl-icon-2" src="{{ site.baseurl }}/assets/img/nav/flower.png" alt="" />

  </div>

  <div class="sl-phase" id="sl-video-phase">
    <video id="sl-video" playsinline muted preload="auto" src="{{ site.baseurl }}/assets/video/cube_gettingup.mp4"></video>
  </div>

  <div class="sl-phase" id="sl-loading-phase">

  </div>

<script>
  // ── LOADER SMOKE SHADER ── same WebGL noise field used on home #smoke-bg.
  // Runs from page load so the Enter scene has a live shader backdrop, not a static gradient.
  // Cleaned up on loaderDone alongside #loader-collage.
  (function () {
    var c = document.getElementById("loader-smoke-bg");
    if (!c) return;
    var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (prefersReduced) return;
    var gl = c.getContext("webgl", { alpha: true, premultipliedAlpha: false });
    if (!gl) return;
    function resize() {
      c.width = window.innerWidth * 0.5;
      c.height = window.innerHeight * 0.5;
      gl.viewport(0, 0, c.width, c.height);
    }
    resize();
    window.addEventListener("resize", resize);
    var VS = "attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}";
    var FS = [
      "precision mediump float;",
      "uniform float u_time;",
      "uniform vec2 u_res;",
      "uniform vec2 u_mouse;",
      "vec3 mod289(vec3 x){return x-floor(x/289.0)*289.0;}",
      "vec2 mod289(vec2 x){return x-floor(x/289.0)*289.0;}",
      "vec3 permute(vec3 x){return mod289((x*34.0+1.0)*x);}",
      "float snoise(vec2 v){",
      "  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);",
      "  vec2 i=floor(v+dot(v,C.yy));",
      "  vec2 x0=v-i+dot(i,C.xx);",
      "  vec2 i1=x0.x>x0.y?vec2(1,0):vec2(0,1);",
      "  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;",
      "  i=mod289(i);",
      "  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));",
      "  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);",
      "  m=m*m;m=m*m;",
      "  vec3 x=2.0*fract(p*C.www)-1.0;",
      "  vec3 h=abs(x)-0.5;",
      "  vec3 ox=floor(x+0.5);",
      "  vec3 a0=x-ox;",
      "  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);",
      "  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;",
      "  return 130.0*dot(m,g);",
      "}",
      "float fbm(vec2 p){float f=0.0;f+=0.5*snoise(p);p*=2.02;f+=0.25*snoise(p);p*=2.03;f+=0.125*snoise(p);p*=2.01;f+=0.0625*snoise(p);return f;}",
      "void main(){",
      "  vec2 uv=gl_FragCoord.xy/u_res;",
      "  float t=u_time*0.13;",
      "  vec2 mouse=u_mouse;",
      "  vec2 d=uv-mouse;",
      "  float dist=length(d);",
      "  float curl=exp(-dist*2.5)*0.4;",
      "  vec2 swirl=vec2(-d.y,d.x)*curl;",
      "  float n1=fbm(uv*2.5+vec2(t*0.7,t*0.5)+swirl*1.8);",
      "  float n2=fbm(uv*1.6+vec2(-t*0.4,t*0.6)+swirl*1.2+0.5);",
      "  float n3=fbm(uv*4.0+vec2(t*0.25,-t*0.35)+swirl*2.5+1.0);",
      "  float smoke=n1*0.5+n2*0.3+n3*0.2;",
      "  smoke=smoke*0.5+0.5;",
      "  smoke=smoothstep(0.22,0.78,smoke);",
      "  // Deeper, more saturated palette than home so the loader feels like a portal",
      "  vec3 deep=vec3(0.02,0.04,0.10);",
      "  vec3 mid=vec3(0.06,0.14,0.28);",
      "  vec3 light=vec3(0.18,0.36,0.55);",
      "  vec3 highlight=vec3(0.45,0.65,0.85);",
      "  vec3 col=mix(deep,mid,smoothstep(0.2,0.5,smoke));",
      "  col=mix(col,light,smoothstep(0.5,0.72,smoke));",
      "  col=mix(col,highlight,smoothstep(0.75,0.92,smoke)*0.45);",
      "  // Cursor pull — visible globally with mild proximity boost",
      "  float proximity=mix(0.45,1.4,exp(-dist*1.6));",
      "  col*=proximity;",
      "  // Cursor glow",
      "  float glow=exp(-dist*9.0)*0.35;",
      "  col+=vec3(0.4,0.6,0.85)*glow;",
      "  // Subtle vignette",
      "  float vig=1.0-dot((uv-0.5)*1.5,(uv-0.5)*1.5);",
      "  col*=vig;",
      "  gl_FragColor=vec4(col,1.0);",
      "}",
    ].join("\n");
    function mkShader(type, src) {
      var s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }
    var prog = gl.createProgram();
    gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
    gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog);
    gl.useProgram(prog);
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    var a = gl.getAttribLocation(prog, "a");
    gl.enableVertexAttribArray(a);
    gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
    var uTime = gl.getUniformLocation(prog, "u_time");
    var uRes = gl.getUniformLocation(prog, "u_res");
    var uMouse = gl.getUniformLocation(prog, "u_mouse");
    var mx = 0.5,
      my = 0.5,
      tmx = 0.5,
      tmy = 0.5,
      alive = true;
    document.addEventListener(
      "mousemove",
      function (e) {
        tmx = e.clientX / window.innerWidth;
        tmy = 1.0 - e.clientY / window.innerHeight;
      },
      { passive: true }
    );
    var t0 = performance.now();
    function tick() {
      if (!alive || !c.parentNode) return;
      mx += (tmx - mx) * 0.05;
      my += (tmy - my) * 0.05;
      gl.uniform1f(uTime, (performance.now() - t0) / 1000);
      gl.uniform2f(uRes, c.width, c.height);
      gl.uniform2f(uMouse, mx, my);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(tick);
    }
    tick();
    window.addEventListener("loaderDone", function () {
      setTimeout(function () {
        alive = false;
        if (c.parentNode) {
          c.style.transition = "opacity 0.6s ease";
          c.style.opacity = "0";
          setTimeout(function () {
            if (c.parentNode) c.remove();
          }, 700);
        }
      }, 200);
    });
  })();

  // ── INTRO STREAM ── const() typewriter top-left, runs from page load so it's already typing
  // when the visitor sees the Enter button. Continues through the cube animation phase.
  (function () {
    var stream = document.getElementById("loader-stream");
    if (!stream) return;
    var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var lines = stream.querySelectorAll(".ls-line");
    var texts = [];
    lines.forEach(function (l) {
      texts.push(l.getAttribute("data-text") || "");
    });
    // Reveal immediately (no delay — visitor needs to see the text on the entry scene)
    requestAnimationFrame(function () {
      stream.classList.add("is-on");
    });
    if (prefersReduced) {
      lines.forEach(function (l, i) {
        l.textContent = texts[i];
      });
      return;
    }
    var lineIdx = 0;
    var charIdx = 0;
    function typeNext() {
      if (lineIdx >= lines.length) return;
      var line = lines[lineIdx];
      var target = texts[lineIdx];
      if (charIdx === 0) line.classList.add("ls-active");
      if (charIdx <= target.length) {
        line.textContent = target.substring(0, charIdx);
        charIdx++;
        var delay = 28 + Math.random() * 26;
        if (target.charAt(charIdx - 1) === ">") delay = 90;
        setTimeout(typeNext, delay);
      } else {
        line.classList.remove("ls-active");
        lineIdx++;
        charIdx = 0;
        setTimeout(typeNext, 280);
      }
    }
    // Start typing 600ms after page load (gives the shader a beat to settle in)
    setTimeout(typeNext, 600);
    // Fade out when loader is fully done
    window.addEventListener("loaderDone", function () {
      setTimeout(function () {
        stream.classList.add("is-fade");
      }, 200);
    });
  })();

  // ── ENTRY-SCENE WORK-COLLAGE — top-level cursor reveal + auto-pan, runs from page load (backs Enter gate too).
  // Removed cleanly when the loader sequence completes; home page has its own #work-collage that takes over.
  (function () {
    var lc = document.getElementById("loader-collage");
    if (!lc) return;
    var prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (prefersReduced) return;
    var t0 = performance.now();
    var userTook = false;
    var lastUserMove = 0;
    function tick(now) {
      if (!lc.parentNode) return;
      var elapsed = (now - t0) / 1000;
      var w = window.innerWidth,
        h = window.innerHeight;
      if (userTook && now - lastUserMove < 1200) {
        // already set by mousemove handler
      } else {
        var cx = (0.5 + 0.32 * Math.sin(elapsed * 0.4)) * w;
        var cy = (0.5 + 0.22 * Math.sin(elapsed * 0.62)) * h;
        lc.style.setProperty("--lcx", cx + "px");
        lc.style.setProperty("--lcy", cy + "px");
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    document.addEventListener(
      "mousemove",
      function (e) {
        userTook = true;
        lastUserMove = performance.now();
        lc.style.setProperty("--lcx", e.clientX + "px");
        lc.style.setProperty("--lcy", e.clientY + "px");
      },
      { passive: true }
    );
    // When the loader sequence finishes, fade + remove so home page's own work-collage takes over
    window.addEventListener("loaderDone", function () {
      setTimeout(function () {
        // Backdrop fades out first so home reveals smoothly
        var backdrop = document.getElementById("enter-backdrop");
        if (backdrop) {
          backdrop.style.transition = "opacity 0.6s ease";
          backdrop.style.opacity = "0";
          setTimeout(function () {
            if (backdrop.parentNode) backdrop.remove();
          }, 700);
        }
        if (!lc || !lc.parentNode) return;
        lc.style.transition = "opacity 0.6s ease";
        lc.style.opacity = "0";
        setTimeout(function () {
          if (lc && lc.parentNode) lc.remove();
        }, 700);
      }, 200);
    });
  })();

  (function () {
    var loader = document.getElementById("site-loader");
    if (!loader) return;

    var enterGate = document.getElementById("enter-gate");
    var enterBtn = document.getElementById("enter-btn");

    if (sessionStorage.getItem("sid_loaded")) {
      if (enterGate) enterGate.remove();
      loader.remove();
      // Defer to next tick so listeners attached later in the document still receive it
      window.__loaderInstantDone = true;
      setTimeout(function () {
        window.dispatchEvent(new CustomEvent("loaderDone", { detail: { instant: true } }));
      }, 0);
      return;
    }

    // Wait for Enter click
    function onEnter() {
      sessionStorage.setItem("sid_loaded", "1");
      if (enterGate) enterGate.remove();
      loader.style.display = "flex";

      // Start nature sounds immediately on Enter
      window.__natureSnd = new Audio("{{ site.baseurl }}/assets/audio/nature.mp3");
      window.__natureSnd.volume = 0;
      window.__natureSnd.loop = true;
      window.__natureSnd.currentTime = 5;
      window.__natureSnd.play().catch(function () {});
      // Fade in nature gently — very low volume
      var nFade = setInterval(function () {
        if (window.__natureSnd.volume < 0.03) {
          window.__natureSnd.volume = Math.min(window.__natureSnd.volume + 0.002, 0.03);
        } else {
          clearInterval(nFade);
        }
      }, 100);

      // Create typing sound for loader typewriter
      window.__typeSound = new Audio("{{ site.baseurl }}/assets/audio/typing.mp3");
      window.__typeSound.volume = 0.18;
      window.__typeSound.loop = true;

      startLoader();
    }
    if (enterBtn) enterBtn.addEventListener("click", onEnter);

    function startLoader() {
      setTimeout(function () {
        if (loader && loader.parentNode) {
          loader.remove();
          window.dispatchEvent(new CustomEvent("loaderDone", { detail: { instant: true } }));
        }
      }, 25000);

      var videoPhase = document.getElementById("sl-video-phase");
      var video = document.getElementById("sl-video");
      var hello = document.getElementById("sl-hello");
      var loadingPhase = document.getElementById("sl-loading-phase");
      var loadingVideo = document.getElementById("sl-loading-video");

      function startTypingSound() {
        if (window.__typeSound) {
          window.__typeSound.currentTime = 0;
          window.__typeSound.play().catch(function () {});
        }
      }
      function stopTypingSound() {
        if (window.__typeSound) {
          window.__typeSound.pause();
        }
      }

      // Loader dust particles
      (function () {
        var dc = document.getElementById("loader-dust");
        if (!dc) return;
        var ctx = dc.getContext("2d");
        dc.width = window.innerWidth;
        dc.height = window.innerHeight;
        var dots = [];
        for (var d = 0; d < 40; d++) {
          dots.push({
            x: Math.random() * dc.width,
            y: Math.random() * dc.height,
            r: 0.5 + Math.random() * 1.5,
            vx: (Math.random() - 0.5) * 0.3,
            vy: -0.1 - Math.random() * 0.2,
            a: 0.15 + Math.random() * 0.25,
          });
        }
        function drawDust() {
          ctx.clearRect(0, 0, dc.width, dc.height);
          dots.forEach(function (p) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.y < -10) {
              p.y = dc.height + 10;
              p.x = Math.random() * dc.width;
            }
            if (p.x < -10) p.x = dc.width + 10;
            if (p.x > dc.width + 10) p.x = -10;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,255," + p.a + ")";
            ctx.fill();
          });
          if (document.getElementById("loader-dust")) requestAnimationFrame(drawDust);
        }
        drawDust();
      })();

      // Phase 1: Video + typewriter
      videoPhase.classList.add("active");
      video.play().catch(function () {});

      // Intro stream is now top-level (runs from page load, visible during Enter scene + cube animation)

      // Typewriter lines — fade out instead of backspace
      var lines = [
        { text: "Hello", startAt: 800 },
        { text: "Most people call me Sid", startAt: 3500 },
        { text: "But you can call me anytime", startAt: 7000 },
        { text: "Welcome to my portfolio", startAt: 11000 },
      ];

      // Onboarding icons reveal — each slightly before its line types
      var iconIds = ["sl-icon-1", "sl-icon-2", "sl-icon-3", "sl-icon-4"];
      lines.forEach(function (line, idx) {
        setTimeout(
          function () {
            var ic = document.getElementById(iconIds[idx]);
            if (ic) ic.classList.add("show");
          },
          Math.max(0, line.startAt - 250)
        );
      });

      lines.forEach(function (line, idx) {
        setTimeout(function () {
          // Fade out previous text
          hello.style.transition = "opacity 0.3s ease";
          hello.style.opacity = "0";
          setTimeout(function () {
            hello.textContent = "";
            hello.style.opacity = "1";
            // Type new line
            var i = 0;
            startTypingSound();
            (function t() {
              if (i < line.text.length) {
                i++;
                hello.textContent = line.text.slice(0, i);
                setTimeout(t, 60 + Math.random() * 30);
              } else {
                stopTypingSound();
              }
            })();
          }, 300);
        }, line.startAt);
      });

      // Video ends → loading animation → dissolve
      var videoEnded = false;
      var loadingEnded = false;

      function onLoadingEnd() {
        if (loadingEnded) return;
        loadingEnded = true;
        loadingVideo.pause();
        // Brief hold, then dissolve
        setTimeout(function () {
          loader.style.transition = "opacity 0.8s ease";
          loader.style.opacity = "0";
          setTimeout(function () {
            if (loader.parentNode) loader.remove();
            window.dispatchEvent(new CustomEvent("loaderDone", { detail: { instant: false } }));
          }, 800);
        }, 200);
      }

      function onVideoEnd() {
        if (videoEnded) return;
        videoEnded = true;
        videoPhase.classList.remove("active");
        videoPhase.classList.add("exit");
        // Fade out the intro stream as we move to phase 2
        var stream = document.getElementById("loader-stream");
        if (stream) stream.classList.add("is-fade");
        video.pause();
        loadingPhase.classList.add("active");
        loadingVideo.play().catch(function () {});

        loadingVideo.addEventListener("ended", onLoadingEnd);
        // Fallback: clamp duration to 5.5s in case 'ended' doesn't fire
        setTimeout(onLoadingEnd, 5500);
      }

      video.addEventListener("ended", onVideoEnd);
      setTimeout(onVideoEnd, 11000);
    } // end startLoader
  })();
</script>
