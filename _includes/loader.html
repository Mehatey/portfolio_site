<style>
  /* ─── SITE LOADER ─── */
  #site-loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "DM Mono", monospace;
  }

  /* ─── PHASE SYSTEM ─── */
  .sl-phase {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(1.05);
    filter: blur(4px);
    transition:
      opacity 0.5s ease,
      transform 0.5s ease,
      filter 0.5s ease;
  }
  .sl-phase.active {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
  }
  .sl-phase.exit {
    opacity: 0;
    transform: scale(0.95);
    filter: blur(4px);
  }

  /* ─── PHASE 1: EYE ─── */
  .sl-eye img {
    max-width: 300px;
    border-radius: 8px;
    animation: eyeZoom 2.5s ease-out forwards;
  }
  @keyframes eyeZoom {
    from {
      transform: scale(1.1);
    }
    to {
      transform: scale(1);
    }
  }
  /* Film grain overlay */
  .sl-eye::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    opacity: 0.4;
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  /* ─── PHASE 2: BRAIN ─── */
  .sl-brain img {
    max-width: 250px;
    filter: brightness(1.2) contrast(1.3);
    animation: brainPulse 1.5s ease-in-out infinite;
  }
  @keyframes brainPulse {
    0%,
    100% {
      filter: brightness(1.2) contrast(1.3);
    }
    50% {
      filter: brightness(1.5) contrast(1.4);
    }
  }
  .sl-brain-rotate {
    animation: brainRotate 2s ease-in-out forwards;
  }
  @keyframes brainRotate {
    0% {
      transform: rotate(-2deg);
    }
    50% {
      transform: rotate(2deg);
    }
    100% {
      transform: rotate(0deg);
    }
  }

  /* ─── PHASE 3: CUBE ─── */
  .sl-cube-phase .sl-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    opacity: 1;
  }

  /* ─── CUBE — 100px ─── */
  #sl-cube-scene {
    width: 100px;
    height: 100px;
    perspective: 460px;
  }
  #sl-cube {
    width: 100px;
    height: 100px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-15deg) rotateY(0deg);
    animation: sl-rotate 5.5s linear infinite;
  }
  @keyframes sl-rotate {
    0% {
      transform: rotateX(-15deg) rotateY(0deg);
    }
    25% {
      transform: rotateX(-18deg) rotateY(90deg);
    }
    50% {
      transform: rotateX(-12deg) rotateY(180deg);
    }
    75% {
      transform: rotateX(-18deg) rotateY(270deg);
    }
    100% {
      transform: rotateX(-15deg) rotateY(360deg);
    }
  }

  .sl-face {
    position: absolute;
    width: 100px;
    height: 100px;
    border: 1.5px solid rgba(255, 255, 255, 0.45);
    background: #000;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    opacity: 0;
    animation: sl-face-in 0.32s ease forwards;
    transition:
      border-color 0.55s ease,
      box-shadow 0.55s ease;
  }
  /* fill via ::before */
  .sl-face::before {
    content: "";
    position: absolute;
    inset: 0;
    background: transparent;
    transition: background 0.55s ease;
    pointer-events: none;
  }
  @keyframes sl-face-in {
    to {
      opacity: 1;
    }
  }

  /* Face transforms & stagger */
  .sl-front {
    transform: translateZ(50px);
    animation-delay: 0.05s;
  }
  .sl-back {
    transform: rotateY(180deg) translateZ(50px);
    animation-delay: 0.1s;
  }
  .sl-left {
    transform: rotateY(-90deg) translateZ(50px);
    animation-delay: 0.15s;
  }
  .sl-right {
    transform: rotateY(90deg) translateZ(50px);
    animation-delay: 0.2s;
  }
  .sl-top {
    transform: rotateX(90deg) translateZ(50px);
    animation-delay: 0.25s;
  }
  .sl-bottom {
    transform: rotateX(-90deg) translateZ(50px);
    animation-delay: 0.3s;
  }

  /* Per-face hue (r,g,b as comma list) */
  .sl-front {
    --fc: 80, 130, 255;
  }
  .sl-back {
    --fc: 155, 75, 255;
  }
  .sl-left {
    --fc: 0, 185, 215;
  }
  .sl-right {
    --fc: 0, 160, 145;
  }
  .sl-top {
    --fc: 125, 85, 255;
  }
  .sl-bottom {
    --fc: 55, 85, 230;
  }

  /* Vertical eyes on front */
  .sl-front::after {
    content: "";
    position: absolute;
    top: 22px;
    left: 28px;
    width: 5px;
    height: 30px;
    background: rgba(255, 255, 255, 0.3);
    box-shadow: 33px 0 0 rgba(255, 255, 255, 0.3);
    border-radius: 3px;
    transition:
      background 0.55s ease,
      box-shadow 0.55s ease;
    animation: sl-blink 3.5s ease-in-out infinite 1.2s;
  }
  @keyframes sl-blink {
    0%,
    88%,
    100% {
      opacity: 1;
    }
    93% {
      opacity: 0;
    }
  }

  /* ── PHASE: FILL — soft translucent colour fills, gently breathing ── */
  #sl-cube.phase-fill .sl-face::before {
    background: rgba(var(--fc), 0.12);
    animation: sl-fill-breathe 1.4s ease-in-out infinite;
  }
  #sl-cube.phase-fill .sl-face {
    border-color: rgba(var(--fc), 0.35);
  }
  @keyframes sl-fill-breathe {
    0%,
    100% {
      opacity: 0.5;
    }
    50% {
      opacity: 1;
    }
  }
  #sl-cube.phase-fill .sl-front::after {
    background: rgba(80, 130, 255, 0.6);
    box-shadow: 33px 0 0 rgba(80, 130, 255, 0.6);
  }

  /* ── PHASE: TRANSFER — fill evaporates, colour bleeds into stroke ── */
  #sl-cube.phase-transfer .sl-face::before {
    background: rgba(var(--fc), 0.03);
  }
  #sl-cube.phase-transfer .sl-face {
    border-color: rgba(var(--fc), 0.8);
    box-shadow:
      0 0 12px rgba(var(--fc), 0.22),
      inset 0 0 6px rgba(var(--fc), 0.08);
  }
  #sl-cube.phase-transfer .sl-front::after {
    background: rgba(80, 130, 255, 0.85);
    box-shadow: 33px 0 0 rgba(80, 130, 255, 0.85);
  }

  /* ── PHASE: STROKE — pure glowing borders ── */
  #sl-cube.phase-stroke .sl-face::before {
    background: transparent;
  }
  #sl-cube.phase-stroke .sl-face {
    border-color: rgba(var(--fc), 0.75);
    box-shadow:
      0 0 16px rgba(var(--fc), 0.28),
      inset 0 0 8px rgba(var(--fc), 0.06);
  }
  #sl-cube.phase-stroke .sl-front::after {
    background: rgba(80, 130, 255, 0.75);
    box-shadow: 33px 0 0 rgba(80, 130, 255, 0.75);
  }

  /* ─── STATUS TEXT ─── */
  #sl-status {
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.62);
    min-width: 200px;
    text-align: center;
    transition: opacity 0.22s ease;
  }

  /* ─── PROGRESS BAR ─── */
  #sl-bar-wrap {
    width: 100px;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
  }
  #sl-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, rgba(80, 130, 255, 0.55), rgba(180, 140, 255, 0.6), rgba(255, 255, 255, 0.85));
    transition: width 0.12s linear;
  }
</style>

<div id="site-loader">
  <!-- Phase 1: Eye -->
  <div class="sl-phase sl-eye" id="sl-eye">
    <img src="{{ site.baseurl }}/assets/img/loader_eye.jpg" alt="" />
  </div>

  <!-- Phase 2: Brain -->
  <div class="sl-phase sl-brain" id="sl-brain">
    <div class="sl-brain-rotate">
      <img src="{{ site.baseurl }}/assets/img/brain-scan.png" alt="" />
    </div>
  </div>

  <!-- Phase 3: Cube -->
  <div class="sl-phase sl-cube-phase" id="sl-cube-phase">
    <div class="sl-inner">
      <div id="sl-cube-scene">
        <div id="sl-cube">
          <div class="sl-face sl-front"></div>
          <div class="sl-face sl-back"></div>
          <div class="sl-face sl-left"></div>
          <div class="sl-face sl-right"></div>
          <div class="sl-face sl-top"></div>
          <div class="sl-face sl-bottom"></div>
        </div>
      </div>
      <p id="sl-status">building worlds</p>
      <div id="sl-bar-wrap"><div id="sl-bar-fill"></div></div>
    </div>
  </div>
</div>

<script>
  (function () {
    var loader = document.getElementById("site-loader");
    if (!loader) return;

    // ── On return visits: remove instantly, reveal content immediately ──
    if (sessionStorage.getItem("sid_loaded")) {
      loader.remove();
      var mwQuick = document.querySelector(".main-wrap");
      if (mwQuick) mwQuick.classList.add("warp-reveal", "instant");
      return;
    }
    sessionStorage.setItem("sid_loaded", "1");

    // ── Hard safety timeout: always remove after 10s no matter what ──
    setTimeout(function () {
      if (loader && loader.parentNode) loader.remove();
    }, 10000);

    var eye = document.getElementById("sl-eye");
    var brain = document.getElementById("sl-brain");
    var cubePhase = document.getElementById("sl-cube-phase");
    var cubeEl = document.getElementById("sl-cube");
    var sceneEl = document.getElementById("sl-cube-scene");
    var statusEl = document.getElementById("sl-status");
    var barFill = document.getElementById("sl-bar-fill");
    var barWrap = document.getElementById("sl-bar-wrap");

    // ── Phase 1: Eye (start immediately) ──
    eye.classList.add("active");

    // ── Phase 2: Brain (at 2s) ──
    setTimeout(function () {
      eye.classList.remove("active");
      eye.classList.add("exit");
      brain.classList.add("active");
    }, 2000);

    // ── Phase 3: Cube (at 4s) ──
    setTimeout(function () {
      brain.classList.remove("active");
      brain.classList.add("exit");
      cubePhase.classList.add("active");
      startCubeSequence();
    }, 4000);

    // ── Cube sequence: compressed fill/transfer/stroke + bar ──
    function startCubeSequence() {
      // Fill at +100ms
      setTimeout(function () {
        cubeEl.classList.add("phase-fill");
      }, 100);

      // Transfer at +400ms
      setTimeout(function () {
        cubeEl.classList.remove("phase-fill");
        cubeEl.classList.add("phase-transfer");
      }, 400);

      // Stroke at +700ms — start bar
      setTimeout(function () {
        cubeEl.classList.remove("phase-transfer");
        cubeEl.classList.add("phase-stroke");
        startBar();
      }, 700);

      // Finish and fly at ~1500ms
      setTimeout(function () {
        finishAndFly();
      }, 1500);
    }

    // ── Progress bar — smooth fill ──
    var barW = 0;
    var barIv = null;
    function startBar() {
      barIv = setInterval(function () {
        barW += 4;
        barFill.style.width = Math.min(barW, 88) + "%";
        if (barW >= 88) clearInterval(barIv);
      }, 30);
    }

    // ── Status text cycle ──
    function cyclePhrase(text) {
      statusEl.style.opacity = "0";
      setTimeout(function () {
        statusEl.textContent = text;
        statusEl.style.opacity = "";
      }, 220);
    }

    // ── Finish: complete bar then fly cube to nav ──
    function finishAndFly() {
      if (barIv) clearInterval(barIv);
      barFill.style.transition = "width 0.3s ease";
      barFill.style.width = "100%";
      cyclePhrase("ready");
      setTimeout(flyToNav, 220);
    }

    function flyToNav() {
      // Fade bar and status text together
      barWrap.style.transition = "opacity 0.3s ease";
      barWrap.style.opacity = "0";
      statusEl.style.transition = "opacity 0.3s ease";
      statusEl.style.opacity = "0";

      var navScene = document.querySelector(".nav .cube-scene");
      if (!navScene) {
        fallbackExit();
        return;
      }

      var navRect = navScene.getBoundingClientRect();
      var scRect = sceneEl.getBoundingClientRect();
      var dx = navRect.left + navRect.width * 0.5 - (scRect.left + scRect.width * 0.5);
      var dy = navRect.top + navRect.height * 0.5 - (scRect.top + scRect.height * 0.5);
      var sc = navRect.width / 100;

      // Step 1: wait for bar/text to fade, then pull toward corner
      setTimeout(function () {
        sceneEl.style.transition = "transform 0.25s cubic-bezier(0.4,0,1,1)";
        sceneEl.style.transformOrigin = "center center";
        sceneEl.style.transform = "translate(" + dx * 0.1 + "px," + dy * 0.1 + "px) scale(0.7)";

        // Step 2 (250ms): fly cube to nav
        setTimeout(function () {
          sceneEl.style.transition = "transform 0.55s cubic-bezier(0.22,1,0.36,1)";
          sceneEl.style.transform = "translate(" + dx + "px," + dy + "px) scale(" + sc + ")";

          // Fade loader backdrop
          loader.style.transition = "opacity 0.6s ease, transform 0.6s ease";
          loader.style.opacity = "0";
          loader.style.transform = "scale(1.04)";
          loader.style.pointerEvents = "none";

          // Reveal page content — staggered after cube lands
          var mw = document.querySelector(".main-wrap");
          if (mw)
            setTimeout(function () {
              mw.classList.add("warp-reveal");
            }, 300);
        }, 250);
      }, 300);

      // Remove loader after everything settles
      setTimeout(function () {
        if (loader.parentNode) loader.remove();
      }, 1200);
    }

    function fallbackExit() {
      loader.style.transition = "opacity 0.35s ease";
      loader.style.opacity = "0";
      setTimeout(function () {
        if (loader.parentNode) loader.remove();
      }, 400);
      var mw = document.querySelector(".main-wrap");
      if (mw) mw.classList.add("warp-reveal");
    }
  })();
</script>
