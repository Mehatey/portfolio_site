<script>
  // Theme + cursor bootstrap — runs in <head> before any body paint to avoid flash of wrong theme
  // and to gate cursor: none rules. Saved theme wins; otherwise honor OS preference.
  (function () {
    try {
      // Default to dark — user must explicitly toggle to light. We deliberately do NOT honor
      // prefers-color-scheme:light because the site's identity is dark (cinematic loader, deep palette).
      var saved = localStorage.getItem("sid_theme");
      if (saved === "light" || saved === "dark") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    } catch (_) {}
    try {
      if (window.matchMedia && window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
        document.documentElement.classList.add("has-custom-cursor");
      }
    } catch (_) {}
  })();
</script>

<!-- Mobile browser chrome color matches site theme — Safari URL bar + Chrome address bar.
     Two metas with media queries cover OS preference; toggle script below also flips on manual theme change. -->
<meta name="theme-color" content="#08080c" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f5f3ee" media="(prefers-color-scheme: light)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="apple-touch-icon" href="{{ site.baseurl }}/favicon.svg" />
<link rel="manifest" href="{{ site.baseurl }}/site.webmanifest" />
<script>
  // Manual theme toggle should also update theme-color so the browser chrome flips immediately
  (function () {
    var META_DARK = "#08080c",
      META_LIGHT = "#f5f3ee";
    function syncThemeColor() {
      var isLight = document.documentElement.getAttribute("data-theme") === "light";
      var existing = document.querySelector('meta[name="theme-color"]:not([media])');
      if (!existing) {
        existing = document.createElement("meta");
        existing.setAttribute("name", "theme-color");
        document.head.appendChild(existing);
      }
      existing.setAttribute("content", isLight ? META_LIGHT : META_DARK);
    }
    syncThemeColor();
    var mo = new MutationObserver(syncThemeColor);
    mo.observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });
  })();
</script>
