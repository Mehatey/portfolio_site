<script>
  // Theme + cursor bootstrap — runs in <head> before any body paint to avoid flash of wrong theme
  // and to gate cursor: none rules. Saved theme wins; otherwise honor OS preference.
  (function () {
    try {
      var saved = localStorage.getItem("sid_theme");
      if (saved === "light" || saved === "dark") {
        document.documentElement.setAttribute("data-theme", saved);
      } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    } catch (_) {}
    try {
      if (window.matchMedia && window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
        document.documentElement.classList.add("has-custom-cursor");
      }
    } catch (_) {}
  })();
</script>
