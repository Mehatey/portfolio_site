<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Sid Mehta</title>
    <meta name="description" content="The page you're looking for doesn't exist." />
    <meta property="og:title" content="Page Not Found — Sid Mehta" />
    <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/img/sid_about.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@400;500;600;700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript
      ><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"
    /></noscript>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --nav-h: 72px;
        --gutter: max(24px, 4vw);
        --font-head: "Inter", sans-serif;
        --font-mono: "DM Mono", monospace;
        --font-title: "Inter", sans-serif;
        --border: rgba(255, 255, 255, 0.06);
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      }
      html {
        background: #000;
        color: #fff;
        font-size: 16px;
      }
      body {
        font-family: var(--font-head);
        -webkit-font-smoothing: antialiased;
        cursor: none;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      a,
      button {
        cursor: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* NAV */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: transparent;
      }
      .nav::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: rgba(0, 0, 0, 0.16);
        backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        -webkit-backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        /* filter removed */
        transition: opacity 0.3s;
      }
      .nav--scrolled {
        background: rgba(0, 0, 0, 0.55);
      }
      .nav > a { display: inline-flex; align-items: center; }
      .logo-cube { width: 40px; height: 40px; display: block; overflow: visible; color: rgba(180, 200, 230, 0.78); transition: transform 0.9s cubic-bezier(0.34,1.56,0.64,1); animation: logo-hue 14s ease-in-out infinite; transform-origin: center; }
      .nav > a { perspective: 600px; }
      .nav > a:hover .logo-cube { transform: scale(1.08) rotateY(360deg); }
      @keyframes logo-hue {
        0%, 100% { color: rgba(170, 200, 235, 0.78); }
        20% { color: rgba(160, 230, 220, 0.78); }
        40% { color: rgba(170, 235, 195, 0.78); }
        60% { color: rgba(180, 215, 240, 0.78); }
        80% { color: rgba(190, 230, 215, 0.78); }
      }
      .logo-eye { animation: logo-blink 9s ease-in-out infinite; transform-origin: center; opacity: 0.78; }
      @keyframes logo-blink { 0%, 95%, 100% { opacity: 0.78; } 97% { opacity: 0; } }
      
      
      
      
      
      
      
      
      
      
      
      
      .nav-links {
        display: flex;
        align-items: center;
        gap: 40px;
      }
      .nav-primary {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
        transition: color 0.2s;
      }
      .nav-primary:hover {
        color: #fff;
      }
      .nav-secondary {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        transition: color 0.2s;
      }
      .nav-icon + .nav-icon::before { content: ""; position: absolute; left: -20px; top: 50%; width: 2px; height: 2px; background: rgba(255, 255, 255, 0.18); border-radius: 50%; transform: translateY(-50%); pointer-events: none; }
      .nav-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px; height: 36px;
        position: relative; opacity: 0.45; transition: opacity 0.25s ease;
      }
      .nav-icon:hover, .nav-icon.is-active { opacity: 1; }
      .nav-icon img {
        width: 36px; height: 36px;
        display: block;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
      }
      /* Custom nav tooltips — instant, themed, no browser delay */
      .nav-icon::after {
        content: attr(data-label);
        position: absolute;
        top: calc(100% + 14px);
        left: 50%;
        transform: translate(-50%, -4px);
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.92);
        background: rgba(0, 0, 0, 0.72);
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
        padding: 6px 11px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s ease, transform 0.18s ease;
        z-index: 250;
      }
      .nav-icon:hover::after, .nav-icon:focus-visible::after { opacity: 1; transform: translate(-50%, 0); }
      @media (hover: none), (pointer: coarse) { .nav-icon::after { display: none; } }
      .nav-secondary:hover {
        color: rgba(255, 255, 255, 0.8);
      }
      /* 404 CONTENT */
      .notfound {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: calc(var(--nav-h) + 80px) var(--gutter) 120px;
        max-width: 1320px;
      }
      .notfound-num {
        font-family: var(--font-title);
        font-size: clamp(96px, 16vw, 220px);
        font-weight: 600;
        letter-spacing: -0.04em;
        line-height: 0.88;
        color: rgba(255, 255, 255, 0.06);
        margin-bottom: 40px;
        user-select: none;
      }
      .notfound-label {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.3);
        margin-bottom: 20px;
      }
      .notfound-msg {
        font-family: var(--font-title);
        font-size: clamp(28px, 4vw, 52px);
        font-weight: 400;
        letter-spacing: -0.02em;
        line-height: 1.15;
        color: #fff;
        max-width: 480px;
        margin-bottom: 48px;
      }
      .notfound-links {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .notfound-link-primary {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.25);
        padding: 12px 28px;
        color: #fff;
        background: transparent;
        transition: border-color 0.2s;
        position: relative;
      }
      .notfound-link-primary::before,
      .notfound-link-primary::after {
        content: "";
        position: absolute;
        width: 5px;
        height: 5px;
        border-color: #fff;
        border-style: solid;
      }
      .notfound-link-primary::before {
        top: -1px;
        left: -1px;
        border-width: 1px 0 0 1px;
      }
      .notfound-link-primary::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 1px 1px 0;
      }
      .notfound-link-primary:hover {
        border-color: rgba(255, 255, 255, 0.6);
      }
      .notfound-link-secondary {
        font-family: var(--font-mono);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 28px;
        color: rgba(255, 255, 255, 0.5);
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .notfound-link-secondary:hover {
        border-color: rgba(255, 255, 255, 0.3);
        color: rgba(255, 255, 255, 0.8);
      }

      @media (max-width: 900px) {
        .nav-links {
          gap: 12px;
        }
      }
      @media (max-width: 600px) {
        :root { --nav-h: 56px; }
        .nav { padding: 0 16px; }
        .nav-links { gap: 14px; }
        .nav-icon, .nav-icon img { width: 26px; height: 26px; }
        
        .notfound-links {
          flex-direction: column;
        }
      }
      a:focus-visible,
      button:focus-visible {
        outline: 2px solid rgba(100, 160, 255, 0.6);
        outline-offset: 3px;
        border-radius: 2px;
      }
      :focus:not(:focus-visible) {
        outline: none;
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">
      <a href="{{ site.baseurl }}/">
        <svg class="logo-cube" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" aria-hidden="true">
            <path d="M5 9 L9 5 L23 5 L19 9 Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <path d="M19 9 L23 5 L23 19 L19 23 Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <rect x="5" y="9" width="14" height="14" fill="#000" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            <rect class="logo-eye" x="8.7" y="13" width="1" height="5" fill="currentColor" rx="0.2"/>
            <rect class="logo-eye" x="14.3" y="13" width="1" height="5" fill="currentColor" rx="0.2"/>
          </svg>
      </a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/works/" class="nav-icon" aria-label="Work" data-label="Work"><img src="{{ site.baseurl }}/assets/img/nav/cube.png" alt="Work" /></a>
        <a href="{{ site.baseurl }}/play/" class="nav-icon" aria-label="Play" data-label="Play"><img src="{{ site.baseurl }}/assets/img/nav/flower.png" alt="Play" /></a>
        <a href="{{ site.baseurl }}/contact/" class="nav-icon" aria-label="Contact" data-label="Contact"><img src="{{ site.baseurl }}/assets/img/nav/sparkle.png" alt="Contact" /></a>
        <a href="{{ site.baseurl }}/about/" class="nav-icon" aria-label="About" data-label="About"><img src="{{ site.baseurl }}/assets/img/nav/cross.png" alt="About" /></a>
      </div>
    </nav>

    <div class="notfound">
      <p class="notfound-num">404</p>
      <p class="notfound-label">// Page not found</p>
      <p class="notfound-msg">This page doesn't exist. Or it moved.</p>
      <div class="notfound-links">
        <a href="{{ site.baseurl }}/works/" class="notfound-link-primary">View Works →</a>
        <a href="{{ site.baseurl }}/" class="notfound-link-secondary">Go Home</a>
      </div>
    </div>

    {% include cursor_fluid.html %}

    <script>
      (function () {
        const nav = document.querySelector(".nav");
        window.addEventListener(
          "scroll",
          function () {
            nav.classList.toggle("nav--scrolled", window.scrollY > 20);
          },
          { passive: true }
        );
      })();
    </script>
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden" aria-hidden="true">
      <defs>
        <filter id="glass-refract" x="-5%" y="-30%" width="110%" height="160%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.007 0.048" numOctaves="1" seed="9" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
  </body>
</html>
