<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Sid Mehta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --nav-h: 52px;
        --gutter: max(24px, 4vw);
        --font-head: "Satoshi", sans-serif;
        --font-mono: "DM Mono", monospace;
        --font-title: "Inter", sans-serif;
        --border: rgba(255, 255, 255, 0.06);
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      }
      html {
        background: #000;
        color: #fff;
        font-size: 16px;
      }
      body {
        font-family: var(--font-head);
        -webkit-font-smoothing: antialiased;
        cursor: none;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      a,
      button {
        cursor: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* NAV */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: transparent;
        overflow: hidden;
      }
      .nav::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: rgba(0, 0, 0, 0.16);
        backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        -webkit-backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        filter: url(#glass-refract);
        transition: opacity 0.3s;
      }
      .nav--scrolled {
        background: rgba(0, 0, 0, 0.55);
      }
      .cube-scene {
        width: 20px;
        height: 20px;
        perspective: 350px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cube {
        width: 16px;
        height: 16px;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateX(-20deg) rotateY(25deg);
        transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .cube-face {
        position: absolute;
        width: 16px;
        height: 16px;
        border: 1px solid rgba(255, 255, 255, 0.65);
        background: #000;
        animation: cube-hue 8s ease-in-out infinite;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      @keyframes cube-hue {
        0%,
        100% {
          border-color: rgba(255, 255, 255, 0.65);
        }
        25% {
          border-color: rgba(180, 200, 255, 0.6);
        }
        50% {
          border-color: rgba(200, 180, 255, 0.55);
        }
        75% {
          border-color: rgba(180, 255, 220, 0.6);
        }
      }
      .cube-front {
        transform: translateZ(8px);
      }
      .cube-back {
        transform: rotateY(180deg) translateZ(8px);
      }
      .cube-left {
        transform: rotateY(-90deg) translateZ(8px);
      }
      .cube-right {
        transform: rotateY(90deg) translateZ(8px);
      }
      .cube-top {
        transform: rotateX(90deg) translateZ(8px);
      }
      .cube-bottom {
        transform: rotateX(-90deg) translateZ(8px);
      }
      .cube-front::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 1px;
        height: 5px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 6px 0 0 rgba(255, 255, 255, 0.7);
        animation: cube-blink 4s ease-in-out infinite;
      }
      @keyframes cube-blink {
        0%,
        90%,
        100% {
          opacity: 1;
        }
        95% {
          opacity: 0;
        }
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .nav-primary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
        transition: color 0.2s;
      }
      .nav-primary:hover {
        color: #fff;
      }
      .nav-secondary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        transition: color 0.2s;
      }
      .nav-secondary:hover {
        color: rgba(255, 255, 255, 0.8);
      }
      /* 404 CONTENT */
      .notfound {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: calc(var(--nav-h) + 80px) var(--gutter) 120px;
        max-width: 1320px;
      }
      .notfound-num {
        font-family: var(--font-title);
        font-size: clamp(96px, 16vw, 220px);
        font-weight: 600;
        letter-spacing: -0.04em;
        line-height: 0.88;
        color: rgba(255, 255, 255, 0.06);
        margin-bottom: 40px;
        user-select: none;
      }
      .notfound-label {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.3);
        margin-bottom: 20px;
      }
      .notfound-msg {
        font-family: var(--font-title);
        font-size: clamp(28px, 4vw, 52px);
        font-weight: 400;
        letter-spacing: -0.02em;
        line-height: 1.15;
        color: #fff;
        max-width: 480px;
        margin-bottom: 48px;
      }
      .notfound-links {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      .notfound-link-primary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.25);
        padding: 12px 28px;
        color: #fff;
        background: transparent;
        transition: border-color 0.2s;
        position: relative;
      }
      .notfound-link-primary::before,
      .notfound-link-primary::after {
        content: "";
        position: absolute;
        width: 5px;
        height: 5px;
        border-color: #fff;
        border-style: solid;
      }
      .notfound-link-primary::before {
        top: -1px;
        left: -1px;
        border-width: 1px 0 0 1px;
      }
      .notfound-link-primary::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 1px 1px 0;
      }
      .notfound-link-primary:hover {
        border-color: rgba(255, 255, 255, 0.6);
      }
      .notfound-link-secondary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 28px;
        color: rgba(255, 255, 255, 0.5);
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .notfound-link-secondary:hover {
        border-color: rgba(255, 255, 255, 0.3);
        color: rgba(255, 255, 255, 0.8);
      }

      @media (max-width: 900px) {
        .nav-links {
          gap: 12px;
        }
      }
      @media (max-width: 600px) {
        .notfound-links {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">
      <a href="{{ site.baseurl }}/">
        <div class="cube-scene">
          <div class="cube">
            <div class="cube-face cube-front"></div>
            <div class="cube-face cube-back"></div>
            <div class="cube-face cube-left"></div>
            <div class="cube-face cube-right"></div>
            <div class="cube-face cube-top"></div>
            <div class="cube-face cube-bottom"></div>
          </div>
        </div>
      </a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/works/" class="nav-secondary">Works</a>
        <a href="{{ site.baseurl }}/contact/" class="nav-secondary">Contact</a>
        <a href="{{ site.baseurl }}/about/" class="nav-secondary">About</a>
      </div>
    </nav>

    <div class="notfound">
      <p class="notfound-num">404</p>
      <p class="notfound-label">// Page not found</p>
      <p class="notfound-msg">This page doesn't exist. Or it moved.</p>
      <div class="notfound-links">
        <a href="{{ site.baseurl }}/works/" class="notfound-link-primary">View Works →</a>
        <a href="{{ site.baseurl }}/" class="notfound-link-secondary">Go Home</a>
      </div>
    </div>

    {% include cursor_fluid.html %}

    <script>
      (function () {
        const nav = document.querySelector(".nav");
        window.addEventListener(
          "scroll",
          function () {
            nav.classList.toggle("nav--scrolled", window.scrollY > 20);
          },
          { passive: true }
        );
      })();
    </script>
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden" aria-hidden="true">
      <defs>
        <filter id="glass-refract" x="-5%" y="-30%" width="110%" height="160%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.007 0.048" numOctaves="1" seed="9" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
  </body>
</html>
