<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Sid Mehta</title>
    <meta name="description" content="Get in touch with Siddharth Mehta — designer and creative technologist based in New York." />
    <meta property="og:title" content="Contact — Sid Mehta" />
    <meta property="og:description" content="Open to full-time roles, freelance, and collaborations." />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --nav-h: 52px;
        --gutter: max(24px, 4vw);
        --font-head: "Satoshi", sans-serif;
        --font-mono: "DM Mono", monospace;
        --font-title: "Inter", sans-serif;
        --border: rgba(255, 255, 255, 0.06);
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      }

      html {
        background: #000;
        color: #fff;
        font-size: 16px;
      }
      body {
        font-family: var(--font-head);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        cursor: none;
      }
      a,
      button {
        cursor: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── NAV ── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: transparent;
        overflow: hidden;
      }
      .nav::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: rgba(0, 0, 0, 0.16);
        backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        -webkit-backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        filter: url(#glass-refract);
        transition: opacity 0.3s;
      }
      .nav--scrolled::before {
        background: rgba(0, 0, 0, 0.4);
      }
      .cube-scene {
        width: 20px;
        height: 20px;
        perspective: 350px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cube {
        width: 16px;
        height: 16px;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateX(-20deg) rotateY(25deg);
        transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .cube-face {
        position: absolute;
        width: 16px;
        height: 16px;
        border: 1px solid rgba(255, 255, 255, 0.65);
        background: #000;
        animation: cube-hue 8s ease-in-out infinite;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      @keyframes cube-hue {
        0%,
        100% {
          border-color: rgba(255, 255, 255, 0.65);
        }
        25% {
          border-color: rgba(180, 200, 255, 0.6);
        }
        50% {
          border-color: rgba(200, 180, 255, 0.55);
        }
        75% {
          border-color: rgba(180, 255, 220, 0.6);
        }
      }
      .cube-front {
        transform: translateZ(8px);
      }
      .cube-back {
        transform: rotateY(180deg) translateZ(8px);
      }
      .cube-left {
        transform: rotateY(-90deg) translateZ(8px);
      }
      .cube-right {
        transform: rotateY(90deg) translateZ(8px);
      }
      .cube-top {
        transform: rotateX(90deg) translateZ(8px);
      }
      .cube-bottom {
        transform: rotateX(-90deg) translateZ(8px);
      }
      .cube-front::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 1px;
        height: 5px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 6px 0 0 rgba(255, 255, 255, 0.7);
        animation: cube-blink 4s ease-in-out infinite;
      }
      @keyframes cube-blink {
        0%,
        90%,
        100% {
          opacity: 1;
        }
        95% {
          opacity: 0;
        }
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .nav-primary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
        transition: color 0.2s;
      }
      .nav-primary:hover {
        color: #fff;
      }
      .nav-secondary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        transition: color 0.2s;
      }
      .nav-secondary:hover {
        color: rgba(255, 255, 255, 0.8);
      }

      /* ── MAIN ── */
      .contact-page {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: calc(var(--nav-h) + 80px) var(--gutter) 80px;
        background: radial-gradient(ellipse at 70% 50%, #0a1018 0%, #000 60%);
        position: relative;
        overflow: hidden;
      }
      .contact-page::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 200px;
        opacity: 0.3;
        pointer-events: none;
      }
      .contact-inner {
        position: relative;
        max-width: 680px;
      }
      .contact-eyebrow {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.28);
        margin-bottom: 28px;
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
        animation: fadeUp 0.7s var(--ease-out) 0.1s both;
      }
      .contact-eyebrow::before {
        content: "";
        display: block;
        width: 28px;
        height: 1px;
        background: rgba(255, 255, 255, 0.18);
      }
      .contact-headline {
        font-family: var(--font-title);
        font-size: clamp(36px, 5vw, 72px);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1;
        color: #fff;
        margin-bottom: 56px;
        opacity: 0;
        animation: fadeUp 0.8s var(--ease-out) 0.25s both;
      }
      .contact-links {
        display: flex;
        flex-direction: column;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        max-width: 600px;
        opacity: 0;
        animation: fadeUp 0.8s var(--ease-out) 0.42s both;
      }
      .contact-link {
        display: flex;
        align-items: baseline;
        gap: 24px;
        padding: 20px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        transition:
          background 0.3s var(--ease-out),
          padding-left 0.3s var(--ease-out);
        padding-right: 16px;
      }
      .contact-link:hover {
        background: rgba(255, 255, 255, 0.015);
        padding-left: 8px;
      }
      .contact-link-key {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.28);
        min-width: 72px;
        flex-shrink: 0;
      }
      .contact-link-val {
        font-family: var(--font-head);
        font-size: 16px;
        color: rgba(255, 255, 255, 0.68);
        transition: color 0.2s;
      }
      .contact-link:hover .contact-link-val {
        color: #fff;
      }
      .contact-link-arrow {
        margin-left: auto;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.22);
        flex-shrink: 0;
        transition:
          color 0.2s,
          transform 0.3s var(--ease-out);
      }
      .contact-link:hover .contact-link-arrow {
        color: rgba(255, 255, 255, 0.6);
        transform: translate(3px, -2px);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── FOOTER ── */
      .contact-footer {
        padding: 32px var(--gutter);
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .contact-footer-text {
        font-family: var(--font-mono);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.22);
        letter-spacing: 0.04em;
      }
      .contact-footer-cta {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 10px 24px;
        color: rgba(255, 255, 255, 0.42);
        transition:
          border-color 0.3s,
          color 0.3s;
        position: relative;
      }
      .contact-footer-cta::before,
      .contact-footer-cta::after {
        content: "";
        position: absolute;
        width: 5px;
        height: 5px;
        border-color: rgba(255, 255, 255, 0.3);
        border-style: solid;
        transition: border-color 0.3s;
      }
      .contact-footer-cta::before {
        top: -1px;
        left: -1px;
        border-width: 1px 0 0 1px;
      }
      .contact-footer-cta::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 1px 1px 0;
      }
      .contact-footer-cta:hover {
        border-color: rgba(255, 255, 255, 0.5);
        color: #fff;
      }

      @media (max-width: 900px) {
        .nav-links {
          gap: 12px;
        }
        .contact-headline {
          font-size: clamp(30px, 7vw, 56px);
        }
      }
      @media (max-width: 600px) {
        :root {
          --gutter: 20px;
        }
        .contact-footer {
          flex-direction: column;
          gap: 20px;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">
      <a href="{{ site.baseurl }}/">
        <div class="cube-scene">
          <div class="cube">
            <div class="cube-face cube-front"></div>
            <div class="cube-face cube-back"></div>
            <div class="cube-face cube-left"></div>
            <div class="cube-face cube-right"></div>
            <div class="cube-face cube-top"></div>
            <div class="cube-face cube-bottom"></div>
          </div>
        </div>
      </a>
      <div class="nav-links">
        <a href="{{ site.baseurl }}/works/" class="nav-secondary">Works</a>
        <a href="{{ site.baseurl }}/contact/" class="nav-primary">Contact</a>
        <a href="{{ site.baseurl }}/about/" class="nav-secondary">About</a>
      </div>
    </nav>

    <!-- CONTACT -->
    <main class="contact-page">
      <div class="contact-inner">
        <p class="contact-eyebrow">Contact</p>
        <h1 class="contact-headline">Open to full-time roles, freelance, and collaborations.</h1>
        <div class="contact-links">
          <a href="mailto:mehts818@newschool.edu" class="contact-link">
            <span class="contact-link-key">Email</span>
            <span class="contact-link-val">mehts818@newschool.edu</span>
            <span class="contact-link-arrow">↗</span>
          </a>
          <a href="https://linkedin.com/in/siddharthmehta" target="_blank" rel="noopener" class="contact-link">
            <span class="contact-link-key">LinkedIn</span>
            <span class="contact-link-val">linkedin.com/in/siddharthmehta</span>
            <span class="contact-link-arrow">↗</span>
          </a>
          <a href="{{ site.baseurl }}/assets/resume.pdf" target="_blank" class="contact-link">
            <span class="contact-link-key">Resume</span>
            <span class="contact-link-val">Download PDF</span>
            <span class="contact-link-arrow">↗</span>
          </a>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="contact-footer">
      <span class="contact-footer-text">Sid Mehta · MFA Design & Technology · Parsons</span>
      <a href="{{ site.baseurl }}/works/" class="contact-footer-cta">View Works →</a>
    </footer>

    {% include cursor_fluid.html %}

    <script>
      (function () {
        const nav = document.querySelector(".nav");
        window.addEventListener(
          "scroll",
          function () {
            nav.classList.toggle("nav--scrolled", window.scrollY > 20);
          },
          { passive: true }
        );
      })();
    </script>
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden" aria-hidden="true">
      <defs>
        <filter id="glass-refract" x="-5%" y="-30%" width="110%" height="160%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.007 0.048" numOctaves="1" seed="9" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
  </body>
</html>
