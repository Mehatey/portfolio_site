<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta property="og:title" content="Contact — Sid Mehta" />
    <meta property="og:description" content="Designer and creative technologist. Open to full-time, freelance, and collaborations." />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --nav-h: 52px;
        --gutter: max(24px, 4vw);
        --font-head: "Satoshi", sans-serif;
        --font-mono: "DM Mono", monospace;
        --font-title: "Inter", sans-serif;
        --border: rgba(255, 255, 255, 0.06);
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      }
      html {
        background: #000;
        color: #fff;
        font-size: 16px;
      }
      body {
        font-family: var(--font-head);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        cursor: none;
      }
      a,
      button {
        cursor: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── NAV ── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--nav-h);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        background: transparent;
        overflow: hidden;
      }
      .nav::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: rgba(0, 0, 0, 0.16);
        backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        -webkit-backdrop-filter: blur(22px) saturate(1.7) brightness(0.84);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        filter: url(#glass-refract);
        transition: opacity 0.3s;
      }
      .nav--scrolled::before {
        background: rgba(0, 0, 0, 0.4);
      }
      .cube-scene {
        width: 20px;
        height: 20px;
        perspective: 350px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cube {
        width: 16px;
        height: 16px;
        position: relative;
        transform-style: preserve-3d;
        transform: rotateX(-20deg) rotateY(25deg);
        transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .cube-face {
        position: absolute;
        width: 16px;
        height: 16px;
        border: 1px solid rgba(255, 255, 255, 0.65);
        background: #000;
        animation: cube-hue 8s ease-in-out infinite;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      @keyframes cube-hue {
        0%,
        100% {
          border-color: rgba(255, 255, 255, 0.65);
        }
        25% {
          border-color: rgba(180, 200, 255, 0.6);
        }
        50% {
          border-color: rgba(200, 180, 255, 0.55);
        }
        75% {
          border-color: rgba(180, 255, 220, 0.6);
        }
      }
      .cube-front {
        transform: translateZ(8px);
      }
      .cube-back {
        transform: rotateY(180deg) translateZ(8px);
      }
      .cube-left {
        transform: rotateY(-90deg) translateZ(8px);
      }
      .cube-right {
        transform: rotateY(90deg) translateZ(8px);
      }
      .cube-top {
        transform: rotateX(90deg) translateZ(8px);
      }
      .cube-bottom {
        transform: rotateX(-90deg) translateZ(8px);
      }
      .cube-front::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 1px;
        height: 5px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 6px 0 0 rgba(255, 255, 255, 0.7);
        animation: cube-blink 4s ease-in-out infinite;
      }
      @keyframes cube-blink {
        0%,
        90%,
        100% {
          opacity: 1;
        }
        95% {
          opacity: 0;
        }
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .nav-primary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.85);
        transition: color 0.2s;
      }
      .nav-primary:hover {
        color: #fff;
      }
      .nav-secondary {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        transition: color 0.2s;
      }
      .nav-secondary:hover {
        color: rgba(255, 255, 255, 0.8);
      }

      /* ── CONTACT MAIN ── */
      .contact-page {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(var(--nav-h) + 48px) var(--gutter) 48px;
      }
      .contact-wrap {
        width: 100%;
        max-width: 540px;
        opacity: 0;
        animation: fadeUp 0.75s var(--ease-out) 0.15s both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* identity row */
      .c-identity {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 44px;
      }
      .c-name {
        font-family: var(--font-title);
        font-size: 15px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.62);
        letter-spacing: -0.01em;
      }
      .c-status {
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: var(--font-mono);
        font-size: 9px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(140, 255, 140, 0.75);
      }
      .c-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(100, 255, 100, 0.6);
        flex-shrink: 0;
        animation: dot-pulse 2.4s ease-in-out infinite;
      }
      @keyframes dot-pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.4);
        }
      }

      /* links block */
      .c-links {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        margin-bottom: 28px;
      }
      .c-item {
        display: flex;
        align-items: baseline;
        gap: 20px;
        padding: 18px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        transition: padding-left 0.28s var(--ease-out);
      }
      .c-item:hover {
        padding-left: 6px;
      }
      .c-key {
        font-family: var(--font-mono);
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.38);
        min-width: 76px;
        flex-shrink: 0;
      }
      .c-val {
        font-family: var(--font-head);
        font-size: 15px;
        color: rgba(255, 255, 255, 0.72);
        flex: 1;
        transition: color 0.2s;
      }
      .c-item:hover .c-val {
        color: rgba(255, 255, 255, 0.95);
      }
      .c-arrow {
        margin-left: auto;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.32);
        flex-shrink: 0;
        transition:
          color 0.2s,
          transform 0.28s var(--ease-out);
      }
      .c-item:hover .c-arrow {
        color: rgba(255, 255, 255, 0.65);
        transform: translate(3px, -2px);
      }

      /* footnote */
      .c-note {
        font-family: var(--font-mono);
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.36);
      }

      /* ── FOOTER ── */
      .contact-footer {
        padding: 28px var(--gutter);
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .contact-footer-text {
        font-family: var(--font-mono);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.22);
        letter-spacing: 0.04em;
      }
      .contact-footer-cta {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 10px 24px;
        color: rgba(255, 255, 255, 0.42);
        transition:
          border-color 0.3s,
          color 0.3s;
        position: relative;
      }
      .contact-footer-cta::before,
      .contact-footer-cta::after {
        content: "";
        position: absolute;
        width: 5px;
        height: 5px;
        border-color: rgba(255, 255, 255, 0.3);
        border-style: solid;
        transition: border-color 0.3s;
      }
      .contact-footer-cta::before {
        top: -1px;
        left: -1px;
        border-width: 1px 0 0 1px;
      }
      .contact-footer-cta::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 1px 1px 0;
      }
      .contact-footer-cta:hover {
        border-color: rgba(255, 255, 255, 0.5);
        color: #fff;
      }

      @media (max-width: 900px) {
        .nav-links {
          gap: 14px;
        }
      }
      @media (max-width: 600px) {
        :root {
          --gutter: 20px;
        }
        .contact-footer {
          flex-direction: column;
          gap: 20px;
          text-align: center;
        }
        .c-val {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav">

    <footer class="contact-footer">

    {% include cursor_fluid.html %}

    <script>
      (function () {
        const nav = document.querySelector(".nav");
        window.addEventListener(
          "scroll",
          function () {
            nav.classList.toggle("nav--scrolled", window.scrollY > 20);
          },
          { passive: true }
        );
      })();
    </script>
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden" aria-hidden="true">
      <defs>
        <filter id="glass-refract" x="-5%" y="-30%" width="110%" height="160%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.007 0.048" numOctaves="1" seed="9" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>
  </body>
